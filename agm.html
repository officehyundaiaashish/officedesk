<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGM Form</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{--bg-page:#f4f4f2;--bg-card:#ffffff;--bg-input:#ffffff;--bg-hover:#f0f0ee;--bg-active:#e3e3df;--text-main:#181816;--text-label:#181816;--text-muted:#6a6a67;--text-placeholder:#9a9a97;--border-light:#e3e3df;--border-input:#e3e3df;--border-focus:#002C5F;--accent-bg:#002C5F;--accent-text:#ffffff;--focus-ring:rgba(0,44,95,0.1);--danger-color:#ef4444;--table-head:#f0f0ee;}
[data-theme=dark]{--bg-page:#111110;--bg-card:#1c1c1a;--bg-input:#1c1c1a;--bg-hover:#232321;--bg-active:#2d2d2b;--text-main:#f0f0ee;--text-label:#f0f0ee;--text-muted:#888885;--text-placeholder:#525250;--border-light:#2d2d2b;--border-input:#2d2d2b;--border-focus:#4D8FD6;--accent-bg:#4D8FD6;--accent-text:#111110;--focus-ring:rgba(77,143,214,0.2);--danger-color:#f87171;--table-head:#232321;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--text-main);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px 80px;}
.card{background:var(--bg-card);border-radius:12px;width:100%;max-width:820px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);border:1px solid var(--border-light);}
.card-header{padding:16px 20px 14px;border-bottom:1px solid var(--border-light);}
.card-header h1{font-size:17px;font-weight:600;color:var(--text-main);}
.card-header p{font-size:12px;color:var(--text-muted);margin-top:3px;}
.stepper-container{padding:14px 20px;border-bottom:1px solid var(--border-light);background:var(--bg-card);position:sticky;top:0;z-index:900;}
.stepper{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;transition:all .18s;}
.step.done{background:rgba(0,44,95,.06);border-color:var(--accent-bg);}
[data-theme=dark] .step.done{background:rgba(77,143,214,.1);}
.step.active{border-color:var(--accent-bg);}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--bg-hover);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.step.done .step-n,.step.active .step-n{background:var(--accent-bg);color:var(--accent-text);}
.step-t{font-size:12px;font-weight:600;color:var(--text-main);}
.step-s{font-size:10.5px;color:var(--text-muted);}
.mode-wrap{margin:14px 20px 0;display:none;}
.mode-wrap.show{display:block;}
.mode-lbl{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.mode-btns{display:flex;gap:5px;}
.mode-btn{flex:1;height:32px;border-radius:6px;border:1.5px solid var(--border-input);background:var(--bg-hover);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .18s;outline:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.mode-btn:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.mode-btn:hover{border-color:var(--text-muted);color:var(--text-main);}
.mode-btn.active{background:var(--accent-bg);border-color:var(--accent-bg);color:var(--accent-text);}
.history-wrap{padding:16px 20px 24px;display:none;}
.history-wrap.show{display:block;}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hist-title{font-size:13px;font-weight:600;}
.hist-clr{font-size:12px;color:var(--text-muted);cursor:pointer;background:none;border:none;transition:color .2s;padding:0;outline:none;}
.hist-clr:hover,.hist-clr:focus{color:var(--danger-color);}
.search-input{width:100%;height:38px;border:1px solid var(--border-input);border-radius:7px;padding:0 12px;font-size:13px;margin-bottom:12px;outline:none;transition:all .2s;background:var(--bg-hover);color:var(--text-main);}
.search-input:focus{border-color:var(--border-focus);background:var(--bg-input);box-shadow:0 0 0 3px var(--focus-ring);}
.search-input::placeholder{color:var(--text-placeholder);}
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto;}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid var(--border-light);border-radius:7px;cursor:pointer;background:var(--bg-input);transition:all .2s;outline:none;}
.hist-item:hover,.hist-item:focus{background:var(--bg-hover);}
.hi-info{flex:1;min-width:0;}
.hi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.hi-del{background:none;border:none;color:var(--border-input);cursor:pointer;transition:color .2s;display:flex;align-items:center;outline:none;}
.hi-del:hover,.hi-del:focus{color:var(--danger-color);}
.form-section{padding:14px 20px 0;}
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;border-bottom:1px solid var(--border-light);padding-bottom:6px;letter-spacing:.05em;}
.grid-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.field-col{display:flex;flex-direction:column;gap:4px;min-width:0;}
.field-col.full{grid-column:1/-1;}
.field-col label{font-size:11.5px;font-weight:500;color:var(--text-label);}
.field-col input,.field-col textarea{border:1px solid var(--border-input);border-radius:7px;padding:0 11px;font-size:13px;color:var(--text-main);background:var(--bg-input);transition:all .2s;width:100%;outline:none;font-family:'DM Sans',sans-serif;}
.field-col input{height:36px;}
.field-col textarea{padding:8px 11px;min-height:68px;resize:vertical;line-height:1.5;}
.field-col input::placeholder,.field-col textarea::placeholder{color:var(--text-placeholder);}
.field-col input:focus,.field-col textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.field-col input.pre{color:var(--text-muted);}
.custom-select-wrap{position:relative;user-select:none;width:100%;}
.custom-select-trigger{height:36px;border:1px solid var(--border-input);border-radius:7px;padding:0 11px;background:var(--bg-input);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;width:100%;outline:none;}
.custom-select-trigger:hover{border-color:var(--text-placeholder);}
.custom-select-trigger:focus,.custom-select-trigger.active{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.cs-val{font-size:13px;color:var(--text-main);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;}
.cs-val.empty{color:var(--text-placeholder);}
.cs-arr{color:var(--text-placeholder);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;}
.custom-select-trigger.active .cs-arr{transform:rotate(180deg);color:var(--text-main);}
.custom-select-opts{position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:500;background:var(--bg-card);border:1px solid var(--border-input);border-radius:7px;box-shadow:0 10px 25px -5px rgba(0,0,0,.2);max-height:200px;overflow-y:auto;opacity:0;transform:translateY(-8px) scaleY(.95);transform-origin:top;pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1);}
.custom-select-opts.open{opacity:1;transform:translateY(0) scaleY(1);pointer-events:all;}
.cs-opt{padding:9px 11px;font-size:12.5px;color:var(--text-main);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border-light);outline:none;}
.cs-opt:last-child{border-bottom:none;}
.cs-opt:hover,.cs-opt:focus{background:var(--bg-hover);font-weight:500;}
.date-trigger{height:36px;display:flex;align-items:center;padding:0 11px;cursor:pointer;user-select:none;gap:7px;border:1px solid var(--border-input);border-radius:7px;background:var(--bg-input);transition:all .2s;position:relative;width:100%;outline:none;}
.date-trigger:hover{border-color:var(--text-placeholder);}
.date-trigger:focus,.date-trigger.active{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.date-icon{color:var(--text-placeholder);display:flex;align-items:center;}
.dval{font-size:13px;color:var(--text-main);flex:1;}
.dval.empty{color:var(--text-placeholder);}
.cal-pop{position:absolute;top:calc(100% + 6px);left:0;z-index:400;background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;padding:14px;box-shadow:0 10px 25px -5px rgba(0,0,0,.2);width:250px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s ease;}
.cal-pop.open{opacity:1;transform:translateY(0);pointer-events:all;}
.mnth{font-size:13px;font-weight:600;cursor:pointer;padding:3px 6px;border-radius:5px;transition:background .2s;outline:none;}
.mnth:hover,.mnth:focus{background:var(--bg-hover);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav button{background:none;border:1px solid var(--border-input);border-radius:5px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s;outline:none;}
.cal-nav button:hover,.cal-nav button:focus{background:var(--bg-hover);color:var(--text-main);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-grid.years{grid-template-columns:repeat(3,1fr);gap:6px;}
.dn{font-size:9px;font-weight:600;text-transform:uppercase;color:var(--text-muted);text-align:center;padding-bottom:6px;}
.cd{font-size:12px;text-align:center;padding:7px 2px;border-radius:5px;cursor:pointer;color:var(--text-label);transition:all .15s;outline:none;}
.cal-grid.years .cd{padding:10px 4px;font-weight:500;}
.cd:hover,.cd:focus{background:var(--bg-hover);}
.cd.sel{background:var(--accent-bg)!important;color:var(--accent-text)!important;font-weight:500;}
.cd.today{font-weight:700;text-decoration:underline;}
.cd.om{color:var(--border-input);pointer-events:none;}
.tbl-wrap{overflow-x:auto;margin-top:4px;}
.pwa-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.pwa-table th{background:var(--table-head);color:var(--text-muted);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:8px;text-align:left;border:1px solid var(--border-light);white-space:nowrap;}
.pwa-table td{border:1px solid var(--border-light);padding:0;vertical-align:middle;}
.pwa-table td.num{width:28px;text-align:center;color:var(--text-muted);font-size:11px;background:var(--table-head);font-weight:600;padding:0 6px;white-space:nowrap;}
.pwa-table td.total-cell{background:var(--bg-hover);font-size:12.5px;font-weight:600;padding:0 8px;min-width:70px;white-space:nowrap;}
.pwa-table td.total-cell span{display:block;padding:8px 0;}
.pwa-table td input{width:100%;height:34px;border:none;background:transparent;color:var(--text-main);font-size:12.5px;font-family:'DM Sans',sans-serif;padding:0 8px;outline:none;transition:background .15s;}
.pwa-table td input:focus{background:var(--focus-ring);}
.pwa-table td input::placeholder{color:var(--text-placeholder);}
.pwa-table td input.pre{color:var(--text-muted);}
.pwa-table tr.total-row td{background:var(--bg-hover);font-weight:700;font-size:12.5px;padding:8px;color:var(--text-main);}
.pwa-table tr.gtotal-row td{background:var(--accent-bg);color:var(--accent-text);font-weight:700;font-size:13px;padding:9px 8px;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.photo-grid.g2{grid-template-columns:repeat(2,1fr);}
.photo-grid.g4{grid-template-columns:repeat(4,1fr);}
.photo-grid.g1{grid-template-columns:1fr;max-width:340px;}
.photo-slot{position:relative;border:1.5px dashed var(--border-input);border-radius:7px;overflow:hidden;cursor:pointer;transition:all .2s;aspect-ratio:4/3;background:var(--bg-hover);}
.photo-slot:hover{border-color:var(--accent-bg);}
.photo-slot.filled{border-style:solid;border-color:var(--border-input);}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-slot .slot-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:600;text-align:center;padding:4px 3px;letter-spacing:.04em;text-transform:uppercase;z-index:2;}
.photo-slot .slot-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none;z-index:1;}
.photo-slot .slot-placeholder svg{color:var(--text-placeholder);}
.photo-slot .slot-placeholder span{font-size:9.5px;color:var(--text-placeholder);}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1;}
.photo-slot.filled img{display:block;}
.photo-slot.filled .slot-placeholder{display:none;}
.photo-slot .remove-btn{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;font-size:10px;line-height:1;}
.photo-slot.filled .remove-btn{display:flex;}
.sub-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;color:var(--text-muted);letter-spacing:.05em;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light);grid-column:1/-1;}
.photo-sub-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;color:var(--text-muted);letter-spacing:.04em;margin-bottom:5px;margin-top:12px;}
.status{margin:14px 20px 0;font-size:13px;padding:10px 14px;border-radius:7px;display:none;font-weight:500;}
.status.error{background:rgba(239,68,68,.1);color:var(--danger-color);border:1px solid rgba(239,68,68,.2);display:block;}
.status.success{background:rgba(34,197,94,.1);color:#15803d;border:1px solid rgba(34,197,94,.2);display:block;}
[data-theme=dark] .status.success{color:#4ade80;}
.actions{display:flex;gap:10px;padding:14px 20px 20px;border-top:1px solid var(--border-light);margin-top:14px;align-items:center;}
.btn{flex:1;height:42px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'DM Sans',sans-serif;outline:none;}
.btn:focus{box-shadow:0 0 0 3px var(--focus-ring);}
.btn-inject{background:var(--accent-bg);color:var(--accent-text);}
.btn-inject:hover{opacity:.9;}
.btn-inject:disabled{opacity:.5;cursor:not-allowed;}
.btn-clear{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.25);}
.btn-clear:hover{background:rgba(239,68,68,.18);border-color:#ef4444;}
[data-theme=dark] .btn-clear{background:rgba(248,113,113,.12);color:#f87171;border-color:rgba(248,113,113,.25);}
[data-theme=dark] .btn-clear:hover{background:rgba(248,113,113,.2);}
/* ─── PAGE JUMPERS ─── */
.page-jumper{position:fixed;right:16px;z-index:9000;display:flex;flex-direction:column;gap:8px;transition:opacity .3s ease,transform .3s ease;}
.page-jumper{bottom:80px;}
.pj-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:all .25s cubic-bezier(.4,0,.2,1);outline:none;background:var(--accent-bg);color:var(--accent-text);}
.pj-btn:hover{transform:scale(1.12);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.pj-btn:active{transform:scale(.95);}
.pj-btn:focus{box-shadow:0 0 0 3px var(--focus-ring),0 4px 14px rgba(0,0,0,.2);}
.pj-btn.hidden{opacity:0;pointer-events:none;transform:translateY(12px);}
@media(max-width:640px){.pj-btn{width:38px;height:38px;}.page-jumper{right:10px;bottom:70px;}}

*:hover{scrollbar-color:rgba(0,0,0,.2) transparent;}
[data-theme=dark] *:hover{scrollbar-color:rgba(255,255,255,.15) transparent;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:transparent;border-radius:10px;}
*:hover::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);}
[data-theme=dark] *:hover::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg-card);border:1px solid var(--border-light);border-radius:10px;padding:20px;width:90%;max-width:340px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1);transform:scale(.95) translateY(10px);transition:all .2s cubic-bezier(.4,0,.2,1);}
.modal-overlay.show .modal-box{transform:scale(1) translateY(0);}
.modal-msg{font-size:14px;color:var(--text-main);font-weight:500;margin-bottom:20px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.modal-btn{padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:'DM Sans',sans-serif;outline:none;}
.modal-btn-cancel{background:var(--bg-active);color:var(--text-label);}
.modal-btn-cancel:hover,.modal-btn-cancel:focus{background:var(--border-input);color:var(--text-main);}
.modal-btn-ok{background:var(--danger-color);color:#fff;}
.modal-btn-ok:hover,.modal-btn-ok:focus{opacity:.9;box-shadow:0 0 0 3px rgba(239,68,68,.2);}
@media(max-width:640px){
  body{padding:10px 8px 70px;}
  .grid-wrap{grid-template-columns:1fr;gap:8px;}
  .card-header,.mode-wrap,.form-section,.actions,.history-wrap{padding-left:14px;padding-right:14px;}
  .actions{flex-wrap:wrap;}
  .photo-grid{grid-template-columns:repeat(2,1fr);}
  .photo-grid.g4{grid-template-columns:repeat(2,1fr);}
  .photo-grid.g1{max-width:100%;}
  .stepper{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="modal-overlay" id="customModal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn modal-btn-ok" id="modalOk">Confirm</button>
    </div>
  </div>
</div>
<div class="card">
  <div class="card-header">
    <h1>AGM Form</h1>
    <p>AGM Battery Defect Report — Khanna Automart (N3235)</p>
  </div>
  <div class="stepper-container" id="stepperContainer" style="display:none;">
    <div class="stepper">
      <div class="step active" id="agm-st1"><div class="step-n" id="agm-sn1">1</div><div><div class="step-t">Battery Data</div><div class="step-s">Vehicle &amp; battery info</div></div></div>
      <div class="step" id="agm-st2"><div class="step-n" id="agm-sn2">2</div><div><div class="step-t">Photos</div><div class="step-s">Defective concern</div></div></div>
      <div class="step" id="agm-st3"><div class="step-n" id="agm-sn3">3</div><div><div class="step-t">Invoice &amp; PWA</div><div class="step-s">Estimation &amp; screen</div></div></div>
      <div class="step" id="agm-st4"><div class="step-n" id="agm-sn4">4</div><div><div class="step-t">NDMS &amp; History</div><div class="step-s">Sharing &amp; vehicle log</div></div></div>
    </div>
  </div>
  <div class="mode-wrap" id="modeWrap">
    <div class="mode-lbl">Navigation</div>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeForm" onclick="setMode('form')" tabindex="0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        Fill Form
      </button>
      <button class="mode-btn" id="modeHistory" onclick="setMode('history')" tabindex="0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Saved Entries
      </button>
    </div>
  </div>
  <div class="history-wrap" id="histWrap">

// ─── CALENDAR ───
function renderCal(id){
  const st=CAL[id],pop=document.getElementById('cp_'+id);
  if(!pop||!st)return;
  const y=st.year,m=st.month,now=new Date();
  if(st.view==='years'){
    const sy=y-7;
    let h=`<div class="cal-nav"><button type="button" class="cpb-y" data-id="${id}" data-dir="-15" tabindex="0">${icons.chevronLeft}</button><span class="mnth" tabindex="0">Year</span><button type="button" class="cpb-y" data-id="${id}" data-dir="15" tabindex="0">${icons.chevronRight}</button></div><div class="cal-grid years">`;
    for(let i=0;i<15;i++)h+=`<div class="cd ${sy+i===y?'sel':''}" data-id="${id}" data-y="${sy+i}" tabindex="0">${sy+i}</div>`;
    h+='</div>';pop.innerHTML=h;
    pop.querySelectorAll('.cpb-y').forEach(b=>{const a=e=>{e.stopPropagation();CAL[b.dataset.id].year+=parseInt(b.dataset.dir);renderCal(b.dataset.id);};b.addEventListener('click',a);handleKeyClick(b,a);});
    pop.querySelectorAll('.cd').forEach(el=>{const a=e=>{e.stopPropagation();CAL[el.dataset.id].year=parseInt(el.dataset.y);CAL[el.dataset.id].view='days';renderCal(el.dataset.id);};el.addEventListener('click',a);handleKeyClick(el,a);});
  }else{
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
    let h=`<div class="cal-nav"><button type="button" class="cpb" data-id="${id}" data-dir="-1" tabindex="0">${icons.chevronLeft}</button><span class="mnth ts" data-id="${id}" tabindex="0">${MONTHS[m]} ${y}</span><button type="button" class="cpb" data-id="${id}" data-dir="1" tabindex="0">${icons.chevronRight}</button></div><div class="cal-grid">${['S','M','T','W','T','F','S'].map(x=>`<div class="dn">${x}</div>`).join('')}`;
    for(let i=0;i<fd;i++)h+=`<div class="cd om">${prev-fd+1+i}</div>`;
    for(let d=1;d<=dim;d++){const iT=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();const iS=st.date&&d===st.date.getDate()&&m===st.date.getMonth()&&y===st.date.getFullYear();h+=`<div class="cd${iT?' today':''}${iS?' sel':''}" data-id="${id}" data-d="${d}" tabindex="0">${d}</div>`;}
    h+='</div>';pop.innerHTML=h;
    pop.querySelectorAll('.cpb').forEach(b=>{const a=e=>{e.stopPropagation();const s=CAL[b.dataset.id],dir=parseInt(b.dataset.dir);s.month+=dir;if(s.month<0){s.month=11;s.year--;}if(s.month>11){s.month=0;s.year++;}renderCal(b.dataset.id);};b.addEventListener('click',a);handleKeyClick(b,a);});
    const ts=pop.querySelector('.ts');const tsA=e=>{e.stopPropagation();CAL[e.target.dataset.id].view='years';renderCal(e.target.dataset.id);};ts.addEventListener('click',tsA);handleKeyClick(ts,tsA);
    pop.querySelectorAll('.cd:not(.om)').forEach(el=>{const a=e=>{e.stopPropagation();const s=CAL[el.dataset.id];s.date=new Date(s.year,s.month,parseInt(el.dataset.d));const dv=document.getElementById('dv_'+el.dataset.id);if(dv){dv.textContent=fmtDash(s.date);dv.classList.remove('empty');}const di=document.getElementById('di_'+el.dataset.id);if(di)di.value=fmtDash(s.date);closeAllPopups();renderCal(el.dataset.id);};el.addEventListener('click',a);handleKeyClick(el,a);});
  }
}
function openCal(id){
  closeAllPopups();
  if(!CAL[id])CAL[id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth(),view:'days'};
  const ref=CAL[id].date||new Date();CAL[id].year=ref.getFullYear();CAL[id].month=ref.getMonth();CAL[id].view='days';
  renderCal(id);document.getElementById('cp_'+id)?.classList.add('open');document.getElementById('dt_'+id)?.classList.add('active');
}
function makeDateField(id,label,full=false){
  if(!CAL[id])CAL[id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth(),view:'days'};
  const wrap=document.createElement('div');wrap.className='field-col'+(full?' full':'');
  wrap.innerHTML=`<label>${label}</label><div style="position:relative;">
    <div class="date-trigger" id="dt_${id}" tabindex="0" style="cursor:text;">
      <input type="text" id="di_${id}" placeholder="DD-MM-YYYY or pick →" style="flex:1;border:none;background:transparent;font-size:13px;color:var(--text-main);outline:none;font-family:'DM Sans',sans-serif;width:100%;cursor:text;" tabindex="-1">
      <span class="date-icon" id="dico_${id}" style="cursor:pointer;flex-shrink:0;">${icons.calendar}</span>
    </div>
    <div class="cal-pop" id="cp_${id}"></div></div>`;
  requestAnimationFrame(()=>{
    const dt=document.getElementById('dt_'+id);
    const di=document.getElementById('di_'+id);
    const ico=document.getElementById('dico_'+id);
    // Typing in the embedded input
    di.addEventListener('input',()=>{
      const v=di.value.trim();
      if(/^\d{2}-\d{2}-\d{4}$/.test(v)){
        const p=v.split('-');const d=new Date(+p[2],+p[1]-1,+p[0]);
        if(!isNaN(d)){if(!CAL[id])CAL[id]={};Object.assign(CAL[id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false,view:'days'});}
      }
    });
    di.addEventListener('focus',()=>{dt.style.borderColor='var(--border-focus)';dt.style.boxShadow='0 0 0 3px var(--focus-ring)';});
    di.addEventListener('blur',()=>{dt.style.borderColor='';dt.style.boxShadow='';});
    // Calendar icon click opens calendar
    ico.addEventListener('click',e=>{e.stopPropagation();const isOpen=document.getElementById('cp_'+id)?.classList.contains('open');if(isOpen)closeAllPopups();else openCal(id);});
    // Click on the trigger bar (not icon) focuses the text input
    dt.addEventListener('click',e=>{if(e.target!==ico&&!ico.contains(e.target))di.focus();});
    const pop=wrap.querySelector('.cal-pop');
    let wt;pop.addEventListener('wheel',e=>{e.preventDefault();if(wt)return;wt=setTimeout(()=>{wt=null;},150);const st=CAL[id];if(st.view==='years'){st.year+=e.deltaY>0?15:-15;}else{st.month+=e.deltaY>0?1:-1;if(st.month>11){st.month=0;st.year++;}else if(st.month<0){st.month=11;st.year--;}}renderCal(id);},{passive:false});
  });
  return wrap;
}
function makeSelect(id,label,options,full=false){

  wrap.innerHTML=`<label>${label}</label><div class="custom-select-wrap"><div class="custom-select-trigger" id="cst_${id}" tabindex="0"><span class="cs-val empty" id="csv_${id}">Select…</span><span class="cs-arr">${icons.chevronDown}</span></div><div class="custom-select-opts" id="cso_${id}">${options.map(o=>`<div class="cs-opt" data-val="${o}" tabindex="0">${o}</div>`).join('')}</div><input type="hidden" id="${id}" value=""></div>`;

    if(!trig)return;
    const trigA=e=>{e.stopPropagation();const isOpen=opts.classList.contains('open');closeAllPopups();if(!isOpen){opts.classList.add('open');trig.classList.add('active');}};
    trig.addEventListener('click',trigA);handleKeyClick(trig,trigA);
    opts.querySelectorAll('.cs-opt').forEach(opt=>{const a=e=>{e.stopPropagation();valEl.textContent=opt.getAttribute('data-val');valEl.classList.remove('empty');hidInp.value=opt.getAttribute('data-val');closeAllPopups();};opt.addEventListener('click',a);handleKeyClick(opt,a);});
  });
  return wrap;
}
function makeInput(id,label,placeholder,defVal='',full=false){
  const wrap=document.createElement('div');wrap.className='field-col'+(full?' full':'');

function mkSec(title){
  const sec=document.createElement('div');sec.className='form-section';

function makePhotoSlot(id,label){
  const div=document.createElement('div');div.className='photo-slot';div.id='ps_'+id;
  div.innerHTML=`<input type="file" accept="image/*" id="pf_${id}"><div class="slot-placeholder">${icons.photo}<span>Upload</span></div><img id="pi_${id}" alt="${label}"><div class="slot-label">${label}</div><button type="button" class="remove-btn" id="prm_${id}">✕</button>`;
  requestAnimationFrame(()=>{
    document.getElementById('pf_'+id)?.addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{PHOTOS[id]={dataUrl:ev.target.result,filename:file.name};document.getElementById('pi_'+id).src=ev.target.result;document.getElementById('ps_'+id).classList.add('filled');updateStepper();};
      reader.readAsDataURL(file);
    });
    document.getElementById('prm_'+id)?.addEventListener('click',e=>{
      e.stopPropagation();delete PHOTOS[id];
      document.getElementById('pi_'+id).src='';document.getElementById('pf_'+id).value='';document.getElementById('ps_'+id).classList.remove('filled');updateStepper();
    });
  });
  return div;
}

function calcNDMS(){
  const gv=id=>{const el=document.getElementById(id);return parseFloat(el?.value)||0;};
  const fmt=v=>v>0?v.toLocaleString('en-IN',{maximumFractionDigits:2}):'—';
  const fmtPct=v=>v>0?v.toFixed(1)+'%':'—';
  const setEl=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};

  const partTotal=gv('part_total_cost_with_tax');
  const labTotal=gv('labour_total_cost_with_tax');

  // Part sharing
  const hPctP=gv('hmil_share_pct_part');
  const dPctP=gv('dealer_share_pct_part');
  const cPctP=gv('customer_share_pct_part');
  const hAmtP=partTotal*(hPctP/100);
  const dAmtP=partTotal*(dPctP/100);
  const cAmtP=partTotal*(cPctP/100);
  const checkP=hPctP+dPctP+cPctP;

  // Labour sharing
  const hPctL=gv('hmil_share_pct_labour');
  const dPctL=gv('dealer_share_pct_labour');
  const cPctL=gv('customer_share_pct_labour');
  const hAmtL=labTotal*(hPctL/100);
  const dAmtL=labTotal*(dPctL/100);
  const cAmtL=labTotal*(cPctL/100);
  const checkL=hPctL+dPctL+cPctL;

  // ── Percentage over-100 validation ──
  const partOver=checkP>100.001;
  const labOver=checkL>100.001;
  const partIds=['hmil_share_pct_part','dealer_share_pct_part','customer_share_pct_part'];
  const labIds=['hmil_share_pct_labour','dealer_share_pct_labour','customer_share_pct_labour'];
  partIds.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(partOver){el.style.borderColor='var(--danger-color)';el.style.boxShadow='0 0 0 3px rgba(239,68,68,0.15)';}
    else{el.style.borderColor='';el.style.boxShadow='';}
  });
  labIds.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(labOver){el.style.borderColor='var(--danger-color)';el.style.boxShadow='0 0 0 3px rgba(239,68,68,0.15)';}
    else{el.style.borderColor='';el.style.boxShadow='';}
  });
  // Show/hide inline error messages
  const partErrEl=document.getElementById('pct_err_part');
  const labErrEl=document.getElementById('pct_err_labour');
  if(partErrEl)partErrEl.style.display=partOver?'block':'none';
  if(labErrEl)labErrEl.style.display=labOver?'block':'none';

  // Update table
  setEl('ns_part_total',fmt(partTotal));
  setEl('ns_hmil_pct_part',fmtPct(hPctP));
  setEl('ns_hmil_amt_part',fmt(hAmtP));
  setEl('ns_dealer_pct_part',fmtPct(dPctP));
  setEl('ns_dealer_amt_part',fmt(dAmtP));
  setEl('ns_cust_pct_part',fmtPct(cPctP));
  setEl('ns_cust_amt_part',fmt(cAmtP));

  setEl('ns_labour_total',fmt(labTotal));
  setEl('ns_hmil_pct_labour',fmtPct(hPctL));
  setEl('ns_hmil_amt_labour',fmt(hAmtL));
  setEl('ns_dealer_pct_labour',fmtPct(dPctL));
  setEl('ns_dealer_amt_labour',fmt(dAmtL));
  setEl('ns_cust_pct_labour',fmtPct(cPctL));
  setEl('ns_cust_amt_labour',fmt(cAmtL));

  // Check column
  const checkEl_p=document.getElementById('ns_check_part');
  const checkEl_l=document.getElementById('ns_check_labour');
  if(checkEl_p){
    if(partTotal>0&&checkP>0){checkEl_p.textContent=Math.abs(checkP-100)<0.01?'✓ 100%':'⚠ '+checkP.toFixed(1)+'%';checkEl_p.style.color=Math.abs(checkP-100)<0.01?'#22c55e':'#ef4444';checkEl_p.style.fontWeight='700';}
    else checkEl_p.textContent='—';
  }
  if(checkEl_l){
    if(labTotal>0&&checkL>0){checkEl_l.textContent=Math.abs(checkL-100)<0.01?'✓ 100%':'⚠ '+checkL.toFixed(1)+'%';checkEl_l.style.color=Math.abs(checkL-100)<0.01?'#22c55e':'#ef4444';checkEl_l.style.fontWeight='700';}
    else checkEl_l.textContent='—';
  }

  // Grand totals
  setEl('ns_grand_total',fmt(partTotal+labTotal));
  setEl('ns_hmil_grand',fmt(hAmtP+hAmtL));
  setEl('ns_dealer_grand',fmt(dAmtP+dAmtL));
  setEl('ns_cust_grand',fmt(cAmtP+cAmtL));
}

function handleShPaste(e,rowIdx,colKey,cols){
  const text=e.clipboardData.getData('text');
  if(!text.includes('\t')&&!text.includes('\n'))return;
  e.preventDefault();
  const rows=text.trim().split(/\r?\n/);
  const colStart=cols.indexOf(colKey);
  rows.forEach((row,ri)=>{
    const cells=row.split('\t');
    cells.forEach((val,ci)=>{
      const r=rowIdx+ri,c=colStart+ci;
      if(r>20||c>=cols.length)return;
      const el=document.getElementById(`sh${r}_${cols[c]}`);
      if(el)el.value=val.trim();
    });
  });
}

function calcPartRow(i){
  const p=parseFloat(document.getElementById(`part_list_price_${i}`)?.value)||0;
  const q=parseFloat(document.getElementById(`part_qty_${i}`)?.value)||0;
  const a=p*q,t=a*1.18;
  const ae=document.getElementById(`part_amt_${i}`),te=document.getElementById(`part_tax_${i}`);
  if(ae)ae.textContent=(a||p||q)?a.toLocaleString('en-IN'):'—';
  if(te)te.textContent=(a||p||q)?t.toLocaleString('en-IN',{maximumFractionDigits:2}):'—';
  updateInvoiceTotals();
}
function calcLabourRow(i){
  const p=parseFloat(document.getElementById(`labour_list_price_${i}`)?.value)||0;
  const q=parseFloat(document.getElementById(`labour_qty_${i}`)?.value)||0;
  const a=p*q,t=a*1.18;
  const ae=document.getElementById(`labour_amt_${i}`),te=document.getElementById(`labour_tax_${i}`);
  if(ae)ae.textContent=(a||p||q)?a.toLocaleString('en-IN'):'—';
  if(te)te.textContent=(a||p||q)?t.toLocaleString('en-IN',{maximumFractionDigits:2}):'—';
  updateInvoiceTotals();
}
function updateInvoiceTotals(){
  let pa=0,la=0;
  for(let i=1;i<=2;i++){
    pa+=(parseFloat(document.getElementById(`part_list_price_${i}`)?.value)||0)*(parseFloat(document.getElementById(`part_qty_${i}`)?.value)||0);
    la+=(parseFloat(document.getElementById(`labour_list_price_${i}`)?.value)||0)*(parseFloat(document.getElementById(`labour_qty_${i}`)?.value)||0);
  }
  const pt=pa*1.18,lt=la*1.18,gt=pt+lt;
  const f=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v>0?v.toLocaleString('en-IN',{maximumFractionDigits:2}):'—';};
  f('partAmtTotal',pa);f('partTaxTotal',pt);f('labourAmtTotal',la);f('labourTaxTotal',lt);f('gTotal',gt);
}

let stepperScrollTimeout;
window.addEventListener('scroll',()=>{
  if(currentMode!=='form')return;
  clearTimeout(stepperScrollTimeout);
  stepperScrollTimeout=setTimeout(updateStepper,50);
},{passive:true});

function updateStepper(){
  const sc=document.getElementById('stepperContainer');
  if(!sc||currentMode!=='form')return;
  const sections=Array.from(document.querySelectorAll('.form-section'));
  if(sections.length<4)return;

  // ── Smart completion checks ──
  // Step 1 done: all battery data section fields filled
  const s1fields=['vin_number','model','pdi_voltage','pdi_cca','pdi_soc','analyser_voltage','analyser_cca','analyser_soc','analyser_result','result_slip'];
  const s1done=s1fields.every(id=>{
    const el=document.getElementById(id);
    return el&&el.value.trim()!=='';
  });

  // Step 2 done: at least 2 photos uploaded
  const photoCount=Object.keys(PHOTOS).length;
  const s2done=photoCount>=2;

  // Step 3 done: at least 1 invoice table row filled (parts or labour)
  let tableHasRow=false;
  outer: for(let i=1;i<=2;i++){
    for(const fld of['si_no','part_number','part_description','si_no_labour','labour_code','labour_description']){
      const el=document.getElementById(`${fld}_${i}`);
      if(el&&el.value.trim()){tableHasRow=true;break outer;}
    }
  }
  const s3done=tableHasRow;

  // Step 4 done: s1+s2+s3 all done
  const s4done=s1done&&s2done&&s3done;

  const doneMap=[s1done,s2done,s3done,s4done];

  // Scroll-based active step
  const vpm=window.innerHeight/2;
  const sectionMap=[{end:1,step:1},{end:2,step:2},{end:3,step:3},{end:5,step:4}];
  let activeStep=1;
  sections.forEach((section,idx)=>{
    const rect=section.getBoundingClientRect();
    if(rect.top<vpm&&rect.bottom>0){
      for(const map of sectionMap){if(idx<=map.end){activeStep=map.step;break;}}
    }
  });

  for(let i=1;i<=4;i++){
    const st=document.getElementById('agm-st'+i),sn=document.getElementById('agm-sn'+i);
    if(!st||!sn)continue;
    if(doneMap[i-1]){
      st.className='step done';
      sn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
    }else{
      st.className='step'+(i===activeStep?' active':'');
      sn.textContent=i;
    }
  }
}

});

function saveHistory(entry){
  const key=entry.vin_number;
  if(key)HISTORY=HISTORY.filter(h=>h.vin_number!==key);
  HISTORY.unshift(entry);
  if(HISTORY.length>50)HISTORY=HISTORY.slice(0,50);
  try{localStorage.setItem('agm_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}
async function deleteHistory(idx){
  HISTORY.splice(idx,1);
  try{localStorage.setItem('agm_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}
document.getElementById('btnHistoryClearAll').addEventListener('click',async()=>{
  if(!(await customConfirm('Clear all saved entries?','Yes, Clear All')))return;
  HISTORY=[];try{localStorage.removeItem('agm_hist');}catch(e){}historySearch.value='';renderHistory();
});
historySearch.addEventListener('input',()=>renderHistory(historySearch.value));

function renderHistory(filter=''){
  if(!HISTORY.length){histList.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No saved entries.</div>';return;}
  histList.innerHTML='';
  const q=filter.toLowerCase().trim();
  HISTORY.forEach((entry,idx)=>{
    const primary=entry.vin_number||'Unknown';const sub=entry.repair_date||entry.model||'';
    if(q&&!`${primary} ${sub}`.toLowerCase().includes(q))return;
    const item=document.createElement('div');item.className='hist-item';item.setAttribute('tabindex','0');
    item.innerHTML=`<div class="hi-info"><div class="hi-name">${escHtml(primary)}</div><div class="hi-meta">${escHtml(sub)}</div></div><button type="button" class="hi-del" tabindex="0">${icons.close}</button>`;
    const delBtn=item.querySelector('.hi-del');
    const delA=async e=>{e.stopPropagation();if(!(await customConfirm('Delete this entry?','Delete')))return;deleteHistory(idx);};
    delBtn.addEventListener('click',delA);handleKeyClick(delBtn,delA);
    const itemA=()=>fillFromHistory(entry);item.addEventListener('click',itemA);handleKeyClick(item,itemA);
    histList.appendChild(item);
  });
  if(!histList.children.length)histList.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No matching entries.</div>';
}

function fillFromHistory(entry){
  setMode('form');
  setTimeout(()=>{
    // Restore all plain input fields
    Object.keys(entry).forEach(id=>{const el=document.getElementById(id);if(el&&el.type!=='hidden'){el.value=entry[id];if(entry[id])el.classList.remove('pre');}});
    // Restore custom dropdowns
    ['battery_spec_ah','agm_supplier_name','dealer_action','model','battery_availability','analyser_result'].forEach(id=>{
      if(!entry[id])return;
      const h=document.getElementById(id);if(h)h.value=entry[id];
      const lbl=document.getElementById('csv_'+id);if(lbl){lbl.textContent=entry[id];lbl.classList.remove('empty');}
    });
    // Restore date pickers
    ['sale_date','repair_date','battery_production_date','vehicle_received_date','pdi_inspection_result'].forEach(id=>{
      const val=entry[id];if(!val)return;
      const p=val.split('-');const d=new Date(+p[2],+p[1]-1,+p[0]);if(isNaN(d))return;
      if(!CAL[id])CAL[id]={};
      Object.assign(CAL[id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false,view:'days'});
      const dv=document.getElementById('dv_'+id);if(dv){dv.textContent=val;dv.classList.remove('empty');}
      const di=document.getElementById('di_'+id);if(di)di.value=val;
    });
    // Restore Invoice rows (plain inputs already handled above, just recalc)
    for(let i=1;i<=2;i++){calcPartRow(i);calcLabourRow(i);}
    // Restore NDMS (plain inputs already handled above, just recalc live table)
    calcNDMS();
    // Restore Vehicle History dealer_no styling
    for(let i=1;i<=20;i++){
      const el=document.getElementById(`sh${i}_dealer_no`);
      if(el&&el.value&&el.value!=='N3235')el.classList.remove('pre');
    }
    closeAllPopups();clearStatus();
  },100);
}

// ─── HELPERS ───
function showStatus(m,t){statusEl.textContent=m;statusEl.className='status '+t;}
function clearStatus(){statusEl.textContent='';statusEl.className='status';}
function dataUrlToBytes(dataUrl){const b64=dataUrl.split(',')[1];const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;}
function mimeFromDataUrl(dataUrl){return dataUrl.split(';')[0].split(':')[1]||'image/jpeg';}
function extFromMime(mime){if(mime==='image/png')return 'png';if(mime==='image/gif')return 'gif';if(mime==='image/webp')return 'webp';return 'jpg';}

// ─── GENERATE XLSX ───
document.getElementById('btnInject').addEventListener('click',async()=>{
  if(!templateBuffer){showStatus('Template not loaded.','error');return;}
  const btnInject=document.getElementById('btnInject');
  // Validate % totals before proceeding
  const gv=id=>{const el=document.getElementById(id);return parseFloat(el?.value)||0;};
  const checkP=gv('hmil_share_pct_part')+gv('dealer_share_pct_part')+gv('customer_share_pct_part');
  const checkL=gv('hmil_share_pct_labour')+gv('dealer_share_pct_labour')+gv('customer_share_pct_labour');
  if(checkP>100.001){
    showStatus('⚠ Part sharing % total is '+checkP.toFixed(1)+'% — must be exactly 100%. Please fix before generating.','error');
    document.getElementById('hmil_share_pct_part')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(checkL>100.001){
    showStatus('⚠ Labour sharing % total is '+checkL.toFixed(1)+'% — must be exactly 100%. Please fix before generating.','error');
    document.getElementById('hmil_share_pct_labour')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  btnInject.disabled=true;btnInject.textContent='Processing…';clearStatus();
  try{
    const get=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
    const getDate=id=>{const st=CAL[id];if(st&&st.date)return fmtDash(st.date);const di=document.getElementById("di_"+id);if(di&&di.value.trim())return di.value.trim();return "";};

    const data={};
    // Battery Data
    ['model','vin_number','mileage_km','battery_spec_ah','agm_supplier_name',
     'pdi_voltage','pdi_cca','pdi_soc',
     'analyser_voltage','analyser_cca','analyser_soc','analyser_result','result_slip',
     'dealer_action','battery_availability'].forEach(id=>data[id]=get(id));
    data.sale_date=getDate('sale_date');
    data.repair_date=getDate('repair_date');
    data.battery_production_date=getDate('battery_production_date');
    data.vehicle_received_date=getDate('vehicle_received_date');
    data.pdi_inspection_result=getDate('pdi_inspection_result');

    // Invoice
    for(let i=1;i<=2;i++){
      data[`si_no_${i}`]=get(`si_no_${i}`);
      data[`part_number_${i}`]=get(`part_number_${i}`);
      data[`part_description_${i}`]=get(`part_description_${i}`);
      data[`part_list_price_${i}`]=get(`part_list_price_${i}`);
      data[`part_qty_${i}`]=get(`part_qty_${i}`);
      const pp=parseFloat(get(`part_list_price_${i}`))||0,pq=parseFloat(get(`part_qty_${i}`))||0;
      data[`part_amount_${i}`]=(pp*pq).toFixed(2);

      data[`si_no_labour_${i}`]=get(`si_no_labour_${i}`);
      data[`labour_code_${i}`]=get(`labour_code_${i}`);
      data[`labour_description_${i}`]=get(`labour_description_${i}`);
      data[`labour_list_price_${i}`]=get(`labour_list_price_${i}`);
      data[`labour_qty_${i}`]=get(`labour_qty_${i}`);
      const lp=parseFloat(get(`labour_list_price_${i}`))||0,lq=parseFloat(get(`labour_qty_${i}`))||0;
      data[`labour_amount_${i}`]=(lp*lq).toFixed(2);
    }

    // NDMS — collect user inputs
    ['part_total_cost_with_tax','labour_total_cost_with_tax',
     'hmil_share_pct_part','dealer_share_pct_part','customer_share_pct_part',
     'hmil_share_pct_labour','dealer_share_pct_labour','customer_share_pct_labour'].forEach(id=>data[id]=get(id));

    // NDMS — pre-calculate sharing amounts; use null so blank inputs produce blank cells
    {
      const pTotalRaw=data.part_total_cost_with_tax;
      const lTotalRaw=data.labour_total_cost_with_tax;
      const pTotal=parseFloat(pTotalRaw)||0;
      const lTotal=parseFloat(lTotalRaw)||0;
      const hasP=!!(pTotalRaw&&pTotal);
      const hasL=!!(lTotalRaw&&lTotal);
      const hPctP=parseFloat(data.hmil_share_pct_part)||0;
      const dPctP=parseFloat(data.dealer_share_pct_part)||0;
      const cPctP=parseFloat(data.customer_share_pct_part)||0;
      const hPctL=parseFloat(data.hmil_share_pct_labour)||0;
      const dPctL=parseFloat(data.dealer_share_pct_labour)||0;
      const cPctL=parseFloat(data.customer_share_pct_labour)||0;
      // Part sharing amounts — null if no part total entered
      data.ndms_hmil_amt_part   = hasP ? +((pTotal*hPctP)/100).toFixed(2) : null;
      data.ndms_dealer_amt_part = hasP ? +((pTotal*dPctP)/100).toFixed(2) : null;
      data.ndms_cust_amt_part   = hasP ? +((pTotal*cPctP)/100).toFixed(2) : null;
      // Labour sharing amounts — null if no labour total entered
      data.ndms_hmil_amt_labour   = hasL ? +((lTotal*hPctL)/100).toFixed(2) : null;
      data.ndms_dealer_amt_labour = hasL ? +((lTotal*dPctL)/100).toFixed(2) : null;
      data.ndms_cust_amt_labour   = hasL ? +((lTotal*cPctL)/100).toFixed(2) : null;
      // Grand totals — null if neither part nor labour entered
      data.ndms_grand_total      = (hasP||hasL) ? +(pTotal+lTotal).toFixed(2) : null;
      data.ndms_grand_hmil_amt   = (hasP||hasL) ? +(((pTotal*hPctP)+(lTotal*hPctL))/100).toFixed(2) : null;
      data.ndms_grand_dealer_amt = (hasP||hasL) ? +(((pTotal*dPctP)+(lTotal*dPctL))/100).toFixed(2) : null;
      data.ndms_grand_cust_amt   = (hasP||hasL) ? +(((pTotal*cPctP)+(lTotal*cPctL))/100).toFixed(2) : null;
    }

    // Veh History — per row — keys must match replaceVehHistoryXml lookup format sh${i}_*
    for(let i=1;i<=20;i++){
      data[`sl_no_${i}`]=String(i);
      data[`sh${i}_dealer_no`]=get(`sh${i}_dealer_no`)||'N3235';
      data[`sh${i}_ro_no`]=get(`sh${i}_ro_no`);
      data[`sh${i}_ro_date`]=get(`sh${i}_ro_date`);
      data[`sh${i}_vin`]=get(`sh${i}_vin`);
      data[`sh${i}_mileage`]=get(`sh${i}_mileage`);
      data[`sh${i}_work_type`]=get(`sh${i}_work_type`);
      data[`sh${i}_reg_no`]=get(`sh${i}_reg_no`);
      data[`sh${i}_remarks`]=get(`sh${i}_remarks`);
    }

    const zip=await JSZip.loadAsync(templateBuffer);
    // Remove calcChain to prevent "unreadable content" error — Excel will recalculate fresh
    zip.remove('xl/calcChain.xml');

    const xmlEsc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');

    // Numeric fields - these should inject as numbers, not text
    const numericFields=new Set([
      'mileage_km','pdi_cca','pdi_soc','analyser_cca','analyser_soc',
      'part_list_price_1','part_list_price_2','part_qty_1','part_qty_2',
      'part_amount_1','part_amount_2',
      'labour_list_price_1','labour_list_price_2','labour_qty_1','labour_qty_2',
      'labour_amount_1','labour_amount_2',
      'part_total_cost_with_tax','labour_total_cost_with_tax',
      'hmil_share_pct_part','dealer_share_pct_part','customer_share_pct_part',
      'hmil_share_pct_labour','dealer_share_pct_labour','customer_share_pct_labour',
      // NDMS calculated amounts (injected directly into formula cells)
      'ndms_hmil_amt_part','ndms_dealer_amt_part','ndms_cust_amt_part',
      'ndms_hmil_amt_labour','ndms_dealer_amt_labour','ndms_cust_amt_labour',
      'ndms_grand_total','ndms_grand_hmil_amt','ndms_grand_dealer_amt','ndms_grand_cust_amt'
    ]);

    // Replace in shared strings (text cells)
    const replacePlaceholders=xml=>{
      // Replace in <t> tags (shared strings / text cells)
      xml=xml.replace(/<t([^>]*)>([^<]*\{[^<]*)<\/t>/g,(match,attrs,content)=>{
        const replaced=content.replace(/\{([^}]+)\}/g,(_,key)=>{
          return xmlEsc((data[key]===undefined||data[key]===null)?'':data[key]);
        });
        return `<t${attrs}>${replaced}</t>`;
      });
      // Replace in <v> tags for numeric cells — remove t="s" attr and set raw number
      xml=xml.replace(/<c([^>]*)\sr="([^"]+)"([^>]*)>\s*<v>\{([^}]+)\}<\/v>/g,(match,pre,ref,post,key)=>{
        const val=data[key];
        if(val===undefined||val===null||val==='')return `<c${pre} r="${ref}"${post}><v></v>`;
        const numVal=parseFloat(String(val).replace(/,/g,''));
        if(!isNaN(numVal)&&numericFields.has(key)){
          // Remove t="s" to make it a numeric cell
          const attrs=(pre+post).replace(/\s*t="s"/g,'');
          return `<c${attrs} r="${ref}"><v>${numVal}</v>`;
        }
        return match;
      });

      // ── FIX: Handle numeric fields stored as inlineStr or sharedStr in sheet XML ──
      // After sharedStrings substitution, cells with numeric placeholders may still be t="s"
      // pointing to a now-replaced text value. Re-scan sheet XML for cells whose shared
      // string value resolved to a numeric field and convert them to proper number cells.
      // This is done per-sheet after sharedStrings pass (see sheet loop below).
      return xml;
    };

    // Extra pass: scan sheet XML and convert numeric-field cells from text→number
    const convertNumericCellsInSheet=(shXml, ssXmlAfter)=>{
      const ssMap={};
      let si=0;
      ssXmlAfter.replace(/<si>[\s\S]*?<\/si>/g,match=>{
        const tMatch=match.match(/<t[^>]*>([^<]*)<\/t>/);
        ssMap[si]=tMatch?tMatch[1]:'';
        si++;
        return match;
      });
      return shXml.replace(/<c\s([^>]*)t="s"([^>]*)>\s*<v>(\d+)<\/v>\s*<\/c>/g,(match,pre,post,idx)=>{
        const resolved=ssMap[parseInt(idx)];
        // Blank cell when placeholder resolved to empty
        if(resolved===''||resolved===undefined||resolved===null){
          const attrs=(pre+post).replace(/\s*t="s"/g,'');
          return `<c ${attrs}></c>`;
        }
        const numVal=parseFloat(String(resolved).replace(/,/g,''));
        if(!isNaN(numVal)&&String(numVal)===String(resolved).trim()){
          const attrs=(pre+post).replace(/\s*t="s"/g,'');
          return `<c ${attrs}><v>${numVal}</v></c>`;
        }
        return match;
      });
    };

    // Process sharedStrings
    const ssPath=Object.keys(zip.files).find(p=>p.match(/sharedStrings\.xml$/i));
    let ssXmlAfter='';
    if(ssPath){
      let ssXml=await zip.files[ssPath].async('string');
      ssXml=replacePlaceholders(ssXml);
      ssXmlAfter=ssXml;
      zip.file(ssPath,ssXml);
    }

    // Process each sheet
    const sheetPaths=Object.keys(zip.files).filter(p=>p.match(/xl\/worksheets\/sheet\d+\.xml$/i));
    for(const sp of sheetPaths){
      let shXml=await zip.files[sp].async('string');
      if(sp.match(/sheet5\.xml$/i)){
        // Vehicle History sheet — full rebuild via inlineStr
        shXml=replaceVehHistoryXml(shXml,data);
      }else if(sp.match(/sheet4\.xml$/i)){
        // NDMS sheet — replace placeholders + inject calculated values into formula cells
        if(shXml.includes('{'))shXml=replacePlaceholders(shXml);
        if(ssXmlAfter) shXml=convertNumericCellsInSheet(shXml,ssXmlAfter);
        shXml=replaceNDMSFormulaXml(shXml,data);
      }else if(sp.match(/sheet3\.xml$/i)){
        // Invoice sheet — replace placeholders + inject calculated totals into formula cells
        if(shXml.includes('{'))shXml=replacePlaceholders(shXml);
        if(ssXmlAfter) shXml=convertNumericCellsInSheet(shXml,ssXmlAfter);
        shXml=replaceInvoiceFormulaXml(shXml,data);
      }else{
        if(shXml.includes('{'))shXml=replacePlaceholders(shXml);
        // ── FIX BUG 1: convert shared-string cells that resolved to numbers into proper numeric cells ──
        if(ssXmlAfter) shXml=convertNumericCellsInSheet(shXml,ssXmlAfter);
      }
      zip.file(sp,shXml);
    }

    // ── PHOTO INJECTION + PLACEHOLDER REMOVAL ──
    // For uploaded photos: replace media bytes in xl/media/
    // For missing photos: remove the anchor from drawing XML + its relationship entry

    const photoMap=[
      // drawing1 — photo_1..10 → rId1..rId10 → image1..10.jpeg
      {key:'photo_1',   file:'image1.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId1'},
      {key:'photo_2',   file:'image2.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId2'},
      {key:'photo_3',   file:'image3.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId3'},
      {key:'photo_4',   file:'image4.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId4'},
      {key:'photo_5',   file:'image5.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId5'},
      {key:'photo_6',   file:'image6.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId6'},
      {key:'photo_7',   file:'image7.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId7'},
      {key:'photo_8',   file:'image8.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId8'},
      {key:'photo_9',   file:'image9.jpeg',  drawing:'xl/drawings/drawing1.xml', rId:'rId9'},
      {key:'photo_10',  file:'image10.jpeg', drawing:'xl/drawings/drawing1.xml', rId:'rId10'},
      // drawing2 — invoice pics
      {key:'invoice_pic3', file:'image11.jpeg', drawing:'xl/drawings/drawing2.xml', rId:'rId1'},
      {key:'invoice_pic4', file:'image12.jpeg', drawing:'xl/drawings/drawing2.xml', rId:'rId2'},
      {key:'ndms_pic1',    file:'image13.jpeg', drawing:'xl/drawings/drawing2.xml', rId:'rId3'},
      // drawing3 — PWA screen
      {key:'invoice_pwa',  file:'image14.jpeg', drawing:'xl/drawings/drawing3.xml', rId:'rId1'},
    ];

    // Collect which rIds to remove per drawing (those with no uploaded photo)
    const drawingRemovals={}; // drawingPath → Set of rIds to remove
    for(const {key,drawing,rId} of photoMap){
      const photo=PHOTOS[key];
      if(!photo||!photo.dataUrl){
        if(!drawingRemovals[drawing]) drawingRemovals[drawing]=new Set();
        drawingRemovals[drawing].add(rId);
      }
    }

    // Inject uploaded photos
    for(const {key,file} of photoMap){
      const photo=PHOTOS[key];
      if(!photo||!photo.dataUrl) continue;
      const bytes=dataUrlToBytes(photo.dataUrl);
      const mime=mimeFromDataUrl(photo.dataUrl);
      const ext=extFromMime(mime);
      zip.file(`xl/media/${file}`,bytes);
      if(ext!=='jpg'){
        const ctPath='[Content_Types].xml';
        let ct=await zip.files[ctPath].async('string');
        if(!ct.includes(`Extension="${ext}"`)){
          ct=ct.replace('</Types>',`<Default Extension="${ext}" ContentType="${mime}"/></Types>`);
          zip.file(ctPath,ct);
        }
      }
    }

    // Remove anchors for missing photos from drawing XML + their rels entries
    for(const [drawingPath, ridsToRemove] of Object.entries(drawingRemovals)){
      // --- Drawing XML: strip twoCellAnchor blocks that reference any removed rId ---
      let dXml=await zip.files[drawingPath].async('string');
      dXml=dXml.replace(/<xdr:twoCellAnchor[\s\S]*?<\/xdr:twoCellAnchor>/g,anchor=>{
        const ridMatch=anchor.match(/r:embed="([^"]+)"/);
        if(ridMatch&&ridsToRemove.has(ridMatch[1])) return '';
        return anchor;
      });
      zip.file(drawingPath,dXml);

      // --- Drawing rels: strip Relationship entries for removed rIds ---
      const relsPath=drawingPath.replace('xl/drawings/','xl/drawings/_rels/')+ '.rels';
      if(zip.files[relsPath]){
        let rXml=await zip.files[relsPath].async('string');
        for(const rId of ridsToRemove){
          rXml=rXml.replace(new RegExp(`<Relationship[^>]*Id="${rId}"[^>]*/>`,'g'),'');
        }
        zip.file(relsPath,rXml);
      }
    }

    const outBuf=await zip.generateAsync({type:'arraybuffer',compression:'DEFLATE',compressionOptions:{level:6}});
    const vinClean=(data.vin_number||'NOVIN').replace(/[^a-zA-Z0-9]/g,'');
    const dealerClean=(data['sh1_dealer_no']||'N3235').replace(/[^a-zA-Z0-9]/g,'');
    const fname=`${vinClean}_${dealerClean}.xlsx`;
    saveAs(new Blob([outBuf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),fname);
    showStatus('Downloaded: '+fname,'success');

    // Save history — everything except photos
    const histEntry={};
    // Battery Data
    ['model','vin_number','mileage_km','battery_spec_ah','agm_supplier_name',
     'sale_date','repair_date','battery_production_date','vehicle_received_date',
     'pdi_inspection_result','pdi_voltage','pdi_cca','pdi_soc',
     'analyser_voltage','analyser_cca','analyser_soc','analyser_result','result_slip',
     'dealer_action','battery_availability'].forEach(k=>histEntry[k]=data[k]||'');
    // Invoice — Parts & Labour rows
    for(let i=1;i<=2;i++){
      ['si_no','part_number','part_description','part_list_price','part_qty','part_amount'].forEach(f=>histEntry[`${f}_${i}`]=data[`${f}_${i}`]||'');
      ['si_no_labour','labour_code','labour_description','labour_list_price','labour_qty','labour_amount'].forEach(f=>histEntry[`${f}_${i}`]=data[`${f}_${i}`]||'');
    }
    // NDMS
    ['part_total_cost_with_tax','labour_total_cost_with_tax',
     'hmil_share_pct_part','dealer_share_pct_part','customer_share_pct_part',
     'hmil_share_pct_labour','dealer_share_pct_labour','customer_share_pct_labour'].forEach(k=>histEntry[k]=data[k]||'');
    // Vehicle History rows
    for(let i=1;i<=20;i++){
      ['dealer_no','ro_no','ro_date','vin','mileage','work_type','reg_no','remarks'].forEach(f=>histEntry[`sh${i}_${f}`]=data[`sh${i}_${f}`]||'');
    }
    saveHistory(histEntry);

  }catch(err){showStatus('Error: '+err.message,'error');console.error(err);}
  finally{btnInject.disabled=false;btnInject.textContent='Generate XLSX';}
});

// ─── NDMS SHEET — INJECT VALUES + FIX % CELL FORMAT ───
// Excel sheet4 layout (NDMS):
//   Row 2: Part   — M2=part_total, N2=hmil_pct, P2=dealer_pct, R2=cust_pct  (% input cells, s="38" = numFmtId=14 date — BUG)
//                   O2=formula M2*N2%, Q2=formula M2*P2%, S2=formula M2*R2%
//   Row 3: Labour — M3=labour_total, N3..R3 same pattern
//   Row 4: Total  — M4=formula, O4=formula, Q4=formula, S4=formula
// FIX: % input cells have s="38" (numFmtId=14, date format) → storing 80 displays as a date.
//      Switch to s="37" (numFmtId=0, General, same font/fill/border) so 80 displays as "80".
//      The Excel formulas =M2*N2% treat N2 as a plain number (80 → 80/100 = 0.8) — correct math.
function replaceNDMSFormulaXml(shXml, data){
  // % input cells: swap style 38 (date) → 37 (General), then inject plain number
  const pctCells=new Set(['N2','P2','R2','N3','P3','R3']);
  // Formula result cells: replace formula with computed value; blank if no input
  const formulaCellMap={
    'O2':'ndms_hmil_amt_part',   'Q2':'ndms_dealer_amt_part',   'S2':'ndms_cust_amt_part',
    'O3':'ndms_hmil_amt_labour', 'Q3':'ndms_dealer_amt_labour', 'S3':'ndms_cust_amt_labour',
    'M4':'ndms_grand_total',
    'O4':'ndms_grand_hmil_amt',  'Q4':'ndms_grand_dealer_amt',  'S4':'ndms_grand_cust_amt',
  };
  // Inject % input cells with corrected style
  shXml=shXml.replace(/<c\s+r="([^"]+)"([^>]*)>[\s\S]*?<\/c>/g,(match,ref,attrs)=>{
    if(pctCells.has(ref)){
      const rawKey={N2:'hmil_share_pct_part',P2:'dealer_share_pct_part',R2:'customer_share_pct_part',
                    N3:'hmil_share_pct_labour',P3:'dealer_share_pct_labour',R3:'customer_share_pct_labour'}[ref];
      const rawVal=data[rawKey];
      // Fix style: replace s="38" with s="37" (General format, same visual style)
      const fixedAttrs=attrs.replace(/s="38"/g,'s="37"');
      if(!rawVal&&rawVal!==0) return `<c r="${ref}"${fixedAttrs}></c>`;
      const numVal=parseFloat(rawVal);
      if(isNaN(numVal)) return `<c r="${ref}"${fixedAttrs}></c>`;
      return `<c r="${ref}"${fixedAttrs}><v>${numVal}</v></c>`;
    }
    if(ref in formulaCellMap){
      const val=data[formulaCellMap[ref]];
      const sMatch=attrs.match(/\ss="(\d+)"/);
      const sAttr=sMatch?` s="${sMatch[1]}"`:'';
      if(val===undefined||val===null||val===''||val===0) return `<c r="${ref}"${sAttr}></c>`;
      const numVal=parseFloat(String(val));
      if(isNaN(numVal)) return `<c r="${ref}"${sAttr}></c>`;
      return `<c r="${ref}"${sAttr}><v>${numVal}</v></c>`;
    }
    return match;
  });
  return shXml;
}

// ─── INVOICE SHEET — FULL DIRECT INJECTION ───
// Actual Excel layout (Estimation section, columns Q–W):
//   Row 2:  Part headers
//   Row 3:  Part row 1   — Q3..V3 data, W3=formula V3*1.18
//   Row 4:  Part row 2   — Q4..V4 data, W4=formula V4*1.18
//   Row 5:  Parts subtotal  — V5=SUM(V3:V4), W5=SUM(W3:W4)
//   Row 6:  Labour headers
//   Row 7:  Labour row 1 — Q7..V7 data, W7=formula V7*1.18
//   Row 8:  Labour row 2 — Q8..V8 data, W8=formula V8*1.18
//   Row 9:  Labour subtotal — V9=SUM(V7:V8), W9=SUM(W7:W8)
//   Row 10: Grand total   — W10=SUM(W5+W9)
function replaceInvoiceFormulaXml(shXml, data){
  const xmlEsc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
  const n=k=>parseFloat(data[k]||0);
  // Only treat a row as having data if both price and qty are entered
  const p1HasData = !!(data.part_list_price_1&&data.part_qty_1);
  const p2HasData = !!(data.part_list_price_2&&data.part_qty_2);
  const l1HasData = !!(data.labour_list_price_1&&data.labour_qty_1);
  const l2HasData = !!(data.labour_list_price_2&&data.labour_qty_2);

  const p1amt = p1HasData ? +(n('part_list_price_1')*n('part_qty_1')).toFixed(2) : null;
  const p2amt = p2HasData ? +(n('part_list_price_2')*n('part_qty_2')).toFixed(2) : null;
  const l1amt = l1HasData ? +(n('labour_list_price_1')*n('labour_qty_1')).toFixed(2) : null;
  const l2amt = l2HasData ? +(n('labour_list_price_2')*n('labour_qty_2')).toFixed(2) : null;

  const w3  = p1amt!==null ? +(p1amt*1.18).toFixed(2) : null;
  const w4  = p2amt!==null ? +(p2amt*1.18).toFixed(2) : null;
  const w7  = l1amt!==null ? +(l1amt*1.18).toFixed(2) : null;
  const w8  = l2amt!==null ? +(l2amt*1.18).toFixed(2) : null;

  const partsAmtTotal  = (p1amt!==null||p2amt!==null) ? +((p1amt||0)+(p2amt||0)).toFixed(2) : null;
  const partsTaxTotal  = (w3!==null||w4!==null) ? +((w3||0)+(w4||0)).toFixed(2) : null;
  const labourAmtTotal = (l1amt!==null||l2amt!==null) ? +((l1amt||0)+(l2amt||0)).toFixed(2) : null;
  const labourTaxTotal = (w7!==null||w8!==null) ? +((w7||0)+(w8||0)).toFixed(2) : null;
  const grandTotal     = (partsTaxTotal!==null||labourTaxTotal!==null) ? +((partsTaxTotal||0)+(labourTaxTotal||0)).toFixed(2) : null;

  // [value, 'str'|'num'] — null value means leave cell blank
  const cellMap={
    // Part row 1
    'Q3':[data.si_no_1||null,'str'],
    'R3':[data.part_number_1||null,'str'],
    'S3':[data.part_description_1||null,'str'],
    'T3':[data.part_list_price_1?n('part_list_price_1'):null,'num'],
    'U3':[data.part_qty_1?n('part_qty_1'):null,'num'],
    'V3':[p1amt,'num'],
    'W3':[w3,'num'],
    // Part row 2
    'Q4':[data.si_no_2||null,'str'],
    'R4':[data.part_number_2||null,'str'],
    'S4':[data.part_description_2||null,'str'],
    'T4':[data.part_list_price_2?n('part_list_price_2'):null,'num'],
    'U4':[data.part_qty_2?n('part_qty_2'):null,'num'],
    'V4':[p2amt,'num'],
    'W4':[w4,'num'],
    // Parts subtotal (W/O tax & with tax)
    'V5':[partsAmtTotal,'num'],
    'W5':[partsTaxTotal,'num'],
    // Labour row 1
    'Q7':[data.si_no_labour_1||null,'str'],
    'R7':[data.labour_code_1||null,'str'],
    'S7':[data.labour_description_1||null,'str'],
    'T7':[data.labour_list_price_1?n('labour_list_price_1'):null,'num'],
    'U7':[data.labour_qty_1?n('labour_qty_1'):null,'num'],
    'V7':[l1amt,'num'],
    'W7':[w7,'num'],
    // Labour row 2
    'Q8':[data.si_no_labour_2||null,'str'],
    'R8':[data.labour_code_2||null,'str'],
    'S8':[data.labour_description_2||null,'str'],
    'T8':[data.labour_list_price_2?n('labour_list_price_2'):null,'num'],
    'U8':[data.labour_qty_2?n('labour_qty_2'):null,'num'],
    'V8':[l2amt,'num'],
    'W8':[w8,'num'],
    // Labour subtotal (W/O tax & with tax)
    'V9':[labourAmtTotal,'num'],
    'W9':[labourTaxTotal,'num'],
    // Grand total (parts with tax + labour with tax)
    'W10':[grandTotal,'num'],
  };

  return shXml.replace(/<c\s+r="([^"]+)"([^>]*)>[\s\S]*?<\/c>/g,(match,ref,attrs)=>{
    if(!(ref in cellMap)) return match;
    const [val,type]=cellMap[ref];
    const sMatch=attrs.match(/\ss="(\d+)"/);
    const sAttr=sMatch?` s="${sMatch[1]}"`:'';
    // Blank cell when no data entered
    if(val===null||val===undefined||val==='') return `<c r="${ref}"${sAttr}></c>`;
    if(type==='str'){
      return `<c r="${ref}"${sAttr} t="inlineStr"><is><t>${xmlEsc(String(val))}</t></is></c>`;
    } else {
      return `<c r="${ref}"${sAttr}><v>${+val}</v></c>`;
    }
  });
}

// ─── VEH HISTORY — ROBUST FIX ───
// ROOT CAUSE 1: Hardcoded sharedString indices (121-128) may not match actual Excel file.
// ROOT CAUSE 2: replaceVehHistoryXml only replaces cells with t="s" — but if Excel stored
//               placeholder cells differently the regex misses them.
// FIX: Dynamically discover column mapping from row 4, then rebuild ALL data rows (4-23)
//      by column reference (A,B,C...) regardless of original cell type.
function replaceVehHistoryXml(shXml, data){
  const xmlEsc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');

  // Column letter → field name mapping (positional — matches table header order)
  // Columns in sheet: B=sl_no, C=dealer_no, D=ro_no, E=ro_date, F=vin, G=mileage, H=work_type, I=reg_no, J=remarks
  // We derive this from the INPUT IDs: sh{i}_dealer_no etc.
  // Map column letter to data key suffix
  const colLetterToField={
    'B':'sl_no',
    'C':'dealer_no',
    'D':'ro_no',
    'E':'ro_date',
    'F':'vin',
    'G':'mileage',
    'H':'work_type',
    'I':'reg_no',
    'J':'remarks'
  };

  // Helper: get column letter from cell ref (e.g. "C5" → "C", "AA5" → "AA")
  const getCol=ref=>ref.replace(/\d+/,'');

  return shXml.replace(/(<row\b[^>]*r="(\d+)"[^>]*>)([\s\S]*?)(<\/row>)/g,(match,openTag,rowNum,content,closeTag)=>{
    const rn=parseInt(rowNum);
    // Data rows: row 4 = data row 1 ... row 23 = data row 20
    if(rn<4||rn>23) return match;
    const dataIdx=rn-3; // 1..20

    const rowVals={
      sl_no:    String(dataIdx),
      dealer_no: data[`sh${dataIdx}_dealer_no`]||'N3235',
      ro_no:     data[`sh${dataIdx}_ro_no`]||'',
      ro_date:   data[`sh${dataIdx}_ro_date`]||'',
      vin:       data[`sh${dataIdx}_vin`]||'',
      mileage:   data[`sh${dataIdx}_mileage`]||'',
      work_type: data[`sh${dataIdx}_work_type`]||'',
      reg_no:    data[`sh${dataIdx}_reg_no`]||'',
      remarks:   data[`sh${dataIdx}_remarks`]||'',
    };

    // Rebuild ALL cells in this row
    // Replace existing cells with inlineStr values
    const newContent=content.replace(/<c\s[^>]*r="([^"]+)"[^>]*>[\s\S]*?<\/c>/g,(cellMatch,ref)=>{
      const col=getCol(ref);
      const fieldKey=colLetterToField[col];
      if(!fieldKey) return cellMatch; // unknown column, leave as-is

      const val=xmlEsc(rowVals[fieldKey]||'');
      // Extract style attribute if present
      const sMatch=cellMatch.match(/\ss="(\d+)"/);
      const sAttr=sMatch?` s="${sMatch[1]}"`:'';
      // Write as inlineStr — works regardless of original cell type
      return `<c r="${ref}"${sAttr} t="inlineStr"><is><t>${val}</t></is></c>`;
    });

    return openTag+newContent+closeTag;
  });
}

// ─── PAGE JUMPERS ───
(function(){
  const jumperHTML=`<div class="page-jumper" id="pageJumper">
    <button class="pj-btn hidden" id="pjTop" title="Go to top" tabindex="0" aria-label="Scroll to top">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button class="pj-btn hidden" id="pjBottom" title="Go to bottom" tabindex="0" aria-label="Scroll to bottom">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',jumperHTML);

  const topBtn=document.getElementById('pjTop');
  const botBtn=document.getElementById('pjBottom');
  let hideTimer=null;

  function showJumpers(){
    const scrollTop=window.scrollY||document.documentElement.scrollTop;
    const scrollHeight=document.documentElement.scrollHeight;
    const clientHeight=window.innerHeight;
    const isScrollable=scrollHeight>clientHeight+50;
    const nearTop=scrollTop<120;
    const nearBottom=scrollTop+clientHeight>scrollHeight-120;
    topBtn.classList.toggle('hidden',nearTop||!isScrollable);
    botBtn.classList.toggle('hidden',nearBottom||!isScrollable);
  }

  function scheduleHide(){
    clearTimeout(hideTimer);
    hideTimer=setTimeout(()=>{
      topBtn.classList.add('hidden');
      botBtn.classList.add('hidden');
    },2000);
  }

  function onScroll(){
    showJumpers();
    scheduleHide();
  }

  window.addEventListener('scroll',onScroll,{passive:true});
  window.addEventListener('resize',()=>{showJumpers();},{passive:true});
  // Show bottom button immediately on load
  setTimeout(showJumpers,300);

  topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  botBtn.addEventListener('click',()=>window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}));
  [topBtn,botBtn].forEach(b=>b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();b.click();}}));
})();

// ─── THEME + BACKUP ───
window.addEventListener('message',event=>{
  if(event.data?.type==='theme')document.documentElement.setAttribute('data-theme',event.data.theme);
  if(event.data?.type==='backup-request'){
    const payload={};
    try{const v=localStorage.getItem('agm_hist');if(v)payload['agm_hist']=v;}catch(e){}
    event.source.postMessage({type:'backup-response',tool:'agm',data:payload},'*');
  }
  if(event.data?.type==='restore-data'&&event.data.tool==='agm'&&event.data.data){
    Object.entries(event.data.data).forEach(([k,v])=>{try{localStorage.setItem(k,v);}catch(e){}});
    try{HISTORY=JSON.parse(localStorage.getItem('agm_hist')||'[]');}catch(e){}renderHistory();
  }
});
window.parent.postMessage({type:'requestTheme'},'*');
</script>
