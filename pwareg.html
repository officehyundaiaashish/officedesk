<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PWA Regular</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root {
  --bg-page:#f4f4f2; --bg-card:#ffffff; --bg-input:#ffffff;
  --bg-hover:#f0f0ee; --bg-active:#e3e3df;
  --text-main:#181816; --text-label:#181816; --text-muted:#6a6a67; --text-placeholder:#9a9a97;
  --border-light:#e3e3df; --border-input:#e3e3df; --border-focus:#002C5F;
  --accent-bg:#002C5F; --accent-text:#ffffff;
  --focus-ring:rgba(0,44,95,0.1); --danger-color:#ef4444; --table-head:#f0f0ee;
}
[data-theme=dark] {
  --bg-page:#111110; --bg-card:#1c1c1a; --bg-input:#1c1c1a;
  --bg-hover:#232321; --bg-active:#2d2d2b;
  --text-main:#f0f0ee; --text-label:#f0f0ee; --text-muted:#888885; --text-placeholder:#525250;
  --border-light:#2d2d2b; --border-input:#2d2d2b; --border-focus:#4D8FD6;
  --accent-bg:#4D8FD6; --accent-text:#111110;
  --focus-ring:rgba(77,143,214,0.2); --danger-color:#f87171; --table-head:#232321;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg-page);color:var(--text-main);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px 80px;}

.card{background:var(--bg-card);border-radius:12px;width:100%;max-width:820px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);border:1px solid var(--border-light);}
.card-header{padding:16px 20px 14px;border-bottom:1px solid var(--border-light);}
.card-header h1{font-size:17px;font-weight:600;color:var(--text-main);}
.card-header p{font-size:12px;color:var(--text-muted);margin-top:3px;}

.stepper-container{padding:14px 20px;border-bottom:1px solid var(--border-light);background:var(--bg-card);position:sticky;top:0;z-index:900;}
.stepper{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;transition:all .18s;}
.step.done{background:rgba(0,44,95,.06);border-color:var(--accent-bg);}
[data-theme=dark] .step.done{background:rgba(77,143,214,.1);}
.step.active{border-color:var(--accent-bg);box-shadow:0 0 0 2px var(--focus-ring);}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--bg-hover);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.step.done .step-n{background:var(--accent-bg);color:var(--accent-text);}
.step.active .step-n{background:var(--accent-bg);color:var(--accent-text);}
.step-t{font-size:12px;font-weight:600;color:var(--text-main);}
.step-s{font-size:10.5px;color:var(--text-muted);}

.mode-wrap{margin:14px 20px 0;display:none;}
.mode-wrap.show{display:block;}
.mode-lbl{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.mode-btns{display:flex;gap:5px;}
.mode-btn{flex:1;height:32px;border-radius:6px;border:1.5px solid var(--border-input);background:var(--bg-hover);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .18s;outline:none;}
.mode-btn:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.mode-btn:hover{border-color:var(--text-muted);color:var(--text-main);}
.mode-btn.active{background:var(--accent-bg);border-color:var(--accent-bg);color:var(--accent-text);}

.history-wrap{padding:16px 20px 24px;display:none;}
.history-wrap.show{display:block;}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hist-title{font-size:13px;font-weight:600;}
.hist-clr{font-size:12px;color:var(--text-muted);cursor:pointer;background:none;border:none;transition:color .2s;padding:0;outline:none;}
.hist-clr:hover,.hist-clr:focus{color:var(--danger-color);}
.search-input{width:100%;height:38px;border:1px solid var(--border-input);border-radius:7px;padding:0 12px;font-size:13px;margin-bottom:12px;outline:none;transition:all .2s;background:var(--bg-hover);color:var(--text-main);}
.search-input:focus{border-color:var(--border-focus);background:var(--bg-input);box-shadow:0 0 0 3px var(--focus-ring);}
.search-input::placeholder{color:var(--text-placeholder);}
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto;}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid var(--border-light);border-radius:7px;cursor:pointer;background:var(--bg-input);transition:all .2s;outline:none;}
.hist-item:hover,.hist-item:focus{background:var(--bg-hover);}
.hi-info{flex:1;min-width:0;}
.hi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.hi-del{background:none;border:none;color:var(--border-input);cursor:pointer;transition:color .2s;display:flex;align-items:center;outline:none;}
.hi-del:hover,.hi-del:focus{color:var(--danger-color);}

.form-section{padding:14px 20px 0;}
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;border-bottom:1px solid var(--border-light);padding-bottom:6px;letter-spacing:.05em;}
.grid-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.field-col{display:flex;flex-direction:column;gap:4px;min-width:0;}
.field-col.full{grid-column:1/-1;}
.field-col label{font-size:11.5px;font-weight:500;color:var(--text-label);}
.field-col input,.field-col textarea{border:1px solid var(--border-input);border-radius:7px;padding:0 11px;font-size:13px;color:var(--text-main);background:var(--bg-input);transition:all .2s;width:100%;outline:none;font-family:'Inter',sans-serif;}
.field-col input{height:36px;}
.field-col textarea{padding:8px 11px;min-height:68px;resize:vertical;line-height:1.5;}
.field-col input::placeholder,.field-col textarea::placeholder{color:var(--text-placeholder);}
.field-col input:focus,.field-col textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.field-col input.pre{color:var(--text-muted);}

.custom-select-wrap{position:relative;user-select:none;width:100%;}
.custom-select-trigger{height:36px;border:1px solid var(--border-input);border-radius:7px;padding:0 11px;background:var(--bg-input);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;width:100%;outline:none;}
.custom-select-trigger:hover{border-color:var(--text-placeholder);}
.custom-select-trigger:focus,.custom-select-trigger.active{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.cs-val{font-size:13px;color:var(--text-main);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;}
.cs-val.empty{color:var(--text-placeholder);}
.cs-arr{color:var(--text-placeholder);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;}
.custom-select-trigger.active .cs-arr{transform:rotate(180deg);color:var(--text-main);}
.custom-select-opts{position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:500;background:var(--bg-card);border:1px solid var(--border-input);border-radius:7px;box-shadow:0 10px 25px -5px rgba(0,0,0,.2);max-height:200px;overflow-y:auto;opacity:0;transform:translateY(-8px) scaleY(.95);transform-origin:top;pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1);}
.custom-select-opts.open{opacity:1;transform:translateY(0) scaleY(1);pointer-events:all;}
.cs-opt{padding:9px 11px;font-size:12.5px;color:var(--text-main);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border-light);outline:none;}
.cs-opt:last-child{border-bottom:none;}
.cs-opt:hover,.cs-opt:focus{background:var(--bg-hover);font-weight:500;}

.date-trigger{height:36px;display:flex;align-items:center;padding:0 11px;cursor:pointer;user-select:none;gap:7px;border:1px solid var(--border-input);border-radius:7px;background:var(--bg-input);transition:all .2s;position:relative;width:100%;outline:none;}
.date-trigger:hover{border-color:var(--text-placeholder);}
.date-trigger:focus,.date-trigger.active{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.date-icon{color:var(--text-placeholder);display:flex;align-items:center;}
.dval{font-size:13px;color:var(--text-main);flex:1;}
.dval.empty{color:var(--text-placeholder);}
.cal-pop{position:absolute;top:calc(100% + 6px);left:0;z-index:400;background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;padding:14px;box-shadow:0 10px 25px -5px rgba(0,0,0,.2);width:250px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s ease;}
.cal-pop.open{opacity:1;transform:translateY(0);pointer-events:all;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mnth{font-size:13px;font-weight:600;cursor:pointer;padding:3px 6px;border-radius:5px;transition:background .2s;outline:none;}
.mnth:hover,.mnth:focus{background:var(--bg-hover);}
.cal-nav button{background:none;border:1px solid var(--border-input);border-radius:5px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s;outline:none;}
.cal-nav button:hover,.cal-nav button:focus{background:var(--bg-hover);color:var(--text-main);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-grid.years{grid-template-columns:repeat(3,1fr);gap:6px;}
.dn{font-size:9px;font-weight:600;text-transform:uppercase;color:var(--text-muted);text-align:center;padding-bottom:6px;}
.cd{font-size:12px;text-align:center;padding:7px 2px;border-radius:5px;cursor:pointer;color:var(--text-label);transition:all .15s;outline:none;}
.cal-grid.years .cd{padding:10px 4px;font-weight:500;}
.cd:hover,.cd:focus{background:var(--bg-hover);}
.cd.sel{background:var(--accent-bg)!important;color:var(--accent-text)!important;font-weight:500;}
.cd.today{font-weight:700;text-decoration:underline;}
.cd.om{color:var(--border-input);pointer-events:none;}

.tbl-wrap{overflow-x:auto;margin-top:4px;}
.pwa-table{width:100%;border-collapse:collapse;font-size:12.5px;user-select:none;}
.pwa-table th{background:var(--table-head);color:var(--text-muted);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:8px;text-align:left;border:1px solid var(--border-light);white-space:nowrap;}
.pwa-table td{border:1px solid var(--border-light);padding:0;vertical-align:middle;position:relative;}
.pwa-table td.num{width:28px;text-align:center;color:var(--text-muted);font-size:11px;background:var(--table-head);font-weight:600;padding:0 6px;white-space:nowrap;}
.pwa-table td.total-cell{background:var(--bg-hover);font-size:12.5px;font-weight:600;padding:0 8px;min-width:70px;white-space:nowrap;}
.pwa-table td.total-cell span{display:block;padding:8px 0;}
.pwa-table td input{width:100%;height:34px;border:none;background:transparent;color:var(--text-main);font-size:12.5px;font-family:'Inter',sans-serif;padding:0 8px;outline:none;transition:background .15s;}
.pwa-table td input:focus{background:var(--focus-ring);}
.pwa-table td input::placeholder{color:var(--text-placeholder);}

/* Excel-like Selection Styles & Frozen Tags */
.pwa-table td input.cell-selected {
  background-color: var(--focus-ring);
  box-shadow: inset 0 0 0 1.5px var(--border-focus);
}
.frozen-tag {
  background: var(--bg-hover) !important;
  color: var(--text-muted) !important;
  cursor: not-allowed;
}

.pwa-table tr.total-row td{background:var(--bg-hover);font-weight:700;font-size:12.5px;padding:8px;color:var(--text-main);}
.pwa-table tr.gtotal-row td{background:var(--accent-bg);color:var(--accent-text);font-weight:700;font-size:13px;padding:9px 8px;}

.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px;}
.photo-slot{position:relative;border:1.5px dashed var(--border-input);border-radius:7px;overflow:hidden;cursor:pointer;transition:all .2s;aspect-ratio:4/3;background:var(--bg-hover);}
.photo-slot:hover{border-color:var(--accent-bg);}
.photo-slot.filled{border-style:solid;border-color:var(--border-input);}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-slot .slot-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:600;text-align:center;padding:4px 3px;letter-spacing:.04em;text-transform:uppercase;z-index:2;}
.photo-slot .slot-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none;z-index:1;}
.photo-slot .slot-placeholder svg{color:var(--text-placeholder);}
.photo-slot .slot-placeholder span{font-size:9.5px;color:var(--text-placeholder);}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1;}
.photo-slot.filled img{display:block;}
.photo-slot.filled .slot-placeholder{display:none;}
.photo-slot .remove-btn{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;font-size:10px;line-height:1;}
.photo-slot.filled .remove-btn{display:flex;}


.status{margin:14px 20px 0;font-size:13px;padding:10px 14px;border-radius:7px;display:none;font-weight:500;}
.status.error{background:rgba(239,68,68,.1);color:var(--danger-color);border:1px solid rgba(239,68,68,.2);display:block;}
.status.success{background:rgba(34,197,94,.1);color:#15803d;border:1px solid rgba(34,197,94,.2);display:block;}
.actions{display:flex;gap:10px;padding:14px 20px 20px;border-top:1px solid var(--border-light);margin-top:14px;align-items:center;}
.btn{flex:1;height:42px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Inter',sans-serif;outline:none;}
.btn:focus{box-shadow:0 0 0 3px var(--focus-ring);}
.btn-inject{background:var(--accent-bg);color:var(--accent-text);}
.btn-inject:hover{opacity:.9;}
.btn-inject:disabled{opacity:.5;cursor:not-allowed;}
.btn-clear{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.25);}
.btn-clear:hover{background:rgba(239,68,68,.18);border-color:#ef4444;}
[data-theme=dark] .btn-clear{background:rgba(248,113,113,.12);color:#f87171;border-color:rgba(248,113,113,.25);}
[data-theme=dark] .btn-clear:hover{background:rgba(248,113,113,.2);}

/* Modern auto-hide scrollbar */
*{scrollbar-width:thin;scrollbar-color:transparent transparent;}
*:hover{scrollbar-color:rgba(0,0,0,.2) transparent;}
[data-theme=dark] *:hover{scrollbar-color:rgba(255,255,255,.15) transparent;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:transparent;border-radius:10px;}
*:hover::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);}
[data-theme=dark] *:hover::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg-card);border:1px solid var(--border-light);border-radius:10px;padding:20px;width:90%;max-width:340px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1);transform:scale(.95) translateY(10px);transition:all .2s cubic-bezier(.4,0,.2,1);}
.modal-overlay.show .modal-box{transform:scale(1) translateY(0);}
.modal-msg{font-size:14px;color:var(--text-main);font-weight:500;margin-bottom:20px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.modal-btn{padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:'Inter',sans-serif;outline:none;}
.modal-btn-cancel{background:var(--bg-active);color:var(--text-label);}
.modal-btn-cancel:hover,.modal-btn-cancel:focus{background:var(--border-input);color:var(--text-main);}
.modal-btn-ok{background:var(--danger-color);color:#fff;}
.modal-btn-ok:hover,.modal-btn-ok:focus{opacity:.9;box-shadow:0 0 0 3px rgba(239,68,68,.2);}

/* ── Page Jumpers ── */
.page-jumper{position:fixed;right:16px;bottom:80px;z-index:9000;display:flex;flex-direction:column;gap:8px;}
.pj{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:all .25s cubic-bezier(.4,0,.2,1);outline:none;background:var(--accent-bg);color:var(--accent-text);opacity:0;pointer-events:none;transform:translateY(12px);}
.pj:hover{transform:scale(1.12);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.pj:active{transform:scale(.95);}
.pj:focus{box-shadow:0 0 0 3px var(--focus-ring),0 4px 14px rgba(0,0,0,.2);}
.pj.vis{opacity:1;pointer-events:all;transform:translateY(0);}


/* ── Manual date input ── */
.date-manual{height:36px;border:1px solid var(--border-input);border-radius:7px;padding:0 10px;font-size:13px;color:var(--text-main);background:var(--bg-input);outline:none;font-family:'Inter',sans-serif;transition:all .2s;width:100%;}
.date-manual:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.date-manual::placeholder{color:var(--text-placeholder);}
.date-field-wrap{display:flex;gap:5px;}
.date-field-wrap .date-trigger{flex:0 0 36px;padding:0;justify-content:center;}

@media(max-width:640px){
  body{padding:10px 8px 70px;}
  .grid-wrap{grid-template-columns:1fr;gap:8px;}
  .card-header,.mode-wrap,.form-section,.actions,.history-wrap{padding-left:14px;padding-right:14px;}
  .actions{flex-wrap:wrap;flex-direction:row;}
  .photo-grid{grid-template-columns:repeat(3,1fr);}
  .stepper{grid-template-columns:repeat(2,1fr);}
  .page-jumper{right:10px;bottom:70px;}
}
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn modal-btn-ok" id="modalOk">Confirm</button>
    </div>
  </div>
</div>

<div class="page-jumper" id="pageJumper">
  <button id="pjTop" class="pj" title="Back to top" aria-label="Scroll to top"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></button>
  <button id="pjBot" class="pj" title="Go to bottom" aria-label="Scroll to bottom"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
</div>

<div class="card">
  <div class="card-header">
    <h1>PWA Regular</h1>
    <p>Prior Work Approval — fill form then generate Excel report.</p>
  </div>

  <div class="stepper-container" id="stepperContainer" style="display:none;">
    <div class="stepper">
      <div class="step" id="pw-st1" data-step="1">
        <div class="step-n" id="pw-sn1">1</div>
        <div><div class="step-t">Vehicle</div><div class="step-s">Dealer, VIN, model</div></div>
      </div>
      <div class="step" id="pw-st2" data-step="2">
        <div class="step-n" id="pw-sn2">2</div>
        <div><div class="step-t">Parts</div><div class="step-s">Part info, history</div></div>
      </div>
      <div class="step" id="pw-st3" data-step="3">
        <div class="step-n" id="pw-sn3">3</div>
        <div><div class="step-t">Labour</div><div class="step-s">Estimate, contacts</div></div>
      </div>
      <div class="step" id="pw-st4" data-step="4">
        <div class="step-n" id="pw-sn4">4</div>
        <div><div class="step-t">Photos</div><div class="step-s">Upload images</div></div>
      </div>
    </div>
  </div>

  <div class="mode-wrap" id="modeWrap">
    <div class="mode-lbl">Navigation</div>
    <div class="mode-btns">

function customConfirm(msg,okText='Yes'){
  return new Promise(resolve=>{
    const modal=document.getElementById('customModal'),msgEl=document.getElementById('modalMsg'),btnOk=document.getElementById('modalOk'),btnCancel=document.getElementById('modalCancel');
    msgEl.textContent=msg; btnOk.textContent=okText;
    const cleanup=()=>{modal.classList.remove('show');btnOk.removeEventListener('click',onOk);btnCancel.removeEventListener('click',onCancel);};
    const onOk=()=>{cleanup();resolve(true);},onCancel=()=>{cleanup();resolve(false);};
    btnOk.addEventListener('click',onOk);btnCancel.addEventListener('click',onCancel);
    modal.classList.add('show');btnCancel.focus();
  });
}

function closeAllPopups(){

}

function renderCal(id){
  const st=CAL[id],pop=document.getElementById('cp_'+id);
  if(!pop||!st) return;
  const y=st.year,m=st.month,now=new Date();
  if(st.view==='years'){
    const sy=y-7;
    let h=`<div class="cal-nav"><button type="button" class="cpb-y" data-id="${id}" data-dir="-15" tabindex="0">${icons.chevronLeft}</button><span class="mnth" tabindex="0">Year</span><button type="button" class="cpb-y" data-id="${id}" data-dir="15" tabindex="0">${icons.chevronRight}</button></div><div class="cal-grid years">`;
    for(let i=0;i<15;i++) h+=`<div class="cd ${sy+i===y?'sel':''}" data-id="${id}" data-y="${sy+i}" tabindex="0">${sy+i}</div>`;
    h+='</div>';pop.innerHTML=h;
    pop.querySelectorAll('.cpb-y').forEach(b=>{const a=e=>{e.stopPropagation();CAL[b.dataset.id].year+=parseInt(b.dataset.dir);renderCal(b.dataset.id);};b.addEventListener('click',a);handleKeyClick(b,a);});
    pop.querySelectorAll('.cd').forEach(el=>{const a=e=>{e.stopPropagation();CAL[el.dataset.id].year=parseInt(el.dataset.y);CAL[el.dataset.id].view='days';renderCal(el.dataset.id);};el.addEventListener('click',a);handleKeyClick(el,a);});
  }else{
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
    let h=`<div class="cal-nav"><button type="button" class="cpb" data-id="${id}" data-dir="-1" tabindex="0">${icons.chevronLeft}</button><span class="mnth ts" data-id="${id}" tabindex="0">${MONTHS[m]} ${y}</span><button type="button" class="cpb" data-id="${id}" data-dir="1" tabindex="0">${icons.chevronRight}</button></div><div class="cal-grid">${['S','M','T','W','T','F','S'].map(x=>`<div class="dn">${x}</div>`).join('')}`;
    for(let i=0;i<fd;i++) h+=`<div class="cd om">${prev-fd+1+i}</div>`;
    for(let d=1;d<=dim;d++){const iT=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();const iS=st.date&&d===st.date.getDate()&&m===st.date.getMonth()&&y===st.date.getFullYear();h+=`<div class="cd${iT?' today':''}${iS?' sel':''}" data-id="${id}" data-d="${d}" tabindex="0">${d}</div>`;}
    h+='</div>';pop.innerHTML=h;
    pop.querySelectorAll('.cpb').forEach(b=>{const a=e=>{e.stopPropagation();const s=CAL[b.dataset.id],dir=parseInt(b.dataset.dir);s.month+=dir;if(s.month<0){s.month=11;s.year--;}if(s.month>11){s.month=0;s.year++;}renderCal(b.dataset.id);};b.addEventListener('click',a);handleKeyClick(b,a);});
    const ts=pop.querySelector('.ts');const tsA=e=>{e.stopPropagation();CAL[e.target.dataset.id].view='years';renderCal(e.target.dataset.id);};ts.addEventListener('click',tsA);handleKeyClick(ts,tsA);
    pop.querySelectorAll('.cd:not(.om)').forEach(el=>{const a=e=>{e.stopPropagation();const s=CAL[el.dataset.id];s.date=new Date(s.year,s.month,parseInt(el.dataset.d));const fmt=fmtDash(s.date);const dv=document.getElementById('dv_'+el.dataset.id);if(dv){dv.textContent=fmt;dv.classList.remove('empty');}const manEl=document.getElementById('dm_'+el.dataset.id);if(manEl)manEl.value=fmt;closeAllPopups();renderCal(el.dataset.id);setTimeout(updateStepper,50);};el.addEventListener('click',a);handleKeyClick(el,a);});
  }
}

function openCal(id){
  closeAllPopups();
  if(!CAL[id]) CAL[id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth(),view:'days'};
  const ref=CAL[id].date||new Date();CAL[id].year=ref.getFullYear();CAL[id].month=ref.getMonth();CAL[id].view='days';
  renderCal(id);document.getElementById('cp_'+id)?.classList.add('open');document.getElementById('dt_'+id)?.classList.add('active');
}

function makeDateField(id,label){
  if(!CAL[id]) CAL[id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth(),view:'days'};
  const wrap=document.createElement('div');wrap.className='field-col';
  wrap.innerHTML=`<label>${label}</label>
  <div style="position:relative;">
    <div class="date-field-wrap">
      <input type="text" id="dm_${id}" class="date-manual" placeholder="DD-MM-YYYY" maxlength="10" tabindex="0">
      <div class="date-trigger" id="dt_${id}" tabindex="0" title="Open calendar"><span class="date-icon">${icons.calendar}</span></div>
    </div>
    <div class="cal-pop" id="cp_${id}"></div>
  </div>`;
  const pop=wrap.querySelector('.cal-pop');
  let wt;pop.addEventListener('wheel',e=>{e.preventDefault();if(wt)return;wt=setTimeout(()=>{wt=null;},150);const st=CAL[id];if(st.view==='years'){st.year+=e.deltaY>0?15:-15;}else{st.month+=e.deltaY>0?1:-1;if(st.month>11){st.month=0;st.year++;}else if(st.month<0){st.month=11;st.year--;}}renderCal(id);},{passive:false});
  requestAnimationFrame(()=>{
    const dt=document.getElementById('dt_'+id);
    const manEl=document.getElementById('dm_'+id);
    const a=e=>{e.stopPropagation();const isOpen=document.getElementById('cp_'+id)?.classList.contains('open');if(isOpen)closeAllPopups();else openCal(id);};
    dt?.addEventListener('click',a);handleKeyClick(dt,a);
    // Auto-format DD-MM-YYYY as user types
    manEl?.addEventListener('input',()=>{
      let v=manEl.value.replace(/[^0-9]/g,'');
      if(v.length>2)v=v.slice(0,2)+'-'+v.slice(2);
      if(v.length>5)v=v.slice(0,5)+'-'+v.slice(5);
      if(v.length>10)v=v.slice(0,10);
      manEl.value=v;
      if(v.length===10){
        const [dd,mm,yyyy]=v.split('-').map(Number);
        const d=new Date(yyyy,mm-1,dd);
        if(!isNaN(d)&&d.getFullYear()===yyyy){
          if(!CAL[id])CAL[id]={};
          Object.assign(CAL[id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false,view:'days'});
          const dv=document.getElementById('dv_'+id);if(dv){dv.textContent=v;dv.classList.remove('empty');}
        }
      }
      setTimeout(updateStepper,50);
    });
  });
  return wrap;
}

function makeSelect(id,label,options,full=false){

  });
  return wrap;
}

function makeInput(id,label,placeholder,defVal='',full=false){
  const wrap=document.createElement('div');wrap.className='field-col'+(full?' full':'');

function handlePaste(e,prefix,rowIdx,colKey,maxRows,cols){
  const text=e.clipboardData.getData('text');
  if(!text.includes('\t')&&!text.includes('\n')) return;
  e.preventDefault();
  const rows=text.trim().split(/\r?\n/);
  const colStart=cols.indexOf(colKey);
  rows.forEach((row,ri)=>{
    const cells=row.split('\t');
    cells.forEach((val,ci)=>{
      const r=rowIdx+ri,c=colStart+ci;
      if(r>maxRows||c>=cols.length) return;
      const el=document.getElementById(`${prefix}${r}${cols[c]}`);
      if(el) el.value=val.trim();
    });
  });
  for(let i=1;i<=11;i++) calcRow(i);
  for(let i=1;i<=6;i++) calcLabourRow(i);
  setTimeout(updateStepper,50);
}

function calcRow(i){const qty=parseFloat(document.getElementById(`part${i}Qty`)?.value)||0,rate=parseFloat(document.getElementById(`part${i}Rate`)?.value)||0,el=document.getElementById(`part${i}Total`);if(el)el.textContent=(qty||rate)?(qty*rate).toLocaleString('en-IN'):'—';updateTotals();}
function calcLabourRow(i){const qty=parseFloat(document.getElementById(`labour${i}Qty`)?.value)||0,rate=parseFloat(document.getElementById(`labour${i}Rate`)?.value)||0,el=document.getElementById(`labour${i}Total`);if(el)el.textContent=(qty||rate)?(qty*rate).toLocaleString('en-IN'):'—';updateTotals();}
function updateTotals(){
  let pt=0;for(let i=1;i<=11;i++)pt+=(parseFloat(document.getElementById(`part${i}Qty`)?.value)||0)*(parseFloat(document.getElementById(`part${i}Rate`)?.value)||0);
  let lt=0;for(let i=1;i<=6;i++)lt+=(parseFloat(document.getElementById(`labour${i}Qty`)?.value)||0)*(parseFloat(document.getElementById(`labour${i}Rate`)?.value)||0);
  const ptEl=document.getElementById('partsTotal');if(ptEl)ptEl.textContent=pt>0?pt.toLocaleString('en-IN'):'—';
  const ltEl=document.getElementById('labourTotal');if(ltEl)ltEl.textContent=lt>0?lt.toLocaleString('en-IN'):'—';
  const gtEl=document.getElementById('gTotal');if(gtEl)gtEl.textContent=(pt+lt)>0?(pt+lt).toLocaleString('en-IN'):'—';
}

// ─────── TABLE DRAG & SELECT LOGIC (Excel-like) ───────
let isDragging=false, startCell=null, selectedCells=new Set();

function clearSelection(){ 
  selectedCells.forEach(i=>i.classList.remove('cell-selected')); 
  selectedCells.clear(); 
}

function getCellPos(inp){
  const td=inp.closest('td'), tr=td?td.closest('tr'):null, tb=tr?tr.closest('tbody'):null;
  if(!tb) return null;
  return { tb, r:Array.from(tb.children).indexOf(tr), c:Array.from(tr.children).indexOf(td) };
}

function selectBox(start, end){
  clearSelection();
  const s=getCellPos(start), e=getCellPos(end);
  if(!s||!e||s.tb!==e.tb){ selectedCells.add(start); start.classList.add('cell-selected'); return; }
  const r1=Math.min(s.r,e.r), r2=Math.max(s.r,e.r), c1=Math.min(s.c,e.c), c2=Math.max(s.c,e.c);
  const rows=s.tb.children;
  for(let i=r1; i<=r2; i++){
      const tds=rows[i].children;
      for(let j=c1; j<=c2; j++){
          const inp=tds[j].querySelector('input');
          if(inp){ selectedCells.add(inp); inp.classList.add('cell-selected'); }
      }
  }
}

function setupTableDragSelect(){
  const inps=document.querySelectorAll('.pwa-table td input');
  inps.forEach(inp=>{
      inp.addEventListener('mousedown',e=>{
          isDragging=true; startCell=inp; clearSelection();
          selectedCells.add(inp); inp.classList.add('cell-selected');
      });
      inp.addEventListener('mouseenter',e=>{
          if(isDragging && startCell){
              selectBox(startCell, inp);
              inp.blur(); startCell.blur(); // Focus hata do taaki native selection disturb na kare
          }
      });
  });
}

// Global Document listeners for Drag & Select
document.addEventListener('mouseup',()=>{ isDragging=false; });
document.addEventListener('mousedown', e=>{
  if(!e.target.closest('.pwa-table') && !e.target.closest('.hist-item')) {
      clearSelection();
  }
});
document.addEventListener('keydown', e=>{
  if(selectedCells.size > 0){
      if(e.key==='Delete' || e.key==='Backspace'){
          if(selectedCells.size > 1) e.preventDefault(); // allow backspace standard editing in single cell
          selectedCells.forEach(inp=>{
              // Check if input is readonly before deleting
              if(!inp.hasAttribute('readonly')){
                  inp.value=''; 
                  inp.dispatchEvent(new Event('input')); // Trigger calculation auto-update
              }
          });
          setTimeout(updateStepper, 50);
      } else if((e.ctrlKey || e.metaKey) && e.key==='c'){
          if(selectedCells.size > 1) {
              e.preventDefault();
              let map=new Map();
              selectedCells.forEach(inp=>{
                  const p=getCellPos(inp); if(!p)return;
                  if(!map.has(p.r)) map.set(p.r, new Map());
                  map.get(p.r).set(p.c, inp.value);
              });
              let rows=Array.from(map.keys()).sort((a,b)=>a-b);
              let text=rows.map(r=>{
                  let cols=Array.from(map.get(r).keys()).sort((a,b)=>a-b);
                  return cols.map(c=>map.get(r).get(c)).join('\t');
              }).join('\n');
              navigator.clipboard.writeText(text).catch(()=>{});
          }
      }
  }
});

// ─────── STEPPER REAL-TIME LOGIC ───────
function updateStepper(){
  const stepperContainer=document.getElementById('stepperContainer');
  if(!stepperContainer||currentMode!=='form')return;

  const sections=Array.from(document.querySelectorAll('.form-section'));
  if(sections.length<4)return;

  // 1. Determine Active Step purely by visual scroll position
  // DOM indices: 0=Est, 1=SH, 2=Veh, 3=Part, 4=Prob, 5=Narr, 6=Staff, 7=Photos
  const sectionMap=[
    {idx:0, step:3}, {idx:1, step:2}, {idx:2, step:1}, {idx:3, step:2},
    {idx:4, step:2}, {idx:5, step:2}, {idx:6, step:2}, {idx:7, step:4}
  ];
  
  const viewportMiddle=window.innerHeight/2;
  let activeStep=1;
  sections.forEach((section,idx)=>{
    const rect=section.getBoundingClientRect();
    if(rect.top<viewportMiddle && rect.bottom>0){
      const m = sectionMap.find(x => x.idx === idx);
      if(m) activeStep = m.step;
    }
  });

  // 2. Helper to check if a single field has value (handles text, hidden selects, and manual date input)
  const getAnyVal = id => {
    const el = document.getElementById(id);
    if(el && el.value.trim() !== '') return true;
    const man = document.getElementById('dm_'+id);
    if(man && man.value.trim() !== '') return true;
    if(CAL[id] && CAL[id].date) return true;
    return false;
  };

  // Step 1: Vehicle -> Dealer & Vehicle Information (all fields)
  const s1Done = ['dealerCode','dealerName','model','fuelType','tmType','vin','engineNo','tmNumber','mileage','ew','numVehicles','mailYN','productionDate','deliveryDate','reportDate','repairDate'].every(getAnyVal);

  // Step 2: Parts -> Part Info, Problem Nature, Narrative, Staff (all fields) AND Service History (min 1 field)
  const partsFieldsOk = ['causalPartNo','partName','affectedPart','dtc','partSupplier','partLotNo','causeCode','occurrence','natureCode','timePeriod','roadCondition','speedRange','problemCondition','subject','introduction','detailedSymptom','investigationResult','correctiveAction','comment','serviceManager','warrantyManager','partsManager','serviceAdvisor'].every(getAnyVal);
  let shOk = false;
  for(let i=1; i<=17; i++){
    if(getAnyVal(`sh${i}Date`) || getAnyVal(`sh${i}Kms`) || getAnyVal(`sh${i}JobType`)){ shOk = true; break; }
  }
  const s2Done = partsFieldsOk && shOk;

  // Step 3: Labour -> Estimate (at least one part AND one labour filled)
  let pOk = false, lOk = false;
  for(let i=1; i<=11; i++){
    if(getAnyVal(`part${i}No`) || getAnyVal(`part${i}Name`) || getAnyVal(`part${i}Qty`) || getAnyVal(`part${i}Rate`)){ pOk = true; break; }
  }
  for(let i=1; i<=6; i++){
    if(getAnyVal(`labour${i}OpCode`) || getAnyVal(`labour${i}Name`) || getAnyVal(`labour${i}Qty`) || getAnyVal(`labour${i}Rate`)){ lOk = true; break; }
  }
  const s3Done = pOk && lOk;

  // Step 4: Photos -> min 3 photos
  const s4Done = Object.keys(PHOTOS).length >= 3;

  const doneMap = {1:s1Done, 2:s2Done, 3:s3Done, 4:s4Done};

  // 3. Update Stepper UI (Decouple 'done' from 'active')
  for(let i=1;i<=4;i++){
    const st=document.getElementById('pw-st'+i);
    const sn=document.getElementById('pw-sn'+i);
    if(!st||!sn)continue;
    const isDone = doneMap[i];
    const isActive = (i === activeStep);
    
    st.className = 'step ' + (isDone ? 'done ' : '') + (isActive ? 'active' : '');
    sn.innerHTML = isDone
      ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
      : i;
  }
}

// ─────── GENERATE XLSX (pure value injection — formatting 100% preserved) ───────
document.getElementById('btnInject').addEventListener('click',async()=>{
  if(!templateBuffer){showStatus('Template not loaded.','error');return;}
  const get=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  
  // ZERO INJECTION FIX: Ensure empty Quantity or Rate strictly injects "0" instead of empty string
  const getNum=id=>{const el=document.getElementById(id); const v=el?el.value.trim():''; return v===''? '0' : v;};
  
  const getDate=id=>{const st=CAL[id];if(st&&st.date)return fmtDash(st.date);const manEl=document.getElementById('dm_'+id);return manEl?manEl.value.trim():'';};
  // Also capture dm_ values for history
  const dmIds=['productionDate','deliveryDate','reportDate','repairDate'];  const data={};
  
  ['dealerCode','dealerName','model','tmType','vin','engineNo','tmNumber','mileage','numVehicles','causalPartNo','partName','affectedPart','dtc','partSupplier','partLotNo','subject','introduction','detailedSymptom','investigationResult','correctiveAction','comment','serviceManager','warrantyManager','partsManager','serviceAdvisor','repairOrderNo','regNo','vinNo'].forEach(id=>data[id]=get(id));
  
  ALL_SELECTS.forEach(id=>data[id]=get(id));
  
  ['productionDate','deliveryDate','reportDate','repairDate'].forEach(id=>data[id]=getDate(id));
  for(let i=1;i<=17;i++)['Date','Kms','JobType','Status'].forEach(f=>data[`sh${i}${f}`]=get(`sh${i}${f}`));
  
  for(let i=1;i<=11;i++){
    ['No','Name','Tag'].forEach(f=>data[`part${i}${f}`]=get(`part${i}${f}`));
    ['Qty','Rate'].forEach(f=>data[`part${i}${f}`]=getNum(`part${i}${f}`));
  }
  for(let i=1;i<=6;i++){
    ['OpCode','Name'].forEach(f=>data[`labour${i}${f}`]=get(`labour${i}${f}`));
    ['Qty','Rate'].forEach(f=>data[`labour${i}${f}`]=getNum(`labour${i}${f}`));
  }

  // Collect photo dataURLs from PHOTOS store
  const photoKeys=['vinPhoto','meterPhoto','part1Photo','part2Photo','part3Photo','part4Photo','part5Photo','part6Photo','part7Photo','part8Photo','part9Photo'];

  const btnInject=document.getElementById('btnInject');
  btnInject.disabled=true;btnInject.textContent='Processing…';clearStatus();
  try{
    // ── Pure XML injection via JSZip — never touches styles, borders, merges ──
    const JSZip=window.JSZip||(typeof require!=='undefined'?require('jszip'):null);
    if(!JSZip) throw new Error('JSZip not available');

    const zip=await JSZip.loadAsync(templateBuffer);

    // Escape value for XML text content (only escapes user input, not existing XML)
    const xmlEsc=s=>String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&apos;');

    // Replace {key} placeholders inside XML.
    // IMPORTANT: only replace inside <t>...</t> text nodes to avoid touching existing XML entities.
    const replacePlaceholders=xml=>{
      // Replace {key} only when it appears inside a <t> tag value
      // This prevents double-escaping existing &amp; &lt; etc in the XML structure
      return xml.replace(/<t([^>]*)>([^<]*\{[^<]*)<\/t>/g,(match,attrs,content)=>{
        const replaced=content.replace(/\{([^}]+)\}/g,(_,key)=>{
          const v=data[key];
          return xmlEsc((v===undefined||v===null)?'':v);
        });
        return `<t${attrs}>${replaced}</t>`;
      });
    };

    // Process sharedStrings.xml — this is where cell text values live
    const ssPath=Object.keys(zip.files).find(p=>p.match(/sharedStrings\.xml$/i));
    if(ssPath){
      let ssXml=await zip.files[ssPath].async('string');
      ssXml=replacePlaceholders(ssXml);
      zip.file(ssPath,ssXml);
    }

    // Also process each worksheet XML for inline strings
    const sheetPaths=Object.keys(zip.files).filter(p=>p.match(/xl\/worksheets\/sheet\d+\.xml$/i));

    // Get replaced sharedString values for height calculation
    const ssPathForHt=Object.keys(zip.files).find(p=>p.match(/sharedStrings\.xml$/i));
    const ssXmlForHt=ssPathForHt?await zip.files[ssPathForHt].async('string'):'';
    const ssValuesForHt=[];
    ssXmlForHt.replace(/<t[^>]*>([^<]*)<\/t>/g,(_,v)=>{ssValuesForHt.push(v);});

    for(const sp of sheetPaths){
      let shXml=await zip.files[sp].async('string');
      if(shXml.includes('{')){
        shXml=replacePlaceholders(shXml);
      }
      // Auto-fit row heights on text sheets (skip photo sheet4)
      if(!sp.match(/sheet4\.xml$/i)){
        // For every row, find longest shared-string value referenced in that row
        // then set ht = lines * lineHeight, removing customHeight lock
        shXml=shXml.replace(/<row\s([^>]*?)>/g,(rowTag,attrs)=>{
          const rNum=(attrs.match(/r="(\d+)"/)||[])[1];
          if(!rNum) return rowTag;
          // Find all shared string indices used by cells in this row
          const cellRe=new RegExp(`<c r="[A-Z]+${rNum}"[^>]*t="s"><v>(\\d+)<\\/v><\\/c>`,'g');
          let maxLen=0,m;
          while((m=cellRe.exec(shXml))!==null){
            const idx=+m[1];
            if(idx<ssValuesForHt.length) maxLen=Math.max(maxLen,ssValuesForHt[idx].length);
          }
          // Strip old ht and customHeight
          let a=attrs.replace(/\s+ht="[^"]*"/g,'').replace(/\s+customHeight="[^"]*"/g,'');
          if(maxLen>60){
            // ~55 chars per line at typical col width, 15pt per line
            const lines=Math.ceil(maxLen/55);
            a+=` ht="${lines*15}" customHeight="1"`;
          }
          return `<row ${a}>`;
        });
      }
      zip.file(sp,shXml);
    }

    // ── Inject photos into Photographs sheet ──
    const photoSlotMap=[
      {key:'vinPhoto',   col:0, row:4},
      {key:'meterPhoto', col:6, row:4},
      {key:'part1Photo', col:12,row:4},
      {key:'part2Photo', col:18,row:4},
      {key:'part3Photo', col:24,row:4},
      {key:'part4Photo', col:12,row:12},
      {key:'part5Photo', col:18,row:12},
      {key:'part6Photo', col:24,row:12},
      {key:'part7Photo', col:12,row:20},
      {key:'part8Photo', col:18,row:20},
      {key:'part9Photo', col:24,row:20},
    ];

    function dataUrlToBytes(dataUrl){
      const b64=dataUrl.split(',')[1];
      const bin=atob(b64);
      const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      return arr;
    }
    function mimeFromDataUrl(dataUrl){
      return dataUrl.split(';')[0].split(':')[1]||'image/jpeg';
    }
    function extFromMime(mime){
      if(mime==='image/png') return 'png';
      if(mime==='image/gif') return 'gif';
      if(mime==='image/webp') return 'webp';
      return 'jpg';
    }

    const photoEntries=[];
    for(const {key,col,row} of photoSlotMap){
      const photo=PHOTOS[key];
      if(!photo||!photo.dataUrl) continue;
      const mime=mimeFromDataUrl(photo.dataUrl);
      const ext=extFromMime(mime);
      const bytes=dataUrlToBytes(photo.dataUrl);
      const idx=photoEntries.length+1;
      const mediaName=`image${idx}.${ext}`;
      zip.file(`xl/media/${mediaName}`,bytes);
      photoEntries.push({idx,mediaName,mime,colIdx:col,rowIdx:row-1});
    }

    if(photoEntries.length>0){
      // Build drawing XML
      const NS_XDR='http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing';
      const NS_A='http://schemas.openxmlformats.org/drawingml/2006/main';
      const NS_R='http://schemas.openxmlformats.org/officeDocument/2006/relationships';
      let drawingXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><xdr:wsDr xmlns:xdr="${NS_XDR}" xmlns:a="${NS_A}" xmlns:r="${NS_R}">`;
      const drawingRels=[];

      photoEntries.forEach(({idx,mediaName,mime,colIdx,rowIdx},i)=>{
        const rId=`rId${i+1}`;
        const toCol=colIdx+5;
        const toRow=rowIdx+7;
        // colOff/rowOff=0 so image fully fills the merged cell area
        drawingXml+=
          `<xdr:twoCellAnchor editAs="twoCell">`+
          `<xdr:from><xdr:col>${colIdx}</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>${rowIdx}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:from>`+
          `<xdr:to><xdr:col>${toCol}</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>${toRow}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:to>`+
          `<xdr:pic>`+
            `<xdr:nvPicPr>`+
              `<xdr:cNvPr id="${i+2}" name="Photo${idx}"/>`+
              `<xdr:cNvPicPr><a:picLocks noChangeAspect="1"/></xdr:cNvPicPr>`+
            `</xdr:nvPicPr>`+
            `<xdr:blipFill>`+
              `<a:blip r:embed="${rId}"/>`+
              `<a:stretch><a:fillRect/></a:stretch>`+
            `</xdr:blipFill>`+
            `<xdr:spPr>`+
              `<a:xfrm><a:off x="0" y="0"/><a:ext cx="914400" cy="685800"/></a:xfrm>`+
              `<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>`+
            `</xdr:spPr>`+
          `</xdr:pic>`+
          `<xdr:clientData/>`+
          `</xdr:twoCellAnchor>`;
        drawingRels.push({rId,target:`../media/${mediaName}`,mime});
      });
      drawingXml+=`</xdr:wsDr>`;

      // Drawing rels
      let drawingRelsXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">`;
      drawingRels.forEach(({rId,target})=>{
        drawingRelsXml+=`<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="${target}"/>`;
      });
      drawingRelsXml+=`</Relationships>`;

      zip.file('xl/drawings/drawing1.xml', drawingXml);
      zip.file('xl/drawings/_rels/drawing1.xml.rels', drawingRelsXml);

      // Patch sheet4.xml — it already has xmlns:r so DO NOT add it again, just add <drawing> tag
      const sh4Path=Object.keys(zip.files).find(p=>p.match(/xl\/worksheets\/sheet4\.xml$/i));
      if(sh4Path){
        let sh4=await zip.files[sh4Path].async('string');
        if(!sh4.includes('<drawing ')){
          // Insert <drawing> just before </worksheet>
          sh4=sh4.replace('</worksheet>','<drawing r:id="rId_drawing1"/></worksheet>');
          zip.file(sh4Path,sh4);
        }
        // Sheet4 rels — always write fresh (template has none)
        const sh4RelsXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId_drawing1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/drawing" Target="../drawings/drawing1.xml"/></Relationships>`;
        zip.file('xl/worksheets/_rels/sheet4.xml.rels', sh4RelsXml);
      }

      // Patch [Content_Types].xml
      const ctPath='[Content_Types].xml';
      let ct=await zip.files[ctPath].async('string');
      if(!ct.includes('drawing1.xml')){
        ct=ct.replace('</Types>','<Override PartName="/xl/drawings/drawing1.xml" ContentType="application/vnd.openxmlformats-officedocument.drawing+xml"/></Types>');
      }
      const mimesSeen=new Set();
      drawingRels.forEach(({mime})=>{
        if(mimesSeen.has(mime)) return; mimesSeen.add(mime);
        const ext=extFromMime(mime);
        const ctStr=`Extension="${ext}"`;
        if(!ct.includes(ctStr)){
          ct=ct.replace('</Types>',`<Default Extension="${ext}" ContentType="${mime}"/></Types>`);
        }
      });
      zip.file(ctPath, ct);
    }

    // Generate output preserving everything else (styles, themes, drawings, etc.)
    const outBuf=await zip.generateAsync({
      type:'arraybuffer',
      compression:'DEFLATE',
      compressionOptions:{level:6}
    });

    const blob=new Blob([outBuf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const vinClean=(data.vin||'NOVIN').replace(/[^a-zA-Z0-9]/g,'');
    const dcClean=(data.dealerCode||'N3235').replace(/[^a-zA-Z0-9]/g,'');
    const fname=`${vinClean}_${dcClean}_OfficialFormat.xlsx`;
  dmIds.forEach(id=>{const manEl=document.getElementById('dm_'+id);if(manEl&&manEl.value.trim())data['dm_'+id]=manEl.value.trim();});
    saveAs(blob,fname);
    showStatus('✓ Downloaded: '+fname,'success');
    saveHistory(data);
  }catch(err){showStatus('Error: '+err.message,'error');console.error(err);}
  finally{btnInject.disabled=false;btnInject.textContent='Generate XLSX';}
});

function saveHistory(entry){
  const key=entry.vin||entry.regNo;if(key)HISTORY=HISTORY.filter(h=>(h.vin||h.regNo)!==key);
  HISTORY.unshift(entry);if(HISTORY.length>50)HISTORY=HISTORY.slice(0,50);
  try{localStorage.setItem('pwa_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}
async function deleteHistory(idx){HISTORY.splice(idx,1);try{localStorage.setItem('pwa_hist',JSON.stringify(HISTORY));}catch(e){}renderHistory(historySearch.value);}

document.getElementById('btnHistoryClearAll').addEventListener('click',async()=>{
  if(!(await customConfirm('Clear all saved entries?','Yes, Clear All')))return;
  HISTORY=[];try{localStorage.removeItem('pwa_hist');}catch(e){}historySearch.value='';renderHistory();
});
historySearch.addEventListener('input',()=>renderHistory(historySearch.value));

function renderHistory(filter=''){
  if(!HISTORY.length){histList.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No saved entries.</div>';return;}
  histList.innerHTML='';
  const q=filter.toLowerCase().trim();
  HISTORY.forEach((entry,idx)=>{
    const primary=entry.vin||entry.regNo||'Unknown';const sub=entry.repairDate||entry.dealerCode||'';
    if(q&&!`${primary} ${sub}`.toLowerCase().includes(q))return;
    const item=document.createElement('div');item.className='hist-item';item.setAttribute('tabindex','0');
    item.innerHTML=`<div class="hi-info"><div class="hi-name">${escHtml(primary)}</div><div class="hi-meta">${escHtml(sub)}</div></div><button type="button" class="hi-del" tabindex="0">${icons.close}</button>`;
    const delBtn=item.querySelector('.hi-del');
    const delA=async e=>{e.stopPropagation();if(!(await customConfirm('Delete this entry?','Delete')))return;deleteHistory(idx);};
    delBtn.addEventListener('click',delA);handleKeyClick(delBtn,delA);
    const itemA=()=>fillFromHistory(entry);item.addEventListener('click',itemA);handleKeyClick(item,itemA);
    histList.appendChild(item);
  });
  if(!histList.innerHTML)histList.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No matching entries.</div>';
}

function fillFromHistory(entry){
  setMode('form');
  setTimeout(()=>{
    Object.keys(entry).forEach(id=>{const el=document.getElementById(id);if(el&&el.type!=='hidden'){el.value=entry[id];el.classList.remove('pre');}});
    ALL_SELECTS.forEach(id=>{if(!entry[id])return;const hidEl=document.getElementById(id);if(hidEl)hidEl.value=entry[id];const lbl=document.getElementById('csv_'+id);if(lbl){lbl.textContent=entry[id];lbl.classList.remove('empty');}});
    ['productionDate','deliveryDate','reportDate','repairDate'].forEach(id=>{const val=entry[id];if(!val)return;const p=val.split('-');const d=new Date(+p[2],+p[1]-1,+p[0]);if(isNaN(d))return;if(!CAL[id])CAL[id]={};Object.assign(CAL[id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false,view:'days'});const dv=document.getElementById('dv_'+id);if(dv){dv.textContent=val;dv.classList.remove('empty');}const manEl=document.getElementById('dm_'+id);if(manEl)manEl.value=entry['dm_'+id]||val;});
    for(let i=1;i<=11;i++)calcRow(i);for(let i=1;i<=6;i++)calcLabourRow(i);
    closeAllPopups();clearStatus();
    setTimeout(updateStepper,50);
  },100);
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showStatus(m,t){statusEl.textContent=m;statusEl.className='status '+t;}
function clearStatus(){statusEl.textContent='';statusEl.className='status';}

// ─────── STEPPER SCROLL HANDLER ───────
let stepperScrollTimeout;
window.addEventListener('scroll',()=>{
  if(currentMode!=='form')return;
  clearTimeout(stepperScrollTimeout);
  stepperScrollTimeout=setTimeout(updateStepper,50);
},{passive:true});

// ─────── PAGE JUMPERS ───────
(()=>{
  const pjTop=document.getElementById('pjTop');
  const pjBot=document.getElementById('pjBot');
  let hideTimer=null;
  function showJumpers(){
    const sh=document.documentElement.scrollHeight,wh=window.innerHeight;
    const scrollable=sh>wh+20;
    if(!scrollable){pjTop.classList.remove('vis');pjBot.classList.remove('vis');return;}
    const st=window.scrollY;
    const nearBottom=st+wh>sh-60;
    pjTop.classList.toggle('vis',st>=60);
    pjBot.classList.toggle('vis',!nearBottom);
  }
  function scheduleHide(){
    if(hideTimer)clearTimeout(hideTimer);
    hideTimer=setTimeout(()=>{pjTop.classList.remove('vis');pjBot.classList.remove('vis');},2000);
  }
  window.addEventListener('scroll',()=>{showJumpers();scheduleHide();},{passive:true});
  window.addEventListener('load',showJumpers);
  pjTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  pjBot.addEventListener('click',()=>window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}));
  handleKeyClick(pjTop,()=>window.scrollTo({top:0,behavior:'smooth'}));
  handleKeyClick(pjBot,()=>window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}));
})();

// ─────── THEME + BACKUP ───────
window.addEventListener('message',event=>{
  if(event.data?.type==='theme') document.documentElement.setAttribute('data-theme',event.data.theme);
  if(event.data?.type==='backup-request'){const payload={};try{const v=localStorage.getItem('pwa_hist');if(v)payload['pwa_hist']=v;}catch(e){}event.source.postMessage({type:'backup-response',tool:'pwareg',data:payload},'*');}
  if(event.data?.type==='restore-data'&&event.data.tool==='pwareg'&&event.data.data){Object.entries(event.data.data).forEach(([k,v])=>{try{localStorage.setItem(k,v);}catch(e){}});try{HISTORY=JSON.parse(localStorage.getItem('pwa_hist')||'[]');}catch(e){}renderHistory();}
});
window.parent.postMessage({type:'requestTheme'},'*');
</script>
