<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ETM Form</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root {
  --bg-page:#f4f4f2; --bg-card:#ffffff; --bg-input:#ffffff;
  --bg-hover:#f0f0ee; --bg-active:#e3e3df;
  --text-main:#181816; --text-label:#181816; --text-muted:#6a6a67; --text-placeholder:#9a9a97;
  --border-light:#e3e3df; --border-input:#e3e3df; --border-focus:#002C5F;
  --accent-bg:#002C5F; --accent-text:#ffffff;
  --focus-ring:rgba(0,44,95,0.1); --danger-color:#ef4444; --table-head:#f0f0ee;
}
[data-theme=dark] {
  --bg-page:#111110; --bg-card:#1c1c1a; --bg-input:#1c1c1a;
  --bg-hover:#232321; --bg-active:#2d2d2b;
  --text-main:#f0f0ee; --text-label:#f0f0ee; --text-muted:#888885; --text-placeholder:#525250;
  --border-light:#2d2d2b; --border-input:#2d2d2b; --border-focus:#4D8FD6;
  --accent-bg:#4D8FD6; --accent-text:#111110;
  --focus-ring:rgba(77,143,214,0.2); --danger-color:#f87171; --table-head:#232321;
}

/* ── Modern Scrollbar ── */
*{scrollbar-width:thin;scrollbar-color:var(--bg-active) transparent;}
*::-webkit-scrollbar{width:5px;height:5px;}
*::-webkit-scrollbar-track{background:transparent;}
*::-webkit-scrollbar-thumb{background:var(--bg-active);border-radius:99px;}
*::-webkit-scrollbar-thumb:hover{background:var(--border-input);}

/* ── Stepper ── */
.stepper-container{padding:14px 20px;border-bottom:1px solid var(--border-light);background:var(--bg-card);position:sticky;top:0;z-index:900;}
.stepper{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;transition:all .18s;}
.step.done{background:rgba(0,44,95,.06);border-color:var(--accent-bg);}
[data-theme=dark] .step.done{background:rgba(77,143,214,.1);}
.step.active{border-color:var(--accent-bg);box-shadow:0 0 0 2px var(--focus-ring);}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--bg-hover);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.step.done .step-n{background:var(--accent-bg);color:var(--accent-text);}
.step.active .step-n{background:var(--accent-bg);color:var(--accent-text);}
.step-t{font-size:12px;font-weight:600;color:var(--text-main);}
.step-s{font-size:10.5px;color:var(--text-muted);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg-page);color:var(--text-main);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px 80px;}

.card{background:var(--bg-card);border-radius:12px;width:100%;max-width:820px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);border:1px solid var(--border-light);}
.card-header{padding:16px 20px 14px;border-bottom:1px solid var(--border-light);}
.card-header h1{font-size:17px;font-weight:600;color:var(--text-main);}
.card-header p{font-size:12px;color:var(--text-muted);margin-top:3px;}

.mode-wrap{margin:14px 20px 0;display:none;}
.mode-wrap.show{display:block;}
.mode-lbl{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.mode-btns{display:flex;gap:5px;}
.mode-btn{flex:1;height:32px;border-radius:6px;border:1.5px solid var(--border-input);background:var(--bg-hover);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .18s;outline:none;}
.mode-btn:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.mode-btn:hover{border-color:var(--text-muted);color:var(--text-main);}
.mode-btn.active{background:var(--accent-bg);border-color:var(--accent-bg);color:var(--accent-text);}

.history-wrap{padding:16px 20px 24px;display:none;}
.history-wrap.show{display:block;}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hist-title{font-size:13px;font-weight:600;}
.hist-clr{font-size:12px;color:var(--text-muted);cursor:pointer;background:none;border:none;transition:color .2s;padding:0;outline:none;}
.hist-clr:hover,.hist-clr:focus{color:var(--danger-color);}
.search-input{width:100%;height:38px;border:1px solid var(--border-input);border-radius:7px;padding:0 12px;font-size:13px;margin-bottom:12px;outline:none;transition:all .2s;background:var(--bg-hover);color:var(--text-main);}
.search-input:focus{border-color:var(--border-focus);background:var(--bg-input);box-shadow:0 0 0 3px var(--focus-ring);}
.search-input::placeholder{color:var(--text-placeholder);}
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto;}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid var(--border-light);border-radius:7px;cursor:pointer;background:var(--bg-input);transition:all .2s;outline:none;}
.hist-item:hover,.hist-item:focus{background:var(--bg-hover);}
.hi-info{flex:1;min-width:0;}
.hi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.hi-del{background:none;border:none;color:var(--border-input);cursor:pointer;transition:color .2s;display:flex;align-items:center;padding:4px;outline:none;border-radius:4px;}
.hi-del:hover,.hi-del:focus{color:var(--danger-color);}

.form-section{padding:14px 20px 0;}
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;border-bottom:1px solid var(--border-light);padding-bottom:6px;letter-spacing:.05em;}
.grid-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.field-col{display:flex;flex-direction:column;gap:4px;min-width:0;}
.field-col.full{grid-column:1/-1;}
.field-col label{font-size:11.5px;font-weight:500;color:var(--text-label);}
.field-col label .req{color:var(--danger-color);margin-left:2px;font-weight:700;}

.field-col input,.field-col textarea{border:1px solid var(--border-input);border-radius:7px;padding:0 11px;font-size:13px;color:var(--text-main);background:var(--bg-input);transition:all .2s;width:100%;outline:none;font-family:'Inter',sans-serif;}
.field-col input{height:36px;}
.field-col textarea{padding:8px 11px;min-height:72px;resize:vertical;line-height:1.5;}
.field-col input::placeholder,.field-col textarea::placeholder{color:var(--text-placeholder);}
.field-col input:focus,.field-col textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.field-col input.pre{color:var(--text-muted);}

/* ── Custom Select ── */
.custom-select-wrap{position:relative;user-select:none;width:100%;}
.custom-select-trigger{height:36px;border:1px solid var(--border-input);border-radius:7px;padding:0 11px;background:var(--bg-input);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;width:100%;outline:none;}
.custom-select-trigger:hover{border-color:var(--text-placeholder);}
.custom-select-trigger:focus,.custom-select-trigger.active{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.cs-val{font-size:13px;color:var(--text-main);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;}
.cs-val.empty{color:var(--text-placeholder);}
.cs-arr{color:var(--text-placeholder);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;}
.custom-select-trigger.active .cs-arr{transform:rotate(180deg);color:var(--text-main);}
.custom-select-opts{position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:500;background:var(--bg-card);border:1px solid var(--border-input);border-radius:7px;box-shadow:0 10px 25px -5px rgba(0,0,0,.2);max-height:200px;overflow-y:auto;opacity:0;transform:translateY(-8px) scaleY(.95);transform-origin:top;pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1);}
.custom-select-opts.open{opacity:1;transform:translateY(0) scaleY(1);pointer-events:all;}
.cs-opt{padding:9px 11px;font-size:12.5px;color:var(--text-main);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border-light);outline:none;}
.cs-opt:last-child{border-bottom:none;}
.cs-opt:hover,.cs-opt:focus{background:var(--bg-hover);font-weight:500;}

/* ── Date Trigger ── */
.date-trigger{height:36px;display:flex;align-items:center;padding:0 11px;cursor:pointer;user-select:none;gap:7px;border:1px solid var(--border-input);border-radius:7px;background:var(--bg-input);transition:all .2s;position:relative;width:100%;outline:none;}
.date-trigger:hover{border-color:var(--text-placeholder);}
.date-trigger:focus,.date-trigger.active{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.date-icon{color:var(--text-placeholder);display:flex;align-items:center;}
.dval{font-size:13px;color:var(--text-main);flex:1;}
.dval.empty{color:var(--text-placeholder);}
.cal-pop{position:absolute;top:calc(100% + 6px);left:0;z-index:400;background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;padding:14px;box-shadow:0 10px 25px -5px rgba(0,0,0,.2);width:250px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s ease;}
.cal-pop.open{opacity:1;transform:translateY(0);pointer-events:all;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mnth{font-size:13px;font-weight:600;cursor:pointer;padding:3px 6px;border-radius:5px;transition:background .2s;outline:none;}
.mnth:hover,.mnth:focus{background:var(--bg-hover);}
.cal-nav button{background:none;border:1px solid var(--border-input);border-radius:5px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s;outline:none;}
.cal-nav button:hover,.cal-nav button:focus{background:var(--bg-hover);color:var(--text-main);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-grid.years{grid-template-columns:repeat(3,1fr);gap:6px;}
.dn{font-size:9px;font-weight:600;text-transform:uppercase;color:var(--text-muted);text-align:center;padding-bottom:6px;}
.cd{font-size:12px;text-align:center;padding:7px 2px;border-radius:5px;cursor:pointer;color:var(--text-label);transition:all .15s;outline:none;}
.cal-grid.years .cd{padding:10px 4px;font-weight:500;}
.cd:hover,.cd:focus{background:var(--bg-hover);}
.cd.sel{background:var(--accent-bg)!important;color:var(--accent-text)!important;font-weight:500;}
.cd.today{font-weight:700;text-decoration:underline;}
.cd.om{color:var(--border-input);pointer-events:none;}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;margin-top:4px;}
.pwa-table{width:100%;border-collapse:collapse;font-size:12.5px;user-select:none;}
.pwa-table th{background:var(--table-head);color:var(--text-muted);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:8px;text-align:left;border:1px solid var(--border-light);white-space:nowrap;}
.pwa-table td{border:1px solid var(--border-light);padding:0;vertical-align:middle;}
.pwa-table td.num{width:28px;text-align:center;color:var(--text-muted);font-size:11px;background:var(--table-head);font-weight:600;padding:0 6px;white-space:nowrap;}
.pwa-table td input{width:100%;height:34px;border:none;background:transparent;color:var(--text-main);font-size:12.5px;font-family:'Inter',sans-serif;padding:0 8px;outline:none;transition:background .15s;}
.pwa-table td input:focus{background:var(--focus-ring);}
.pwa-table td input::placeholder{color:var(--text-placeholder);}
.pwa-table td.cell-selected input{background:rgba(0,44,95,0.12);}
[data-theme=dark] .pwa-table td.cell-selected input{background:rgba(77,143,214,0.18);}
.pwa-table td.cell-selected{background:rgba(0,44,95,0.08);}
[data-theme=dark] .pwa-table td.cell-selected{background:rgba(77,143,214,0.12);}

/* ── Photos ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.photo-slot{position:relative;border:1.5px dashed var(--border-input);border-radius:7px;overflow:hidden;cursor:pointer;transition:all .2s;aspect-ratio:16/10;background:var(--bg-hover);}
.photo-slot:hover{border-color:var(--accent-bg);}
.photo-slot.filled{border-style:solid;border-color:var(--border-input);}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-slot .slot-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:600;text-align:center;padding:4px 3px;letter-spacing:.04em;text-transform:uppercase;z-index:2;}
.photo-slot .slot-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;pointer-events:none;z-index:1;}
.photo-slot .slot-placeholder svg{color:var(--text-placeholder);}
.photo-slot .slot-placeholder span{font-size:10px;color:var(--text-placeholder);}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1;}
.photo-slot.filled img{display:block;}
.photo-slot.filled .slot-placeholder{display:none;}
.photo-slot .remove-btn{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;font-size:11px;line-height:1;}
.photo-slot.filled .remove-btn{display:flex;}

/* ── Status & Actions ── */
.status{margin:14px 20px 0;font-size:13px;padding:10px 14px;border-radius:7px;display:none;font-weight:500;}
.status.error{background:rgba(239,68,68,.1);color:var(--danger-color);border:1px solid rgba(239,68,68,.2);display:block;}
.status.success{background:rgba(34,197,94,.1);color:#15803d;border:1px solid rgba(34,197,94,.2);display:block;}
.actions{display:flex;gap:10px;padding:14px 20px 20px;border-top:1px solid var(--border-light);margin-top:14px;align-items:center;}
.btn{flex:1;height:42px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;outline:none;}
.btn:focus{box-shadow:0 0 0 3px var(--focus-ring);}
.btn-inject{background:var(--accent-bg);color:var(--accent-text);}
.btn-inject:hover{opacity:.9;}
.btn-inject:disabled{opacity:.5;cursor:not-allowed;}
.btn-clear{background:rgba(239,68,68,.08);color:#dc2626;border:1px solid rgba(239,68,68,.2);}
.btn-clear:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);}
[data-theme=dark] .btn-clear{background:rgba(248,113,113,.08);color:#f87171;border:1px solid rgba(248,113,113,.2);}
[data-theme=dark] .btn-clear:hover{background:rgba(248,113,113,.15);}

/* ── Modal ── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg-card);border:1px solid var(--border-light);border-radius:10px;padding:20px;width:90%;max-width:340px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1);transform:scale(.95) translateY(10px);transition:all .2s cubic-bezier(.4,0,.2,1);}
.modal-overlay.show .modal-box{transform:scale(1) translateY(0);}
.modal-msg{font-size:14px;color:var(--text-main);font-weight:500;margin-bottom:20px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.modal-btn{padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:'Inter',sans-serif;outline:none;}
.modal-btn-cancel{background:var(--bg-active);color:var(--text-label);}
.modal-btn-cancel:hover,.modal-btn-cancel:focus{background:var(--border-input);color:var(--text-main);}
.modal-btn-ok{background:var(--danger-color);color:#fff;}
.modal-btn-ok:hover,.modal-btn-ok:focus{opacity:.9;box-shadow:0 0 0 3px rgba(239,68,68,.2);}

/* ── Page Jumpers ── */
.page-jumper{position:fixed;right:16px;bottom:80px;z-index:9000;display:flex;flex-direction:column;gap:8px;}
.pj{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:all .25s cubic-bezier(.4,0,.2,1);outline:none;background:var(--accent-bg);color:var(--accent-text);opacity:0;pointer-events:none;transform:translateY(12px);}
.pj:hover{transform:scale(1.12);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.pj:active{transform:scale(.95);}
.pj:focus{box-shadow:0 0 0 3px var(--focus-ring),0 4px 14px rgba(0,0,0,.2);}
.pj.vis{opacity:1;pointer-events:all;transform:translateY(0);}


/* ── Date field with manual input ── */
.date-wrap{display:flex;gap:5px;align-items:flex-start;}
.date-wrap .date-trigger{flex:1;}
.date-manual{flex:1;height:36px;border:1px solid var(--border-input);border-radius:7px;padding:0 10px;font-size:13px;color:var(--text-main);background:var(--bg-input);outline:none;font-family:'Inter',sans-serif;transition:all .2s;}
.date-manual:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--focus-ring);}
.date-manual::placeholder{color:var(--text-placeholder);}

@media(max-width:640px){
  body{padding:10px 8px 70px;}
  .grid-wrap{grid-template-columns:1fr;gap:8px;}
  .card-header,.mode-wrap,.form-section,.actions,.history-wrap{padding-left:14px;padding-right:14px;}
  .photo-grid{grid-template-columns:1fr;}
  .stepper-container{padding:10px 14px;}
  .stepper{grid-template-columns:1fr 1fr;}
  .page-jumper{right:10px;bottom:70px;}
}
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn modal-btn-ok" id="modalOk">Confirm</button>
    </div>
  </div>
</div>

<div class="page-jumper" id="pageJumper">
<button id="pjTop" class="pj" title="Back to top" aria-label="Scroll to top"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></button>
<button id="pjBot" class="pj" title="Go to bottom" aria-label="Scroll to bottom"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
</div>

<div class="card">
  <div class="card-header">
    <h1>ETM Form</h1>
    <p>Engine &amp; TM Replacement — fill form then generate PPTX report.</p>
  </div>

  <div class="stepper-container">
  <div class="stepper" id="etm-stepper">
    <div class="step active" id="etm-st1">
      <div class="step-n" id="etm-sn1">1</div>
      <div><div class="step-t">Vehicle Info</div><div class="step-s">VIN, model</div></div>
    </div>
    <div class="step" id="etm-st2">
      <div class="step-n" id="etm-sn2">2</div>
      <div><div class="step-t">Details</div><div class="step-s">Dealer, parts</div></div>
    </div>
    <div class="step" id="etm-st3">
      <div class="step-n" id="etm-sn3">3</div>
      <div><div class="step-t">Ready</div><div class="step-s">Generate PPTX</div></div>
    </div>
  </div>
  </div>

  <div class="mode-wrap show" id="modeWrap">
    <div class="mode-lbl">Navigation</div>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeForm" tabindex="0">Fill Form</button>
      <button class="mode-btn" id="modeHistory" tabindex="0">Saved Entries</button>
    </div>
  </div>

  <div class="history-wrap" id="histWrap">
    <div class="hist-header">
      <span class="hist-title">Saved Records</span>
      <button class="hist-clr" id="btnHistoryClearAll" tabindex="0">Clear all</button>
    </div>
    <input type="text" id="historySearch" class="search-input" placeholder="Search by VIN…" autocomplete="off" tabindex="0">
    <div class="hist-list" id="histList"></div>
  </div>

  <div id="formWrap"></div>

  <div class="status" id="status"></div>
  <div class="actions" id="actionsBar" style="display:none">

// ─────── CALENDAR ───────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCal(id){
  const st=CAL[id];const pop=document.getElementById('cp_'+id);if(!pop)return;
  if(st.view==='years'){
    const base=Math.floor(st.year/15)*15;
    pop.innerHTML=`<div class="cal-nav"><button id="cy_prev_${id}" tabindex="0">${icons.chevLeft}</button><span class="mnth" id="cy_lbl_${id}" tabindex="0">${base}–${base+14}</span><button id="cy_next_${id}" tabindex="0">${icons.chevRight}</button></div><div class="cal-grid years" id="cg_${id}"></div>`;
    const grid=document.getElementById('cg_'+id);
    for(let y=base;y<base+15;y++){
      const d=document.createElement('div');d.className='cd'+(y===st.year?' sel':'');d.textContent=y;d.setAttribute('tabindex','0');
      const a=()=>{st.year=y;st.view='days';renderCal(id);};d.addEventListener('click',e=>{e.stopPropagation();a();});handleKeyClick(d,a);
      grid.appendChild(d);
    }
    const prevA=e=>{e.stopPropagation();st.year-=15;renderCal(id);};
    const nextA=e=>{e.stopPropagation();st.year+=15;renderCal(id);};
    const prevBtn=document.getElementById('cy_prev_'+id);const nextBtn=document.getElementById('cy_next_'+id);
    prevBtn?.addEventListener('click',prevA);handleKeyClick(prevBtn,prevA);
    nextBtn?.addEventListener('click',nextA);handleKeyClick(nextBtn,nextA);
    const lblA=e=>{e.stopPropagation();};document.getElementById('cy_lbl_'+id)?.addEventListener('click',lblA);
    return;
  }
  // Days view
  const now=new Date();
  const firstDay=new Date(st.year,st.month,1).getDay();
  const daysInMonth=new Date(st.year,st.month+1,0).getDate();
  const prevDays=new Date(st.year,st.month,0).getDate();
  pop.innerHTML=`<div class="cal-nav"><button id="cp_prev_${id}" tabindex="0">${icons.chevLeft}</button><span class="mnth" id="cp_lbl_${id}" tabindex="0">${MONTHS[st.month]} ${st.year}</span><button id="cp_next_${id}" tabindex="0">${icons.chevRight}</button></div><div class="cal-grid" id="cg_${id}">${DAYS.map(d=>`<div class="dn">${d}</div>`).join('')}</div>`;
  const grid=document.getElementById('cg_'+id);
  for(let i=0;i<firstDay;i++){const d=document.createElement('div');d.className='cd om';d.textContent=prevDays-firstDay+1+i;grid.appendChild(d);}
  for(let i=1;i<=daysInMonth;i++){
    const d=document.createElement('div');d.setAttribute('tabindex','0');
    const isToday=i===now.getDate()&&st.month===now.getMonth()&&st.year===now.getFullYear();
    const isSel=st.date&&i===st.date.getDate()&&st.month===st.date.getMonth()&&st.year===st.date.getFullYear();
    d.className='cd'+(isToday?' today':'')+(isSel?' sel':'');d.textContent=i;
    const a=()=>{
      st.date=new Date(st.year,st.month,i);
      const dd=String(i).padStart(2,'0'),mm=String(st.month+1).padStart(2,'0'),yy=st.year;
      const fmt=`${dd}-${mm}-${yy}`;
      const dv=document.getElementById('dv_'+id);if(dv){dv.textContent=fmt;dv.classList.remove('empty');}
      const manEl=document.getElementById('dm_'+id);if(manEl)manEl.value=fmt;
      closeAllPopups();
    };
    d.addEventListener('click',e=>{e.stopPropagation();a();});handleKeyClick(d,a);
    grid.appendChild(d);
  }
  const rem=42-firstDay-daysInMonth;for(let i=1;i<=rem;i++){const d=document.createElement('div');d.className='cd om';d.textContent=i;grid.appendChild(d);}
  const prevA=e=>{e.stopPropagation();st.month--;if(st.month<0){st.month=11;st.year--;}renderCal(id);};
  const nextA=e=>{e.stopPropagation();st.month++;if(st.month>11){st.month=0;st.year++;}renderCal(id);};
  const lblA=e=>{e.stopPropagation();st.view='years';renderCal(id);};
  const prevBtn=document.getElementById('cp_prev_'+id);const nextBtn=document.getElementById('cp_next_'+id);const lbl=document.getElementById('cp_lbl_'+id);
  prevBtn?.addEventListener('click',prevA);handleKeyClick(prevBtn,prevA);
  nextBtn?.addEventListener('click',nextA);handleKeyClick(nextBtn,nextA);
  lbl?.addEventListener('click',lblA);handleKeyClick(lbl,lblA);
}

function makeDateField(id,label){

  requestAnimationFrame(()=>{

      let v=manEl.value.replace(/[^0-9]/g,'');
      if(v.length>2)v=v.slice(0,2)+'-'+v.slice(2);
      if(v.length>5)v=v.slice(0,5)+'-'+v.slice(5);
      if(v.length>10)v=v.slice(0,10);
      manEl.value=v;
      // Sync to CAL state if full date
      if(v.length===10){

        const d=new Date(yyyy,mm-1,dd);
        if(!isNaN(d)){CAL[id].date=d;CAL[id].year=d.getFullYear();CAL[id].month=d.getMonth();}
      }
    });
  });
  return wrap;
}

// ─────── BULK TABLE DRAG SELECT + KEYBOARD ───────
function initTableBulkEdit(sec){
  const table=sec.querySelector('.pwa-table');
  if(!table)return;
  let isDragging=false;
  let dragStart=null;
  const selectedCells=new Set();

  const getCellCoords=(td)=>{
    const tr=td.parentElement;
    const rowIdx=tr.rowIndex;
    const cellIdx=td.cellIndex;
    return{r:rowIdx,c:cellIdx};
  };

  const clearSelection=()=>{
    selectedCells.forEach(td=>td.classList.remove('cell-selected'));
    selectedCells.clear();
  };

  const selectRange=(startTd,endTd)=>{
    clearSelection();
    const s=getCellCoords(startTd),e=getCellCoords(endTd);
    const r1=Math.min(s.r,e.r),r2=Math.max(s.r,e.r);
    const c1=Math.min(s.c,e.c),c2=Math.max(s.c,e.c);
    table.querySelectorAll('tbody tr').forEach(tr=>{
      if(tr.rowIndex<r1||tr.rowIndex>r2)return;
      Array.from(tr.cells).forEach(td=>{
        if(td.classList.contains('num'))return;
        if(td.cellIndex>=c1&&td.cellIndex<=c2){
          td.classList.add('cell-selected');
          selectedCells.add(td);
        }
      });
    });
  };

  table.addEventListener('mousedown',e=>{
    const td=e.target.closest('tbody td:not(.num)');
    if(!td)return;
    if(e.button!==0)return;
    isDragging=true;
    dragStart=td;
    clearSelection();
    td.classList.add('cell-selected');
    selectedCells.add(td);
    e.preventDefault();
  });

  table.addEventListener('mouseover',e=>{
    if(!isDragging||!dragStart)return;
    const td=e.target.closest('tbody td:not(.num)');
    if(!td)return;
    selectRange(dragStart,td);
  });

  document.addEventListener('mouseup',()=>{
    if(isDragging){isDragging=false;}
  });

  table.addEventListener('click',e=>{
    const inp=e.target.closest('input');
    if(inp&&selectedCells.size<=1){clearSelection();}
  });

  const buildSelectionTSV=()=>{
    const coords=[];
    selectedCells.forEach(td=>{coords.push({r:td.parentElement.rowIndex,c:td.cellIndex,td});});
    if(!coords.length)return'';
    const r1=Math.min(...coords.map(x=>x.r)),r2=Math.max(...coords.map(x=>x.r));
    const c1=Math.min(...coords.map(x=>x.c)),c2=Math.max(...coords.map(x=>x.c));
    const grid=[];
    for(let r=r1;r<=r2;r++){
      const row=[];
      for(let c=c1;c<=c2;c++){
        const match=coords.find(x=>x.r===r&&x.c===c);
        row.push(match?match.td.querySelector('input')?.value||'':'');
      }
      grid.push(row.join('\t'));
    }
    return grid.join('\n');
  };

  document.addEventListener('keydown',e=>{
    if(selectedCells.size===0)return;
    const active=document.activeElement;
    const inTable=table.contains(active);
    if(!inTable&&active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'))return;

    if(e.key==='Delete'||e.key==='Backspace'){
      e.preventDefault();
      selectedCells.forEach(td=>{const inp=td.querySelector('input');if(inp)inp.value='';});
      etmUpdateSteps();
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='c'){
      const rows=buildSelectionTSV();
      navigator.clipboard?.writeText(rows).catch(()=>{});
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='x'){
      const rows=buildSelectionTSV();
      navigator.clipboard?.writeText(rows).catch(()=>{});
      selectedCells.forEach(td=>{const inp=td.querySelector('input');if(inp)inp.value='';});
      etmUpdateSteps();
    }
  });
}

function handlePaste(e,prefix,rowIdx,colKey,maxRows,cols){
  const text=e.clipboardData.getData('text');
  if(!text.includes('\t')&&!text.includes('\n'))return;
  e.preventDefault();
  const rows=text.trim().split(/\r?\n/);
  const colStart=cols.indexOf(colKey);
  rows.forEach((row,ri)=>{
    const cells=row.split('\t');
    cells.forEach((val,ci)=>{
      const r=rowIdx+ri,c=colStart+ci;
      if(r>maxRows||c>=cols.length)return;
      const el=document.getElementById(`${prefix}${r}${cols[c]}`);
      if(el)el.value=val.trim();
    });
  });
}

function buildPhotosSection(){
  const sec=mkSec('Photos (2 slots — Slide 1)');

  [
    {id:'photo1',rId:'rId3',label:'Photo 1'},

    grid.appendChild(div);

          document.getElementById('pi_'+slot.id).src=ev.target.result;
          document.getElementById('ps_'+slot.id).classList.add('filled');

// ─────── STEPPER ───────
function etmUpdateSteps(){
  const vin=document.getElementById('VIN')?.value?.trim();
  const model=document.getElementById('MODEL')?.value?.trim();
  const dlr=document.getElementById('DLR_CD')?.value?.trim()||document.getElementById('DLR_NM')?.value?.trim();

  // Step 1 done: VIN + Model both filled
  const s1done=!!(vin&&model);

  // Step 2 done: dealer filled + at least 1 service history row has any value
  const shCols=['N','VIN','RO','DT','KM','DC','ACT','RS','STS'];
  let tableHasRow=false;
  for(let i=1;i<=12&&!tableHasRow;i++){
    for(const col of shCols){
      const el=document.getElementById(`sh${i}${col}`);
      if(el&&el.value.trim()){tableHasRow=true;break;}
    }
  }
  const s2done=!!(dlr&&tableHasRow);

  // Step 3 done: at least 1 photo uploaded
  const s3done=Object.keys(PHOTOS).length>0;

  // Scroll-based: which section is currently in view?
  const sections=formWrap.querySelectorAll('.form-section');
  let activeSecIdx=0;
  sections.forEach((sec,i)=>{
    const rect=sec.getBoundingClientRect();
    if(rect.top<=window.innerHeight*0.55)activeSecIdx=i;
  });

  const s1active=activeSecIdx>=0;
  const s2active=activeSecIdx>=1||s2done;
  const s3active=activeSecIdx>=2||s3done;

  const steps=[
    {done:s1done,active:s1active},
    {done:s2done,active:s2active},
    {done:s3done,active:s3active}
  ];

  steps.forEach((s,i)=>{
    const st=document.getElementById('etm-st'+(i+1)),sn=document.getElementById('etm-sn'+(i+1));
    if(!st||!sn)return;
    if(s.done){
      st.className='step done';
      sn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
    } else {
      st.className='step'+(s.active?' active':'');
      sn.textContent=i+1;
    }
  });
}

// Hook scroll for stepper
window.addEventListener('scroll',etmUpdateSteps,{passive:true});

function collectData(){
  const data={};
  // MODEL, PROB_NAT, DRV_PAT come from hidden inputs (custom selects)
  ['VIN','KMS','ENG_TM','ROM_ID','DTC','DLR_CD','DLR_NM','COMPLAINT','DLR_STD','DLR_OBS','DLR_ACT','RMRKS','PHOTO_NOTE'].forEach(id=>{
    const el=document.getElementById(id);data[id]=el?el.value.trim():'';
  });
  // MODEL, PROB_NAT, DRV_PAT from select hidden inputs
  ['MODEL','PROB_NAT','DRV_PAT'].forEach(id=>{
    const el=document.getElementById(id);data[id]=el?el.value.trim():'';
  });
  // Date fields (manual inputs with id dm_*)
  document.querySelectorAll('input[id^="dm_"]').forEach(el=>{
    const key=el.id.replace('dm_','');data[el.id]=el.value.trim();
  });
  // Service history rows
  const shCols=['N','VIN','RO','DT','KM','DC','ACT','RS','STS'];
  for(let i=1;i<=12;i++){
    shCols.forEach(col=>{
      const el=document.getElementById(`sh${i}${col}`);
      data[`${col}${i}`]=el?el.value.trim():'';
    });
  }
  return data;
}

// ─────── XML ESCAPE ───────
function xmlEsc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&apos;');
}

// ─────── INJECT & GENERATE PPTX ───────
btnInject.addEventListener('click',async()=>{
  if(!templateBuffer){showStatus('Template not loaded.','error');return;}
  btnInject.disabled=true;btnInject.textContent='Generating…';clearStatus();
  try{
    const data=collectData();

    // Validate mandatory fields
    const errors=[];
    if(!data.VIN){
      errors.push('VIN Number');
      const el=document.getElementById('VIN');
      if(el){el.style.borderColor='var(--danger-color)';el.style.boxShadow='0 0 0 3px rgba(239,68,68,0.15)';}
    } else {
      const el=document.getElementById('VIN');
      if(el){el.style.borderColor='';el.style.boxShadow='';}
    }
    if(!data.MODEL){
      errors.push('Vehicle Model');
      const trig=document.getElementById('cst_MODEL');
      if(trig){trig.style.borderColor='var(--danger-color)';trig.style.boxShadow='0 0 0 3px rgba(239,68,68,0.15)';}
    } else {
      const trig=document.getElementById('cst_MODEL');
      if(trig){trig.style.borderColor='';trig.style.boxShadow='';}
    }
    if(errors.length>0){
      showStatus('⚠ Please fill in required fields: '+errors.join(', '),'error');
      // Scroll to show error near button
      document.getElementById('status').scrollIntoView({behavior:'smooth',block:'nearest'});
      btnInject.disabled=false;btnInject.textContent='Generate PPTX';return;
    }

    const zip=await JSZip.loadAsync(templateBuffer);

    // ── Replace text placeholders in all slide XMLs ──
    const replaceFn=xml=>{
      return xml.replace(/\{\{([^}]+)\}\}/g,(_,key)=>{
        const v=data[key];
        return xmlEsc((v===undefined||v===null||v==='')?'':v);
      });
    };

    const slideFiles=Object.keys(zip.files).filter(p=>p.match(/ppt\/slides\/slide\d+\.xml$/i));
    for(const sf of slideFiles){
      let xml=await zip.files[sf].async('string');
      if(xml.includes('{{'))xml=replaceFn(xml);
      // Replace noAutofit with spAutoFit so text boxes expand to fit injected content
      xml=xml.replace(/<a:noAutofit\/>/g,'<a:spAutoFit/>');
      zip.file(sf,xml);
    }

    // ── Inject photos: overwrite existing media bytes — shape stretch/fill preserved ──
    const photoMap={
      photo1:{mediaPath:'ppt/media/image2.jpeg'},
      photo2:{mediaPath:'ppt/media/image3.jpeg'}
    };

    for(const [slotId,{mediaPath}] of Object.entries(photoMap)){
      const photo=PHOTOS[slotId];
      if(!photo||!photo.dataUrl)continue;
      // Convert dataUrl to Uint8Array
      const b64=photo.dataUrl.split(',')[1];
      const bin=atob(b64);
      const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      // Detect mime and determine actual extension for Content_Types if needed
      const mime=photo.dataUrl.split(';')[0].split(':')[1]||'image/jpeg';
      // Overwrite the existing placeholder image file directly
      zip.file(mediaPath,arr);
      // If user uploaded a PNG/webp, also update content_types for that extension
      if(mime!=='image/jpeg'&&mime!=='image/jpg'){
        const ext=mime==='image/png'?'png':mime==='image/webp'?'webp':'jpg';
        const ctPath='[Content_Types].xml';
        let ct=await zip.files[ctPath].async('string');
        const ctStr=`Extension="${ext}" ContentType="${mime}"`;
        if(!ct.includes(ctStr)){
          ct=ct.replace('</Types>',`<Default ${ctStr}/></Types>`);
          zip.file(ctPath,ct);
        }
      }
    }

    // ── Generate output ──
    const outBuf=await zip.generateAsync({
      type:'arraybuffer',
      compression:'DEFLATE',
      compressionOptions:{level:6}
    });
    const blob=new Blob([outBuf],{type:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
    const vinClean=(data.VIN||'NOVIN').replace(/[^a-zA-Z0-9]/g,'');
    const dcClean=(data.DLR_CD||'N3235').replace(/[^a-zA-Z0-9]/g,'');
    const fname=`${vinClean}_${dcClean}_ETM.pptx`;
    saveAs(blob,fname);
    showStatus('✓ Downloaded: '+fname,'success');
    saveHistory(data);
  }catch(err){showStatus('Error: '+err.message,'error');console.error(err);}
  finally{btnInject.disabled=false;btnInject.textContent='Generate PPTX';}
});

// ─────── HISTORY ───────
function saveHistory(entry){
  const key=entry.VIN;if(key)HISTORY=HISTORY.filter(h=>h.VIN!==key);
  HISTORY.unshift(entry);if(HISTORY.length>50)HISTORY=HISTORY.slice(0,50);
  try{localStorage.setItem(HIST_KEY,JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}

async function deleteHistory(idx){
  HISTORY.splice(idx,1);
  try{localStorage.setItem(HIST_KEY,JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}

document.getElementById('btnHistoryClearAll').addEventListener('click',async()=>{
  if(!(await customConfirm('Clear all saved entries?','Yes, Clear All')))return;
  HISTORY=[];try{localStorage.removeItem(HIST_KEY);}catch(e){}historySearch.value='';renderHistory();
});
historySearch.addEventListener('input',()=>renderHistory(historySearch.value));

function renderHistory(filter=''){
  if(!HISTORY.length){histList.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No saved entries.</div>';return;}
  histList.innerHTML='';
  const q=filter.toLowerCase().trim();
  let any=false;
  HISTORY.forEach((entry,idx)=>{
    const primary=entry.VIN||'Unknown';
    const sub=[entry.MODEL,entry.DLR_CD].filter(Boolean).join(' · ');
    if(q&&!`${primary} ${sub}`.toLowerCase().includes(q))return;
    any=true;
    const item=document.createElement('div');item.className='hist-item';item.setAttribute('tabindex','0');
    item.innerHTML=`<div class="hi-info"><div class="hi-name">${escHtml(primary)}</div><div class="hi-meta">${escHtml(sub)}</div></div><button type="button" class="hi-del" tabindex="0" title="Delete">${icons.close}</button>`;
    const delBtn=item.querySelector('.hi-del');
    const delA=async e=>{e.stopPropagation();if(!(await customConfirm('Delete this entry?','Delete')))return;deleteHistory(idx);};
    delBtn.addEventListener('click',delA);handleKeyClick(delBtn,delA);
    const itemA=()=>fillFromHistory(entry);
    item.addEventListener('click',e=>{if(e.target.closest('.hi-del'))return;itemA();});
    handleKeyClick(item,itemA);
    histList.appendChild(item);
  });
  if(!any)histList.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No matching entries.</div>';
}

function fillFromHistory(entry){
  setMode('form');
  setTimeout(()=>{
    // Plain text fields
    ['VIN','KMS','ENG_TM','ROM_ID','DTC','DLR_CD','DLR_NM','COMPLAINT','DLR_STD','DLR_OBS','DLR_ACT','RMRKS','PHOTO_NOTE'].forEach(id=>{
      const el=document.getElementById(id);
      if(el&&entry[id]!==undefined){el.value=entry[id];el.classList.remove('pre');}
    });
    // Restore PROB_NAT and DRV_PAT dropdowns
    ['PROB_NAT','DRV_PAT'].forEach(id=>{
      if(!entry[id])return;
      const hidEl=document.getElementById(id);if(hidEl)hidEl.value=entry[id];
      const lbl=document.getElementById('csv_'+id);if(lbl){lbl.textContent=entry[id];lbl.classList.remove('empty');}
    });
    // Restore MODEL select
    if(entry.MODEL){
      const hidEl=document.getElementById('MODEL');if(hidEl)hidEl.value=entry.MODEL;
      const lbl=document.getElementById('csv_MODEL');if(lbl){lbl.textContent=entry.MODEL;lbl.classList.remove('empty');}
    }
    // Service history
    const shCols=['N','VIN','RO','DT','KM','DC','ACT','RS','STS'];
    for(let i=1;i<=12;i++){
      shCols.forEach(col=>{
        const el=document.getElementById(`sh${i}${col}`);
        if(el&&entry[`${col}${i}`]!==undefined)el.value=entry[`${col}${i}`];
      });
    }
    // Restore date fields (manual inputs)
    Object.keys(entry).filter(k=>k.startsWith('dm_')).forEach(k=>{
      const el=document.getElementById(k);
      if(el&&entry[k]!==undefined){
        el.value=entry[k];
        // Sync CAL state
        const calId=k.replace('dm_','');
        if(entry[k]&&entry[k].length===10){
          const [dd,mm,yyyy]=entry[k].split('-').map(Number);
          const d=new Date(yyyy,mm-1,dd);
          if(!isNaN(d)&&CAL[calId]){CAL[calId].date=d;CAL[calId].year=d.getFullYear();CAL[calId].month=d.getMonth();}
        }
      }
    });
    closeAllPopups();clearStatus();
  },100);
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showStatus(m,t){statusEl.textContent=m;statusEl.className='status'+(t?' '+t:'');}
function clearStatus(){statusEl.textContent='';statusEl.className='status';}

// ─────── THEME + BACKUP/RESTORE ───────
window.addEventListener('message',event=>{
  if(event.data?.type==='theme')
    document.documentElement.setAttribute('data-theme',event.data.theme);
  if(event.data?.type==='backup-request'){
    const payload={};
    try{const v=localStorage.getItem(HIST_KEY);if(v)payload[HIST_KEY]=v;}catch(e){}
    event.source.postMessage({type:'backup-response',tool:'etm',data:payload},'*');
  }
  if(event.data?.type==='restore-data'&&event.data.tool==='etm'&&event.data.data){
    Object.entries(event.data.data).forEach(([k,v])=>{try{localStorage.setItem(k,v);}catch(e){}});
    try{HISTORY=JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch(e){}
    renderHistory();
  }
});
// ─────── PAGE JUMPERS ───────
(()=>{
  const pjTop=document.getElementById('pjTop');
  const pjBot=document.getElementById('pjBot');
  let hideTimer=null;
  const showJumpers=()=>{
    const sh=document.documentElement.scrollHeight,wh=window.innerHeight;
    const scrollable=sh>wh+20;
    if(!scrollable){pjTop.classList.remove('vis');pjBot.classList.remove('vis');return;}
    const st=window.scrollY;
    const nearTop=st<60;
    const nearBottom=st+wh>sh-60;
    pjTop.classList.toggle('vis',!nearTop);
    pjBot.classList.toggle('vis',!nearBottom);
  };
  const scheduleHide=()=>{
    if(hideTimer)clearTimeout(hideTimer);
    hideTimer=setTimeout(()=>{pjTop.classList.remove('vis');pjBot.classList.remove('vis');},2000);
  };
  window.addEventListener('scroll',()=>{showJumpers();scheduleHide();},{passive:true});
  window.addEventListener('load',showJumpers);
  pjTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  pjBot.addEventListener('click',()=>window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}));
})();

window.parent.postMessage({type:'requestTheme'},'*');
