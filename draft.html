<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #f4f4f2;
            --surface: #ffffff;
            --surface2: #f0f0ee;
            --border: #e3e3df;
            --text: #181816;
            --text2: #6a6a67;
            --text3: #9a9a97;
            --accent: #002C5F;
            --accent-h: #001F47;
            --accent-s: #e8edf5;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0, 0, 0, .06), 0 4px 12px rgba(0, 0, 0, .04);
            --font: 'Inter', sans-serif;
            --tr: 180ms ease;
        }

        [data-theme=dark] {
            --bg: #111110;
            --surface: #1c1c1a;
            --surface2: #232321;
            --border: #2d2d2b;
            --text: #f0f0ee;
            --text2: #888885;
            --text3: #525250;
            --accent: #4D8FD6;
            --accent-h: #3A7BC8;
            --accent-s: #001A3A;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            padding: 20px 20px 90px;
            transition: background var(--tr), color var(--tr);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .ph {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .ph-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -.4px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .drafts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .hist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            cursor: pointer;
            transition: all var(--tr);
        }

        .hist-item:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }

        .hi-info {
            flex: 1;
            min-width: 0;
        }

        .hi-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hi-meta {
            font-size: 12px;
            color: var(--text2);
            margin-top: 3px;
        }

        .hi-del {
            background: none;
            border: none;
            color: var(--border);
            cursor: pointer;
            transition: color var(--tr);
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 4px;
            outline: none;
        }

        .hi-del:hover {
            color: #e05252;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text3);
            font-size: 14px;
        }

        .btn-row {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .btn {
            font-family: var(--font);
            font-size: 13.5px;
            font-weight: 500;
            padding: 9px 18px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: all var(--tr);
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .btn-danger {
            background: #e05252;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c93b3b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, .4);
            backdrop-filter: blur(3px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            width: 90%;
            max-width: 340px;
            box-shadow: var(--shadow);
            transform: scale(.95) translateY(10px);
            transition: all .2s cubic-bezier(.4, 0, .2, 1);
        }

        .modal-overlay.show .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-msg {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 14px;
            border-radius: 7px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            border: none;
            font-family: var(--font);
            outline: none;
        }

        .modal-btn-cancel {
            background: var(--surface2);
            color: var(--text2);
        }

        .modal-btn-cancel:hover,
        .modal-btn-cancel:focus {
            background: var(--border);
            color: var(--text);
        }

        .modal-btn-ok {
            background: #e05252;
            color: #fff;
        }

        .modal-btn-ok:hover,
        .modal-btn-ok:focus {
            background: #c93b3b;
        }
    </style>
</head>

<body>
    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-msg" id="modalMsg">Are you sure?</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn modal-btn-ok" id="modalOk">Confirm</button>
            </div>
        </div>
    </div>
    <div class="ph">
        <div class="ph-title">Drafts</div>
    </div>
    <div class="container">
        <div class="drafts-list" id="drafts-list"></div>
        <div class="btn-row" id="clear-btn-row" style="display: none;">
            <button class="btn btn-danger" onclick="clearAllDrafts()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
                Clear All Drafts
            </button>
        </div>
    </div>

    <script>
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'theme') {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });

        // IndexedDB Helper Functions for Drafts
        const DB_NAME = 'OfficeDeskDB';
        const STORE_NAME = 'drafts';

        function getDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function getAllDrafts() {
            return getDB().then(db => new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    const drafts = request.result || [];
                    drafts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    resolve(drafts);
                };
                request.onerror = () => reject(request.error);
            }));
        }

        function deleteDraftFromDB(id) {
            return getDB().then(db => new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            }));
        }

        function clearAllDraftsFromDB() {
            return getDB().then(db => new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            }));
        }

        const labels = {
            alcazar: "Alcazar Form",
            keycode: "Key Code Form",
            letterheads: "Letter Heads",
            pwareg: "PWA Regular",
            etm: "ETM Form",
            agm: "AGM Form"
        };

        function getDraftDate(draft) {
            if (draft.date) return draft.date;
            try {
                const d = new Date(draft.timestamp);
                if (!isNaN(d.getTime())) {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    return `${day}-${month}-${year}`;
                }
            } catch(e) {}
            return '';
        }

        function getPhotoCount(draft) {
            if (!draft.photos) return 0;
            if (Array.isArray(draft.photos)) {
                return draft.photos.filter(p => p && p.dataUrl).length;
            }
            return Object.values(draft.photos).filter(p => p && p.dataUrl).length;
        }

        function renderDrafts() {
            const list = document.getElementById('drafts-list');
            const clearRow = document.getElementById('clear-btn-row');
            getAllDrafts().then(drafts => {
                const seenKeys = new Set();
                const uniqueDrafts = [];
                drafts.forEach(draft => {
                    const dStr = getDraftDate(draft);
                    const key = `${draft.tool}_${draft.vin}_${dStr}`;
                    if (!seenKeys.has(key)) {
                        seenKeys.add(key);
                        uniqueDrafts.push(draft);
                    }
                });

                if (uniqueDrafts.length === 0) {
                    list.innerHTML = '<div class="empty-state">No saved drafts yet.</div>';
                    clearRow.style.display = 'none';
                    return;
                }

                clearRow.style.display = 'flex';
                list.innerHTML = '';
                uniqueDrafts.forEach(draft => {
                    const item = document.createElement('div');
                    item.className = 'hist-item';

                    const info = document.createElement('div');
                    info.className = 'hi-info';
                    const photoCount = getPhotoCount(draft);
                    const photoInfo = photoCount > 0 ? ` · 📷 ${photoCount} Photo${photoCount > 1 ? 's' : ''}` : '';
                    info.innerHTML = `
              <div class="hi-name">${draft.vin || 'Unnamed Draft'}</div>
              <div class="hi-meta">${labels[draft.tool] || draft.tool} · Date: ${getDraftDate(draft)}${photoInfo} · Saved: ${draft.timestamp}</div>
            `;

                    const delBtn = document.createElement('button');
                    delBtn.className = 'hi-del';
                    delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteDraft(draft.id);
                    };

                    item.appendChild(info);
                    item.appendChild(delBtn);

                    item.onclick = () => {
                        window.parent.postMessage({ type: 'load-draft-from-file', id: draft.id }, '*');
                    };

                    list.appendChild(item);
                });
            }).catch(() => {
                list.innerHTML = '<div class="empty-state">No saved drafts yet.</div>';
                clearRow.style.display = 'none';
            });
        }

        function customConfirm(msg, okText = 'Yes') {
            return new Promise(resolve => {
                const modal = document.getElementById('customModal'),
                      msgEl = document.getElementById('modalMsg'),
                      btnOk = document.getElementById('modalOk'),
                      btnCancel = document.getElementById('modalCancel');
                msgEl.textContent = msg;
                btnOk.textContent = okText;
                const cleanup = () => {
                    modal.classList.remove('show');
                    btnOk.removeEventListener('click', onOk);
                    btnCancel.removeEventListener('click', onCancel);
                };
                const onOk = () => { cleanup(); resolve(true); };
                const onCancel = () => { cleanup(); resolve(false); };
                btnOk.addEventListener('click', onOk);
                btnCancel.addEventListener('click', onCancel);
                modal.classList.add('show');
                btnCancel.focus();
            });
        }

        async function deleteDraft(id) {
            if (!(await customConfirm("Are you sure you want to delete this draft?", "Delete"))) return;
            deleteDraftFromDB(id).then(() => {
                renderDrafts();
                window.parent.postMessage({ type: 'draft-deleted' }, '*');
            });
        }

        async function clearAllDrafts() {
            if (!(await customConfirm("Are you sure you want to clear all saved drafts? This cannot be undone.", "Clear All"))) return;
            clearAllDraftsFromDB().then(() => {
                renderDrafts();
                window.parent.postMessage({ type: 'draft-deleted' }, '*');
            });
        }

        renderDrafts();
    </script>
</body>

</html>
