<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Code Form</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg: #f4f4f2;
      --surface: #ffffff;
      --surface2: #f0f0ee;
      --border: #e3e3df;
      --text: #181816;
      --text2: #6a6a67;
      --text3: #9a9a97;
      --accent: #002C5F;
      --accent-h: #001F47;
      --accent-s: #e8edf5;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
      --shadow-lg: 0 4px 24px rgba(0,0,0,.09);
      --font: 'Inter', sans-serif;
      --mono: 'ui-monospace', monospace;
      --tr: 180ms ease;
    }
    [data-theme=dark] {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #232321;
      --border: #2d2d2b;
      --text: #f0f0ee;
      --text2: #888885;
      --text3: #525250;
      --accent: #4D8FD6;
      --accent-h: #3A7BC8;
      --accent-s: #001A3A;
      --shadow: 0 1px 4px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
      --shadow-lg: 0 4px 28px rgba(0,0,0,.45);
    }
    .hist-clr-btn:hover,.hist-clr-btn:focus{color:#ef4444;}
    /* ── History Panel ── */
    .hist-panel { display:none; }
    .hist-panel.show { display:block; }
    .hist-search { width:100%; height:40px; border:1px solid var(--border); border-radius:8px; padding:0 14px; font-size:14px; margin-bottom:14px; outline:none; background:var(--surface2); color:var(--text); font-family:var(--font); }
    .hist-search:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-s); }
    .hist-list { display:flex; flex-direction:column; gap:8px; max-height:400px; overflow-y:auto; }
    .hist-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--border); border-radius:8px; cursor:pointer; background:var(--surface); transition:all 0.18s; }
    .hist-item:hover, .hist-item:focus { border-color:var(--accent); background:var(--surface2); outline:none; }
    .hi-info { flex:1; min-width:0; }
    .hi-name { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hi-meta { font-size:12px; color:var(--text2); margin-top:3px; }
    .hi-del { background:none; border:none; color:var(--border); cursor:pointer; transition:color 0.18s; display:flex; align-items:center; padding:4px; border-radius:4px; outline:none; }
    .hi-del:hover, .hi-del:focus { color:#d64545; }
    .hist-empty { text-align:center; font-size:13px; color:var(--text3); padding:24px; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      transition: background var(--tr), color var(--tr);
    }
    .ph {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .ph-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .ph-sub {
      font-size: 14px;
      color: var(--text2);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--accent-s);
      color: var(--accent);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: background var(--tr), border-color var(--tr);
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
      color: var(--text2);
      justify-content: space-between;
    }
    .card-title svg {
      color: var(--accent);
    }
    .fg {
      display: grid;
      gap: 12px;
    }
    .fg.c3 {
      grid-template-columns: repeat(3, 1fr);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field.s2 {
      grid-column: span 2;
    }
    .field.s3 {
      grid-column: span 3;
    }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .req {
      color: #d64545;
    }
    .field input, .field select, .field textarea {
      padding: 0 14px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      transition: all var(--tr);
    }
    .field textarea { height: auto; padding: 10px 14px; }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-s);
    }
    .vrow {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
      transition: all var(--tr);
    }
    .vrow:hover {
      border-color: var(--accent);
    }
    .vrow-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      margin-bottom: 10px;
      letter-spacing: .5px;
    }
    .vrow-rm {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--tr);
    }
    .vrow-rm:hover {
      background: #d64545;
      border-color: #d64545;
      color: white;
    }
    .divhr {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }
    /* ── Modern Scrollbar ── */
    *{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    *::-webkit-scrollbar{width:5px;height:5px;}
    *::-webkit-scrollbar-track{background:transparent;}
    *::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    *::-webkit-scrollbar-thumb:hover{background:var(--text3);}

    /* ── Mode Buttons ── */
    .mode-wrap{margin:0 0 16px;display:block;}
    .mode-lbl{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
    .mode-btns{display:flex;gap:6px;}
    .mode-btn{flex:1;height:36px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .18s;outline:none;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);}
    .mode-btn:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
    .mode-btn:hover{border-color:var(--text2);color:var(--text);}
    .mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

    /* ── Sticky Stepper ── */
    .stepper-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;position:sticky;top:0;z-index:900;}
    .stepper{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);transition:all var(--tr);}
    .step.done{background:var(--accent-s);border-color:var(--accent);}
    .step.active{border-color:var(--accent);}
    .step-n{width:26px;height:26px;border-radius:50%;background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
    .step.done .step-n,.step.active .step-n{background:var(--accent);color:white;}
    .step-t{font-size:12.5px;font-weight:600;color:var(--text);}
    .step-s{font-size:11px;color:var(--text2);}

    /* ── Page Jumpers ── */
    .page-jumper{position:fixed;right:16px;bottom:80px;z-index:9000;display:flex;flex-direction:column;gap:8px;}
    .pj-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:all .25s cubic-bezier(.4,0,.2,1);outline:none;background:var(--accent);color:#fff;}
    .pj-btn:hover{transform:scale(1.12);box-shadow:0 6px 20px rgba(0,0,0,.3);}
    .pj-btn:active{transform:scale(.95);}
    .pj-btn:focus{box-shadow:0 0 0 3px var(--accent-s),0 4px 14px rgba(0,0,0,.2);}
    .pj-btn.hidden{opacity:0;pointer-events:none;transform:translateY(12px);}
    @media(max-width:640px){.pj-btn{width:38px;height:38px;}.page-jumper{right:10px;bottom:70px;}}

    /* ── Custom Select (model dropdown) ── */
    .cs-wrap{position:relative;user-select:none;width:100%;}
    .cs-trigger{height:42px;border:1px solid var(--border);border-radius:8px;padding:0 14px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all var(--tr);width:100%;outline:none;font-size:14px;font-family:var(--font);color:var(--text);}
    .cs-trigger:hover{border-color:var(--accent);}
    .cs-trigger:focus,.cs-trigger.open{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
    .cs-val{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;text-align:left;}
    .cs-val.empty{color:var(--text3);}
    .cs-arr{color:var(--text3);transition:transform .25s;display:flex;align-items:center;flex-shrink:0;}
    .cs-trigger.open .cs-arr{transform:rotate(180deg);color:var(--text);}
    .cs-opts{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:600;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,.15);max-height:200px;overflow-y:auto;opacity:0;transform:translateY(-6px) scaleY(.96);transform-origin:top;pointer-events:none;transition:all .18s cubic-bezier(.4,0,.2,1);}
    [data-theme=dark] .cs-opts{background:#222220;border-color:#3a3a38;}
    .cs-opts.open{opacity:1;transform:translateY(0) scaleY(1);pointer-events:all;}
    .cs-opt{padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;outline:none;}
    .cs-opt:last-child{border-bottom:none;}
    .cs-opt:hover,.cs-opt:focus{background:var(--surface2);font-weight:500;}

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      flex:1;
      height: 42px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--tr);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-family: var(--font);
      outline:none;
    }
    .btn:focus{box-shadow:0 0 0 3px var(--accent-s);}
    .btn-p {
      background: var(--accent);
      color: white;
    }
    .btn-p:hover {
      background: var(--accent-h);
    }
    .btn-g {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-g:hover {
      background: var(--border);
    }
    .btn-danger{background:rgba(239,68,68,.08);color:#dc2626;border:1px solid rgba(239,68,68,.2);}
    .btn-danger:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);}
    [data-theme=dark] .btn-danger{background:rgba(248,113,113,.08);color:#f87171;border:1px solid rgba(248,113,113,.2);}
    [data-theme=dark] .btn-danger:hover{background:rgba(248,113,113,.15);}
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    #loader.show {
      display: flex;
    }
    .ld-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-lg);
    }
    .spin {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: sp 650ms linear infinite;
    }
    @keyframes sp {
      to { transform: rotate(360deg); }
    }
    .ld-card p {
      font-size: 13.5px;
      color: var(--text2);
      font-weight: 500;
    }
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all 280ms ease;
      z-index: 600;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.ok {
      color: #16a34a;
      border-color: #16a34a;
    }
    #toast.err {
      color: #d64545;
      border-color: #d64545;
    }
    #toast.info {
      color: var(--accent);
      border-color: var(--accent);
    }
    @media(max-width:768px) {
      .fg.c3 { grid-template-columns: 1fr; }
      .field.s2, .field.s3 { grid-column: span 1; }
      .btn-row { flex-direction: column-reverse; }
      .stepper{grid-template-columns:1fr 1fr;}      .mode-btns{flex-wrap:wrap;}
      .mode-btn{flex:1 1 calc(50% - 3px);}
    }

  /* ── Custom Calendar Picker ── */
  .date-trigger {
    height: 42px; display: flex; align-items: center; padding: 0 14px;
    cursor: pointer; user-select: none; gap: 8px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); transition: all 0.2s ease;
    position: relative; width: 100%; outline: none; box-sizing: border-box; font-size: 14px;
  }
  .date-trigger:hover { border-color: var(--accent); }
  .date-trigger:focus, .date-trigger.active { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent); }
  .date-icon { color: var(--text3); display: flex; align-items: center; flex-shrink: 0; }
  .dval { font-size: 14px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dval.empty { color: var(--text3); }
  .cal-pop {
    position: fixed; z-index: 9999;
    background: #ffffff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; box-shadow: 0 12px 32px rgba(0,0,0,0.22);
    width: 252px; opacity: 0; pointer-events: none;
    transition: opacity 0.18s ease;
  }
  [data-theme=dark] .cal-pop { background: #222220; border-color: #3a3a38; }
  [data-theme=dark] .cs-opts { background: #222220; border-color: #3a3a38; }
  .cal-pop.open { opacity: 1; pointer-events: all; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .mnth { font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; padding: 3px 7px; border-radius: 5px; transition: background 0.15s; outline: none; }
  .mnth:hover, .mnth:focus { background: var(--surface2); }
  .cal-nav button { background: none; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.15s; outline: none; }
  .cal-nav button:hover { background: var(--surface2); color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-grid.years { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .dn { font-size: 9.5px; font-weight: 600; text-transform: uppercase; color: var(--text3); text-align: center; padding-bottom: 6px; }
  .cd { font-size: 12px; text-align: center; padding: 7px 2px; border-radius: 5px; cursor: pointer; color: var(--text); transition: all 0.12s; outline: none; }
  .cal-grid.years .cd { padding: 10px 3px; font-weight: 500; }
  .cd:hover, .cd:focus { background: var(--surface2); }
  .cd.sel { background: var(--accent) !important; color: #fff !important; font-weight: 600; }
  .cd.today { font-weight: 700; text-decoration: underline; }
  .cd.om { color: var(--border); pointer-events: none; }
  .date-wrap { position: relative; }

  /* ── Custom Modal ── */
  .modal-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.45); backdrop-filter:blur(3px); z-index:99999; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:90%; max-width:340px; box-shadow:var(--shadow-lg); transform:scale(0.95) translateY(10px); transition:all 0.2s cubic-bezier(0.4,0,0.2,1); }
  .modal-overlay.show .modal-box { transform:scale(1) translateY(0); }
  .modal-msg { font-size:14px; color:var(--text); font-weight:500; margin-bottom:20px; line-height:1.5; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  .modal-btn { padding:9px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:var(--font); outline:none; transition:all 0.15s; }
  .modal-btn-cancel { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .modal-btn-cancel:hover { background:var(--border); }
  .modal-btn-ok { background:#ef4444; color:#fff; }
  .modal-btn-ok:hover { opacity:0.88; }
  </style>
</head>
<body>
<div class="modal-overlay" id="kcModalOverlay">
  <div class="modal-box">
    <div class="modal-msg" id="kcModalMsg">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="kcModalCancel">Cancel</button>
      <button class="modal-btn modal-btn-ok" id="kcModalOk">Confirm</button>
    </div>
  </div>
</div>

  <div id="toast"></div>
  <div id="loader"><div class="ld-card"><div class="spin"></div><p>Processing...</p></div></div>

  <div class="ph">
    <div>
      <div class="ph-title">Key Code Request Form</div>
      <div class="ph-sub">Multiple vehicles per export — shared fields apply to all rows</div>
    </div>
    <span class="chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>XLS Export</span>
  </div>

  <div class="stepper-container">
  <div class="stepper">
    <div class="step active" id="kc-st1">
      <div class="step-n" id="kc-sn1">1</div>
      <div><div class="step-t">Shared Info</div><div class="step-s">Date, dealer, requester</div></div>
    </div>
    <div class="step" id="kc-st2">
      <div class="step-n" id="kc-sn2">2</div>
      <div><div class="step-t">Vehicles</div><div class="step-s">VIN rows added</div></div>
    </div>
    <div class="step" id="kc-st3">
      <div class="step-n" id="kc-sn3">3</div>
      <div><div class="step-t">Ready</div><div class="step-s">Export to Excel</div></div>
    </div>
  </div>
  </div>



  <div class="mode-wrap">
    <div class="mode-btns">
      <button class="mode-btn active" id="kc-modeForm" onclick="kcSetMode('form')" tabindex="0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        Fill Form
      </button>
      <button class="mode-btn" id="kc-modeHistory" onclick="kcSetMode('history')" tabindex="0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Saved Entries
      </button>
    </div>
  </div>

  <!-- History Panel — sits right after mode buttons, same as ETM -->
  <div class="card hist-panel" id="kc-histPanel" style="padding:16px 20px 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <span style="font-size:13px;font-weight:600;color:var(--text);">Saved Records</span>
      <button id="kc-clearAllBtn" class="hist-clr-btn" style="font-size:12px;color:var(--text2);cursor:pointer;background:none;border:none;transition:color .2s;padding:0;outline:none;font-family:var(--font);" onclick="kcClearAllHistory()">Clear all</button>
    </div>
    <input type="text" class="hist-search" id="kc-histSearch" placeholder="Search by VIN or Dealer Code..." autocomplete="off">
    <div class="hist-list" id="kc-histList"></div>
  </div>

  <!-- Form cards wrapped so kcSetMode can hide/show them -->
  <div id="kc-formWrap">
  <div class="card">
    <div class="card-title">
      <span style="display:flex;align-items:center;gap:7px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Shared Details
      </span>
      <span style="font-weight:400;color:var(--text3);font-size:12px;">(applies to all vehicles)</span>
    </div>
    <div class="fg c3">
      <div class="field"><label>Date <span class="req">*</span></label>
        <div class="date-wrap">
          <div class="date-trigger" id="dt_kc-date" tabindex="0" style="cursor:text;">
            <input type="text" id="di_kc-date" placeholder="DD-MM-YYYY or pick →" style="flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none;font-family:var(--font);width:100%;cursor:text;" tabindex="-1">
            <span class="date-icon" id="dico_kc-date" style="cursor:pointer;flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span>
          </div>
          <div class="cal-pop" id="cp_kc-date"></div>
          <input type="hidden" id="kc-date" value="">
        </div>
      </div>
      <div class="field"><label>Dealer Code</label><input type="text" id="kc-dcode" value="N3235" placeholder="e.g. N3235"></div>
      <div class="field"><label>Dealer Name</label><input type="text" id="kc-dname" value="KHANNA AUTOMART PVT. LTD." placeholder="Full dealer name"></div>
      <div class="field"><label>Requester Name <span class="req">*</span></label><input type="text" id="kc-rname" value="NARENDRA KUMAR" placeholder="e.g. NARENDRA KUMAR"></div>
      <div class="field"><label>Requester Contact No.</label><input type="tel" id="kc-rcontact" value="8979040022" placeholder="e.g. 8979040022"></div>
      <div class="field"><label>TPSM Name</label><input type="text" id="kc-tpsm" placeholder="e.g. AVINASH"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span style="display:flex;align-items:center;gap:7px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Vehicles
      </span>
      <button class="btn btn-g" style="padding:5px 12px;font-size:12px;" onclick="kcAddRow()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Vehicle
      </button>
    </div>
    <div id="kc-rows"></div>
  </div>
  <!-- Validation message -->
  <div id="kc-valMsg" style="display:none;background:rgba(214,69,69,0.08);border:1px solid rgba(214,69,69,0.25);color:#d64545;border-radius:7px;padding:10px 14px;font-size:13px;font-weight:500;margin:0 0 10px;align-items:center;gap:8px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="kc-valText"></span>
  </div>
  <div id="kc-actionsBar" style="display:flex;gap:10px;padding:14px 0 20px;border-top:1px solid var(--border);margin-top:14px;align-items:center;">
    <button class="btn btn-p" id="kc-exportBtn" onclick="exportKeyCode()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Generate Excel</button>
    <button class="btn btn-danger" onclick="clearKcSaved()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>Clear Form</button>
  </div>
  <span style="font-size:11.5px;color:var(--text3);display:block;margin-bottom:8px;" id="kc-save-status"></span>

  </div><!-- end kc-formWrap -->

  <script>
    // ── Custom Confirm Modal ──
    function kcConfirm(message, okText='Confirm') {
      return new Promise(resolve => {
        const overlay = document.getElementById('kcModalOverlay');
        document.getElementById('kcModalMsg').textContent = message;
        document.getElementById('kcModalOk').textContent = okText;
        const ok = document.getElementById('kcModalOk');
        const cancel = document.getElementById('kcModalCancel');
        const cleanup = () => { overlay.classList.remove('show'); ok.removeEventListener('click', onOk); cancel.removeEventListener('click', onCancel); };
        const onOk = () => { cleanup(); resolve(true); };
        const onCancel = () => { cleanup(); resolve(false); };
        ok.addEventListener('click', onOk); cancel.addEventListener('click', onCancel);
        overlay.classList.add('show'); cancel.focus();
      });
    }
    // ── End Modal ──


    // ── Backup / Restore via postMessage ──
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'theme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
      }
      if (e.data && e.data.type === 'backup-request') {
        const keys = ['od_keycode_v1', 'od_kc_hist_v1'];
        const payload = {};
        keys.forEach(k => {
          try { const v = localStorage.getItem(k); if (v) payload[k] = v; } catch(e) {}
        });
        e.source.postMessage({ type: 'backup-response', tool: 'keycode', data: payload }, '*');
      }
      if (e.data && e.data.type === 'restore-data') {
        if (e.data.tool === 'keycode' && e.data.data) {
          Object.entries(e.data.data).forEach(([k, v]) => {
            try { localStorage.setItem(k, v); } catch(e) {}
          });
          // Reload form
          kcRestoreData();
          kcRenderRows();
          const el = document.getElementById('kc-save-status');
          if (el) el.textContent = 'Restored';
          // Reload history
          try { KC_HISTORY = JSON.parse(localStorage.getItem(KC_HIST_KEY) || '[]'); } catch(e) {}
          kcRenderHistory();
        }
      }
    });


    const KC_SHARED_IDS = ["kc-date", "kc-dcode", "kc-dname", "kc-rname", "kc-rcontact", "kc-tpsm"];
    const KC_SAVE_KEY = "od_keycode_v1";

    // ── Saved Entries History ──
    const KC_HIST_KEY = "od_kc_hist_v1";
    let KC_HISTORY = [];
    try { KC_HISTORY = JSON.parse(localStorage.getItem(KC_HIST_KEY) || '[]'); } catch(e) {}

    function kcSaveHistory() {
      kcReadRows();
      const shared = {};
      KC_SHARED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el && el.value.trim()) shared[id] = el.value.trim();
      });
      const validRows = kcRows.filter(r => r.vin && r.vin.trim());
      if (!validRows.length && !shared['kc-dcode']) return;
      const entry = { shared, rows: validRows.map(r => ({...r})) };
      // Replace entry with same dealer code
      const dcode = shared['kc-dcode'] || '';
      if (dcode) KC_HISTORY = KC_HISTORY.filter(h => (h.shared?.['kc-dcode'] || '') !== dcode);
      KC_HISTORY.unshift(entry);
      if (KC_HISTORY.length > 50) KC_HISTORY = KC_HISTORY.slice(0, 50);
      try { localStorage.setItem(KC_HIST_KEY, JSON.stringify(KC_HISTORY)); } catch(e) {}
      kcRenderHistory();
    }

    function kcRenderHistory(filter = '') {
      const list = document.getElementById('kc-histList');
      if (!list) return;
      if (!KC_HISTORY.length) { list.innerHTML = '<div class="hist-empty">No saved entries yet.</div>'; return; }
      list.innerHTML = '';
      const q = filter.toLowerCase().trim();
      let shown = 0;
      KC_HISTORY.forEach((entry, idx) => {
        const dcode = entry.shared?.['kc-dcode'] || '';
        const dname = entry.shared?.['kc-dname'] || '';
        const vins = (entry.rows || []).map(r => r.vin).filter(Boolean).join(', ');
        if (q && !`${dcode} ${dname} ${vins}`.toLowerCase().includes(q)) return;
        shown++;
        const item = document.createElement('div');
        item.className = 'hist-item'; item.tabIndex = 0;
        item.innerHTML = `<div class="hi-info">
          <div class="hi-name">${_kcEsc(dcode || dname || 'Unknown')}</div>
          <div class="hi-meta">${_kcEsc(dname)}${vins ? ' · ' + _kcEsc(vins.substring(0,40)) : ''}</div>
        </div>
        <button class="hi-del" data-idx="${idx}" title="Delete" tabindex="0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
        const delBtn = item.querySelector('.hi-del');
        const delAct = async e => {
          e.stopPropagation();
          if (!(await kcConfirm('Delete this entry?', 'Delete'))) return;
          KC_HISTORY.splice(idx, 1);
          try { localStorage.setItem(KC_HIST_KEY, JSON.stringify(KC_HISTORY)); } catch(e) {}
          kcRenderHistory(document.getElementById('kc-histSearch')?.value || '');
        };
        delBtn.addEventListener('click', delAct);
        delBtn.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();delAct(e);} });
        const loadAct = () => kcLoadFromHistory(entry);
        item.addEventListener('click', e => { if(!e.target.closest('.hi-del')) loadAct(); });
        item.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();loadAct();} });
        list.appendChild(item);
      });
      if (!shown) list.innerHTML = '<div class="hist-empty">No matching entries found.</div>';
    }

    function kcLoadFromHistory(entry) {
      // Restore shared fields
      if (entry.shared) {
        KC_SHARED_IDS.forEach(id => {
          const el = document.getElementById(id);
          if (el && entry.shared[id] !== undefined) {
            el.value = entry.shared[id];
            // Sync calendar for date field
            if (id === 'kc-date' && entry.shared[id]) {
              const parts = entry.shared[id].split('-');
              if (parts.length === 3) {
                const d = new Date(+parts[2], +parts[1]-1, +parts[0]);
                if (!isNaN(d)) {
                  if (!_KC_CAL[id]) _KC_CAL[id] = {};
                  Object.assign(_KC_CAL[id], {date:d, year:d.getFullYear(), month:d.getMonth(), view:'days'});
                  const di = document.getElementById('di_'+id);
                  const dv = document.getElementById('dv_'+id);
                  if (di) di.value = entry.shared[id];
                  if (dv) { dv.textContent = entry.shared[id]; dv.classList.remove('empty'); }
                }
              }
            }
          }
        });
      }
      kcSetMode('form');
      setTimeout(() => {
        // Restore rows
        if (entry.rows && entry.rows.length) {
          kcRows = entry.rows.map(r => ({...r}));
          kcRenderRows();
        }
        kcScheduleSave();
        toast('Entry loaded', 'ok');
      }, 100);
    }

    async function kcClearAllHistory() {
      if (!(await kcConfirm('Clear all saved entries?', 'Yes, Clear All'))) return;
      KC_HISTORY = [];
      try { localStorage.removeItem(KC_HIST_KEY); } catch(e) {}
      kcRenderHistory();
    }

    function kcSetMode(mode) {
      const panel = document.getElementById('kc-histPanel');
      const formWrap = document.getElementById('kc-formWrap');
      const actionsBar = document.getElementById('kc-actionsBar');
      const valMsg = document.getElementById('kc-valMsg');
      const isHistory = mode === 'history';
      panel.classList.toggle('show', isHistory);
      if (formWrap) formWrap.style.display = isHistory ? 'none' : 'block';
      if (actionsBar) actionsBar.style.display = isHistory ? 'none' : 'flex';
      if (valMsg) valMsg.style.display = isHistory ? 'none' : '';
      document.getElementById('kc-modeForm')?.classList.toggle('active', mode === 'form');
      document.getElementById('kc-modeHistory')?.classList.toggle('active', isHistory);
      if (isHistory) {
        kcRenderHistory(document.getElementById('kc-histSearch')?.value || '');
        // Mobile pe keyboard na khule isliye autofocus nahi
      }
    }
    function kcSaveEntry() {
      kcSaveHistory();
      const btn = document.getElementById('kc-modeSave');
      if(btn){ btn.classList.add('active'); setTimeout(()=>btn.classList.remove('active'),900); }
      toast('Entry saved', 'ok');
    }
    function kcToggleHistory() { kcSetMode(document.getElementById('kc-histPanel').classList.contains('show') ? 'form' : 'history'); }
    function kcUpdateSteps() {
      const rname = document.getElementById('kc-rname')?.value?.trim();
      const date = document.getElementById('kc-date')?.value?.trim();
      const hasShared = !!(rname && date);
      const hasVins = kcRows && kcRows.some(r => r.vin?.trim());
      const ready = hasShared && hasVins;
      const steps = [{done:hasShared},{done:hasVins},{done:ready}];
      steps.forEach((s,i)=>{
        const st=document.getElementById('kc-st'+(i+1)), sn=document.getElementById('kc-sn'+(i+1));
        if(!st||!sn) return;
        st.className='step '+(s.done?'done':i===0?'active':'');
        sn.innerHTML=s.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':(i+1);
      });
    }
    function _kcEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    document.addEventListener('DOMContentLoaded', () => {
      const srch = document.getElementById('kc-histSearch');
      if (srch) srch.addEventListener('input', () => kcRenderHistory(srch.value));
    });
    // ── End Saved Entries History ──
    let kcRows = [];

    const hyundaiModels = [
      'Hyundai Creta Electric','Hyundai Alcazar','Hyundai Creta','Hyundai Exter',
      'Hyundai Verna','Hyundai Ioniq 5','Hyundai Tucson','Hyundai i20 N Line',
      'Hyundai i20','Hyundai Venue N Line','Hyundai Venue','Hyundai Aura',
      'Hyundai Grand i10 NIOS','Hyundai Grand i10','Hyundai i10','Hyundai Xcent',
      'Hyundai Elite i20','Hyundai Active i20','Hyundai Santro','Hyundai Santro Xing',
      'Hyundai Eon','Hyundai Accent','Hyundai Elantra','Hyundai Sonata','Hyundai Santa Fe'
    ];

    function kcRowHTML(i, row = {}) {
      const modelVal = row.model || '';
      const modelLabel = modelVal || 'Select Model…';
      const modelEmpty = !modelVal;
      const opts = hyundaiModels.map(m=>`<div class="cs-opt" data-val="${m}" tabindex="0">${m}</div>`).join('');
      return `<div class="vrow" id="kcrow-${i}">
    <div class="vrow-num">VEHICLE ${i + 1}</div>
    <button class="vrow-rm" onclick="kcRemoveRow(${i})" title="Remove">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="fg c3">
      <div class="field s2"><label>Model</label>
        <div class="cs-wrap">
          <button type="button" class="cs-trigger kr-model-btn" tabindex="0">
            <span class="cs-val${modelEmpty?' empty':''}">${_kcEsc(modelLabel)}</span>
            <span class="cs-arr"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
          </button>
          <div class="cs-opts">${opts}</div>
          <input type="hidden" class="kr-model" value="${_kcEsc(modelVal)}">
        </div>
      </div>
      <div class="field"><label>Mileage (km)</label><input type="number" class="kr-mileage" placeholder="e.g. 76620" value="${row.mileage || ''}"></div>
      <div class="field s2"><label>VIN <span class="req">*</span></label><input type="text" class="kr-vin" placeholder="17-char VIN" style="font-family:var(--mono);font-size:12.5px;" value="${row.vin || ''}"></div>
      <div class="field"><label>RO No.</label><input type="text" class="kr-ro" placeholder="e.g. R202400947" value="${row.ro || ''}"></div>
      <div class="field s3"><label>Key Pin Code / Key Number</label><input type="text" class="kr-keycode" placeholder="Enter key pin code or key number" style="font-family:var(--mono);letter-spacing:.5px;" value="${row.keycode || ''}"></div>
    </div>
  </div>`;
    }

    function kcRenderRows() {
      const c = document.getElementById('kc-rows');
      if (!c) return;
      c.innerHTML = kcRows.map((r, i) => kcRowHTML(i, r)).join('');
      c.querySelectorAll('input:not([type=hidden])').forEach(el => el.addEventListener('input', () => { kcReadRows(); kcScheduleSave(); }));
      // Init custom model selects
      c.querySelectorAll('.cs-wrap').forEach(wrap => {
        const btn = wrap.querySelector('.cs-trigger');
        const opts = wrap.querySelector('.cs-opts');
        const val = wrap.querySelector('.kr-model');
        const lbl = wrap.querySelector('.cs-val');
        const toggle = e => {
          e.stopPropagation();
          const isOpen = opts.classList.contains('open');
          document.querySelectorAll('.cs-opts.open').forEach(o=>o.classList.remove('open'));
          document.querySelectorAll('.cs-trigger.open').forEach(o=>o.classList.remove('open'));
          if (!isOpen) { opts.classList.add('open'); btn.classList.add('open'); }
        };
        btn.addEventListener('click', toggle);
        btn.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle(e);} });
        opts.querySelectorAll('.cs-opt').forEach(opt => {
          const pick = e => {
            e.stopPropagation();
            const v = opt.getAttribute('data-val');
            lbl.textContent = v; lbl.classList.remove('empty');
            val.value = v;
            opts.classList.remove('open'); btn.classList.remove('open');
            kcReadRows(); kcScheduleSave();
          };
          opt.addEventListener('click', pick);
          opt.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();pick(e);} });
        });
      });
    }

    function kcReadRows() {
      const rows = document.querySelectorAll('#kc-rows .vrow');
      kcRows = Array.from(rows).map(row => ({
        model: row.querySelector('.kr-model')?.value.trim() || '',
        vin: row.querySelector('.kr-vin')?.value.trim() || '',
        mileage: row.querySelector('.kr-mileage')?.value.trim() || '',
        ro: row.querySelector('.kr-ro')?.value.trim() || '',
        keycode: row.querySelector('.kr-keycode')?.value.trim() || ''
      }));
    }

    function kcAddRow() {
      kcReadRows();
      kcRows.push({ model: '', vin: '', mileage: '', ro: '', keycode: '' });
      kcRenderRows();
      kcScheduleSave();
      const rows = document.querySelectorAll('#kc-rows .vrow');
      rows[rows.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function kcRemoveRow(i) {
      kcReadRows();
      if (kcRows.length <= 1) { toast('At least one vehicle required', 'info'); return; }
      if (!(await kcConfirm('Remove this vehicle?', 'Remove'))) return;
      kcRows.splice(i, 1);
      kcRenderRows();
      kcScheduleSave();
    }

    let kcSaveTimer;
    function kcScheduleSave() {
      clearTimeout(kcSaveTimer);
      kcSaveTimer = setTimeout(()=>{ kcSaveData(); kcUpdateSteps(); }, 600);
      kcUpdateSteps();
    }

    function kcSaveData() {
      kcReadRows();
      const shared = {};
      KC_SHARED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) shared[id] = el.value;
      });
      try {
        localStorage.setItem(KC_SAVE_KEY, JSON.stringify({ shared, rows: kcRows }));
      } catch (e) {}
      const el = document.getElementById('kc-save-status');
      if (el) el.textContent = 'Saved ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function kcRestoreData() {
      try {
        const raw = localStorage.getItem(KC_SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (data.shared) KC_SHARED_IDS.forEach(id => {
          const el = document.getElementById(id);
          if (el && data.shared[id] !== undefined) {
            el.value = data.shared[id];
            // Sync calendar display if it's the date field
            if (id === 'kc-date' && data.shared[id]) {
              const parts = data.shared[id].split('-');
              if (parts.length === 3) {
                const d = new Date(+parts[2], +parts[1]-1, +parts[0]);
                if (!isNaN(d)) {
                  if (!_KC_CAL['kc-date']) _KC_CAL['kc-date'] = {date:null,view:'days',year:d.getFullYear(),month:d.getMonth()};
                  _KC_CAL['kc-date'].date = d; _KC_CAL['kc-date'].year = d.getFullYear(); _KC_CAL['kc-date'].month = d.getMonth();
                  const di = document.getElementById('di_kc-date');
                  const dv = document.getElementById('dv_kc-date');
                  if (di) di.value = data.shared[id];
                  if (dv) { dv.textContent = data.shared[id]; dv.classList.remove('empty'); }
                }
              }
            }
          }
        });
        if (data.rows && data.rows.length) kcRows = data.rows;
        return true;
      } catch (e) {
        return false;
      }
    }

    async function clearKcSaved() {
      if (!(await kcConfirm('Clear all form data?', 'Yes, Clear'))) return;
      try { localStorage.removeItem(KC_SAVE_KEY); } catch (e) {}
      // Reset shared fields to defaults
      const defaults = {'kc-dcode':'N3235','kc-dname':'KHANNA AUTOMART PVT. LTD.','kc-rname':'NARENDRA KUMAR','kc-rcontact':'8979040022','kc-tpsm':''};
      KC_SHARED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = defaults[id] || '';
      });
      // Reset date
      const t = new Date();
      _KC_CAL['kc-date'] = {date:t,view:'days',year:t.getFullYear(),month:t.getMonth()};
      const val = _kcFmt(t);
      const di = document.getElementById('di_kc-date');
      const hidDate = document.getElementById('kc-date');
      if (di) di.value = val;
      if (hidDate) hidDate.value = val;
      // Reset rows
      kcRows = [{ model: '', vin: '', mileage: '', ro: '', keycode: '' }];
      kcRenderRows();
      kcUpdateSteps();
      const el = document.getElementById('kc-save-status');
      if (el) { el.textContent = 'Cleared'; setTimeout(() => { el.textContent = ''; }, 2000); }
      toast('Form cleared', 'info');
    }

    // ── Custom Calendar Logic ──
    const _KC_CAL = {};
    const _KC_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const _kcPad = n => String(n).padStart(2,'0');
    const _kcFmt = d => _kcPad(d.getDate())+'-'+_kcPad(d.getMonth()+1)+'-'+d.getFullYear();
    const _kcIcons = {
      left: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
      right: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`
    };
    // Keyboard helper: fire action on Enter or Space (just like a click)
    function _kcHandleKey(el, action) {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); action(e); }
      });
    }

    function _kcCloseAllCals() {
      document.querySelectorAll('.cal-pop.open').forEach(p => p.classList.remove('open'));
      document.querySelectorAll('.date-trigger.active').forEach(t => t.classList.remove('active'));
    }
    function _kcRenderCal(id) {
      const st = _KC_CAL[id], pop = document.getElementById('cp_'+id);
      if (!pop || !st) return;
      const y = st.year, m = st.month, now = new Date();
      if (st.view === 'years') {
        const sy = y - 7;
        let h = `<div class="cal-nav"><button type="button" data-cid="${id}" data-dir="-15">${_kcIcons.left}</button><span class="mnth">Select Year</span><button type="button" data-cid="${id}" data-dir="15">${_kcIcons.right}</button></div><div class="cal-grid years">`;
        for (let i = 0; i < 15; i++) h += `<div class="cd${sy+i===y?' sel':''}" data-cid="${id}" data-y="${sy+i}" tabindex="0">${sy+i}</div>`;
        h += '</div>'; pop.innerHTML = h;
        pop.querySelectorAll('button[data-cid]').forEach(b => {
          const act = e => { e.stopPropagation(); _KC_CAL[b.dataset.cid].year += parseInt(b.dataset.dir); _kcRenderCal(b.dataset.cid); };
          b.addEventListener('click', act);
          _kcHandleKey(b, act);
        });
        pop.querySelectorAll('.cd[data-y]').forEach(el => {
          const act = e => { e.stopPropagation(); _KC_CAL[el.dataset.cid].year = parseInt(el.dataset.y); _KC_CAL[el.dataset.cid].view = 'days'; _kcRenderCal(el.dataset.cid); };
          el.addEventListener('click', act);
          _kcHandleKey(el, act);
        });
      } else {
        const fd = new Date(y, m, 1).getDay(), dim = new Date(y, m+1, 0).getDate(), prev = new Date(y, m, 0).getDate();
        let h = `<div class="cal-nav"><button type="button" data-cid="${id}" data-dir="-1">${_kcIcons.left}</button><span class="mnth ts" data-cid="${id}" tabindex="0">${_KC_MONTHS[m]} ${y}</span><button type="button" data-cid="${id}" data-dir="1">${_kcIcons.right}</button></div><div class="cal-grid">${['S','M','T','W','T','F','S'].map(x=>`<div class="dn">${x}</div>`).join('')}`;
        for (let i = 0; i < fd; i++) h += `<div class="cd om">${prev-fd+1+i}</div>`;
        for (let d = 1; d <= dim; d++) {
          const iT = d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
          const iS = st.date&&d===st.date.getDate()&&m===st.date.getMonth()&&y===st.date.getFullYear();
          h += `<div class="cd${iT?' today':''}${iS?' sel':''}" data-cid="${id}" data-d="${d}" tabindex="0">${d}</div>`;
        }
        h += '</div>'; pop.innerHTML = h;
        pop.querySelectorAll('button[data-cid]').forEach(b => {
          const act = e => { e.stopPropagation(); const s=_KC_CAL[b.dataset.cid],dir=parseInt(b.dataset.dir); s.month+=dir; if(s.month<0){s.month=11;s.year--;}if(s.month>11){s.month=0;s.year++;} _kcRenderCal(b.dataset.cid); };
          b.addEventListener('click', act);
          _kcHandleKey(b, act);
        });
        const ts = pop.querySelector('.ts');
        if(ts) {
          const tsAct = e => { e.stopPropagation(); _KC_CAL[ts.dataset.cid].view='years'; _kcRenderCal(ts.dataset.cid); };
          ts.addEventListener('click', tsAct);
          _kcHandleKey(ts, tsAct);
        }
        pop.querySelectorAll('.cd:not(.om)').forEach(el => {
          const act = e => {
            e.stopPropagation();
            const s = _KC_CAL[el.dataset.cid]; s.date = new Date(s.year, s.month, parseInt(el.dataset.d));
            const di = document.getElementById('di_'+el.dataset.cid);
            const dv = document.getElementById('dv_'+el.dataset.cid);
            const hid = document.getElementById(el.dataset.cid);
            const val = _kcFmt(s.date);
            if (di) di.value = val;
            if (dv) { dv.textContent = val; dv.classList.remove('empty'); }
            if (hid) { hid.value = val; hid.dispatchEvent(new Event('change')); }
            _kcCloseAllCals(); _kcRenderCal(el.dataset.cid);
          };
          el.addEventListener('click', act);
          _kcHandleKey(el, act);
        });
        let wt; pop.addEventListener('wheel', e => { e.preventDefault(); if(wt) return; wt=setTimeout(()=>{wt=null;},150); const s=_KC_CAL[id]; s.month+=e.deltaY>0?1:-1; if(s.month>11){s.month=0;s.year++;}else if(s.month<0){s.month=11;s.year--;} _kcRenderCal(id); }, {passive:false});
      }
    }
    function _kcOpenCal(id) {
      _kcCloseAllCals();
      if (!_KC_CAL[id]) _KC_CAL[id] = {date:null,view:'days',year:new Date().getFullYear(),month:new Date().getMonth()};
      const ref = _KC_CAL[id].date || new Date();
      _KC_CAL[id].year = ref.getFullYear(); _KC_CAL[id].month = ref.getMonth(); _KC_CAL[id].view = 'days';
      _kcRenderCal(id);
      const pop = document.getElementById('cp_'+id);
      const dt = document.getElementById('dt_'+id);
      if (pop && dt) {
        const rect = dt.getBoundingClientRect();
        pop.style.top = (rect.bottom + 6) + 'px';
        pop.style.left = rect.left + 'px';
      }
      pop?.classList.add('open');
      dt?.classList.add('active');
    }
    function _kcInitCal(id) {
      _KC_CAL[id] = {date:null,view:'days',year:new Date().getFullYear(),month:new Date().getMonth()};
      const dt = document.getElementById('dt_'+id);
      if (dt) {
        const dtAct = e => { e.stopPropagation(); document.getElementById('cp_'+id)?.classList.contains('open') ? _kcCloseAllCals() : _kcOpenCal(id); };
        dt.addEventListener('click', dtAct);
        _kcHandleKey(dt, dtAct);
      }
    }
    document.addEventListener('click', _kcCloseAllCals);
    document.addEventListener('click', () => {
      _kcCloseAllCals();
      document.querySelectorAll('.cs-opts.open').forEach(o=>o.classList.remove('open'));
      document.querySelectorAll('.cs-trigger.open').forEach(o=>o.classList.remove('open'));
    });
    window.addEventListener('scroll', _kcCloseAllCals, true);
    window.addEventListener('resize', _kcCloseAllCals);
    // ── End Calendar Logic ──

    function kcSetDefaultDate() {
      const hid = document.getElementById('kc-date');
      const t = new Date();
      if (!_KC_CAL['kc-date']) _KC_CAL['kc-date'] = {date:null,view:'days',year:t.getFullYear(),month:t.getMonth()};
      if (!_KC_CAL['kc-date'].date) {
        _KC_CAL['kc-date'].date = t; _KC_CAL['kc-date'].year = t.getFullYear(); _KC_CAL['kc-date'].month = t.getMonth();
        const val = _kcFmt(t);
        const di = document.getElementById('di_kc-date');
        if (di) di.value = val;
        if (hid) hid.value = val;
      }
      // Wire manual date input
      const dt = document.getElementById('dt_kc-date');
      const di = document.getElementById('di_kc-date');
      const ico = document.getElementById('dico_kc-date');
      if (di) {
        di.addEventListener('input', () => {
          const v = di.value.trim();
          if (/^\d{2}-\d{2}-\d{4}$/.test(v)) {
            const p = v.split('-'); const d = new Date(+p[2],+p[1]-1,+p[0]);
            if (!isNaN(d)) {
              if (!_KC_CAL['kc-date']) _KC_CAL['kc-date'] = {};
              Object.assign(_KC_CAL['kc-date'],{date:d,year:d.getFullYear(),month:d.getMonth(),view:'days'});
              const hid = document.getElementById('kc-date');
              if (hid) { hid.value = v; hid.dispatchEvent(new Event('change')); }
            }
          }
          kcScheduleSave();
        });
        di.addEventListener('focus', () => { if(dt){ dt.style.borderColor='var(--accent)'; dt.style.boxShadow='0 0 0 3px var(--accent-s)'; } });
        di.addEventListener('blur', () => { if(dt){ dt.style.borderColor=''; dt.style.boxShadow=''; } });
      }
      if (ico) {
        ico.addEventListener('click', e => {
          e.stopPropagation();
          const isOpen = document.getElementById('cp_kc-date')?.classList.contains('open');
          if (isOpen) _kcCloseAllCals(); else _kcOpenCal('kc-date');
        });
      }
      if (dt) {
        dt.addEventListener('click', e => {
          if (ico && !ico.contains(e.target) && e.target !== ico) di?.focus();
        });
      }
    }

    function initKcForm() {
      if (!kcRows.length) kcRows = [{ model: '', vin: '', mileage: '', ro: '', keycode: '' }];
      _kcInitCal('kc-date');
      kcSetDefaultDate();
      const restored = kcRestoreData();
      if (!restored) kcSetDefaultDate();
      kcRenderRows();
      const el = document.getElementById('kc-save-status');
      if (restored && el) el.textContent = 'Draft restored';
      KC_SHARED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', kcScheduleSave);
        el.addEventListener('change', kcScheduleSave);
      });
    }

    async function exportKeyCode() {
      kcReadRows();
      const validRows = kcRows.filter(r => r.vin.trim());
      const rnameEl = document.getElementById('kc-rname');
      const rname = rnameEl?.value.trim();
      let hasErr = false;
      if (!validRows.length) {
        toast('At least one VIN is required', 'err');
        hasErr = true;
      }
      if (!rname) {
        if(rnameEl){ rnameEl.style.borderColor='#ef4444'; rnameEl.style.boxShadow='0 0 0 3px rgba(239,68,68,.15)'; }
        toast('Requester Name is required', 'err');
        hasErr = true;
      } else {
        if(rnameEl){ rnameEl.style.borderColor=''; rnameEl.style.boxShadow=''; }
      }
      if (hasErr) {
        const vMsg = document.getElementById('kc-valMsg');
        const vTxt = document.getElementById('kc-valText');
        if (vTxt) vTxt.textContent = !validRows.length && !rname ? 'Please fill: VIN and Requester Name' : !validRows.length ? 'Please fill: At least one VIN' : 'Please fill: Requester Name';
        if (vMsg) { vMsg.style.display='flex'; vMsg.scrollIntoView({behavior:'smooth',block:'nearest'}); }
        return;
      }
      document.getElementById('kc-valMsg')?.style && (document.getElementById('kc-valMsg').style.display='none');

      const btn = document.getElementById('kc-exportBtn');
      btn.disabled = true;
      showLoader(true);

      try {
        if (typeof ExcelJS === 'undefined') {
          await new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
            s.onload = res;
            s.onerror = rej;
            document.head.appendChild(s);
          });
        }

        const g = id => document.getElementById(id)?.value.trim() || '';
        const date = g('kc-date'), dcode = g('kc-dcode'), dname = g('kc-dname');
        const rcontact = g('kc-rcontact'), tpsm = g('kc-tpsm');

        const HEADERS = ["S. No.", "Date", "Dealer Code", "Dealer Name", "Model", "VIN", "Mileage", "Ro No.", "Requester Name", "Requester Contact No.", "TPSM Name", "Key Pin Code or Key Number"];
        const WIDTHS = [6, 12, 13, 28, 22, 21, 10, 14, 17, 22, 14, 26];

        const wb = new ExcelJS.Workbook();
        const sheetName = (dcode || 'KeyCode').substring(0, 31);
        const ws = wb.addWorksheet(sheetName);

        ws.columns = WIDTHS.map((w, i) => ({ header: '', key: 'c' + i, width: w }));

        const hdrRow = ws.addRow(HEADERS);
        hdrRow.height = 30;
        hdrRow.eachCell(cell => {
          cell.font = { bold: true, size: 11, color: { argb: 'FFFFFFFF' } };
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF00A550' } };
          cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
          cell.border = {
            top: { style: 'thin', color: { argb: 'FF888888' } },
            bottom: { style: 'thin', color: { argb: 'FF888888' } },
            left: { style: 'thin', color: { argb: 'FF888888' } },
            right: { style: 'thin', color: { argb: 'FF888888' } }
          };
        });

        validRows.forEach((row, ri) => {
          const vals = [
            ri + 1, date, dcode, dname,
            row.model, row.vin,
            row.mileage ? parseInt(row.mileage) : '',
            row.ro, rname, rcontact, tpsm, row.keycode
          ];
          const dataRow = ws.addRow(vals);
          dataRow.height = 20;
          dataRow.eachCell({ includeEmpty: true }, cell => {
            cell.font = { size: 11 };
            cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
            cell.border = {
              top: { style: 'thin', color: { argb: 'FFCCCCCC' } },
              bottom: { style: 'thin', color: { argb: 'FFCCCCCC' } },
              left: { style: 'thin', color: { argb: 'FFCCCCCC' } },
              right: { style: 'thin', color: { argb: 'FFCCCCCC' } }
            };
          });
        });

        const buf = await wb.xlsx.writeBuffer();
        const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const vinList = validRows.map(r => r.vin).join(',');
        a.download = `${vinList}_${dcode || 'DEALER'}.xlsx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast(`Excel downloaded — ${validRows.length} vehicle(s)`, 'ok');
        kcSaveHistory();
      } catch (err) {
        toast('Export error: ' + err.message, 'err');
        console.error(err);
      } finally {
        showLoader(false);
        btn.disabled = false;
      }
    }

    let tt;
    function toast(msg, type) {
      const icons = {
        ok: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
        err: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        info: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      };
      const el = document.getElementById("toast");
      el.className = "show " + (type || "info");
      el.innerHTML = (icons[type] || icons.info) + msg;
      clearTimeout(tt);
      tt = setTimeout(() => { el.className = ""; }, 3500);
    }

    function showLoader(s) {
      document.getElementById("loader").className = s ? "show" : "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      initKcForm();
      // ── Page Jumpers (AGM pattern) ──
      (function(){
        const jumperHTML=`<div class="page-jumper" id="pageJumper">
          <button class="pj-btn hidden" id="pjTop" title="Go to top" tabindex="0" aria-label="Scroll to top">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button class="pj-btn hidden" id="pjBottom" title="Go to bottom" tabindex="0" aria-label="Scroll to bottom">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>`;
        document.body.insertAdjacentHTML('beforeend',jumperHTML);
        const topBtn=document.getElementById('pjTop');
        const botBtn=document.getElementById('pjBottom');
        let hideTimer=null;
        function showJumpers(){
          const scrollTop=window.scrollY||document.documentElement.scrollTop;
          const scrollHeight=document.documentElement.scrollHeight;
          const clientHeight=window.innerHeight;
          const isScrollable=scrollHeight>clientHeight+50;
          const nearTop=scrollTop<120;
          const nearBottom=scrollTop+clientHeight>scrollHeight-120;
          topBtn.classList.toggle('hidden',nearTop||!isScrollable);
          botBtn.classList.toggle('hidden',nearBottom||!isScrollable);
        }
        function scheduleHide(){
          clearTimeout(hideTimer);
          hideTimer=setTimeout(()=>{topBtn.classList.add('hidden');botBtn.classList.add('hidden');},2000);
        }
        function onScroll(){showJumpers();scheduleHide();}
        window.addEventListener('scroll',onScroll,{passive:true});
        window.addEventListener('resize',()=>{showJumpers();},{passive:true});
        setTimeout(showJumpers,300);
        topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
        botBtn.addEventListener('click',()=>window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}));
        [topBtn,botBtn].forEach(b=>b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();b.click();}}));
      })();
    });
  </script>
</body>
