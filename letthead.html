<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tyre/Battery Letter Head</title>

<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.49.0/build/docxtemplater.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

/* CSS Variables for Auto Light/Dark Mode Adaptation */
:root {
  --bg-page: #f4f5f7;
  --bg-card: #ffffff;
  --bg-input: #ffffff;
  --bg-hover: #f9fafb;
  --bg-active: #f3f4f6;
  
  --text-main: #111827;
  --text-label: #374151;
  --text-muted: #6b7280;
  --text-placeholder: #9ca3af;
  
  --border-light: #f3f4f6;
  --border-input: #d1d5db;
  --border-focus: #1a1a1a;
  
  --accent-bg: #1a1a1a;
  --accent-text: #ffffff;
  --focus-ring: rgba(26, 26, 26, 0.1);
  --danger-color: #ef4444;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-page: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #0f172a;
    --bg-hover: #334155;
    --bg-active: #475569;
    
    --text-main: #f8fafc;
    --text-label: #cbd5e1;
    --text-muted: #94a3b8;
    --text-placeholder: #64748b;
    
    --border-light: #334155;
    --border-input: #475569;
    --border-focus: #60a5fa;
    
    --accent-bg: #e2e8f0;
    --accent-text: #0f172a;
    --focus-ring: rgba(96, 165, 250, 0.2);
    --danger-color: #f87171;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg-page); 
  color: var(--text-main); 
  min-height: 100vh; 
  display: flex; 
  align-items: flex-start; 
  justify-content: center; 
  padding: 40px 20px 80px; 
  transition: background 0.3s, color 0.3s;
}

.card { 
  background: var(--bg-card); 
  border-radius: 12px; 
  width: 100%; 
  max-width: 800px; 
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
  overflow: hidden;
  border: 1px solid var(--border-light);
  transition: background 0.3s, border-color 0.3s;
}

.card-header { 
  padding: 24px 32px 20px; 
  border-bottom: 1px solid var(--border-light); 
}
.card-header h1 { font-size: 20px; font-weight: 600; color: var(--text-main); letter-spacing: -0.01em; }
.card-header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

/* Tabs (Mode Picker) */
.mode-wrap { margin: 20px 32px 0; display: none; }
.mode-wrap.show { display: block; }
.mode-lbl { font-size: 9.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
.mode-btns { display: flex; gap: 6px; }
.mode-btn { 
  flex: 1; height: 35px; border-radius: 7px; border: 1.5px solid var(--border-input); 
  background: var(--bg-hover); font-size: 13px; font-weight: 500; color: var(--text-muted); 
  cursor: pointer; transition: all .18s; outline: none;
}
.mode-btn:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.mode-btn:hover { border-color: var(--text-muted); color: var(--text-main); }
.mode-btn.active { background: var(--accent-bg); border-color: var(--accent-bg); color: var(--accent-text); }

/* History Section */
.history-wrap { padding: 24px 32px 32px; display: none; }
.history-wrap.show { display: block; }
.hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.hist-title { font-size: 14px; font-weight: 600; color: var(--text-main); }
.hist-clr { font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; transition: color 0.2s; padding: 0; outline: none; }
.hist-clr:hover, .hist-clr:focus { color: var(--danger-color); }

.search-input { 
  width: 100%; height: 42px; border: 1px solid var(--border-input); border-radius: 8px; 
  padding: 0 14px; font-size: 14px; margin-bottom: 16px; outline: none; transition: all 0.2s;
  background: var(--bg-hover); color: var(--text-main);
}
.search-input:focus { border-color: var(--border-focus); background: var(--bg-input); box-shadow: 0 0 0 3px var(--focus-ring); }
.search-input::placeholder { color: var(--text-placeholder); }

.hist-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
.hist-item { 
  display: flex; align-items: center; gap: 12px; padding: 14px 16px; 
  border: 1px solid var(--border-light); border-radius: 8px; cursor: pointer; 
  background: var(--bg-input); transition: all 0.2s; outline: none;
}
.hist-item:hover, .hist-item:focus { border-color: var(--border-input); background: var(--bg-hover); }
.hi-info { flex: 1; min-width: 0; }
.hi-name { font-size: 14px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hi-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 8px; }
.hi-mode { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
.hi-mode.tyre { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
.hi-mode.battery { background: rgba(245, 158, 11, 0.15); color: #d97706; }
.hi-del { background: none; border: none; color: var(--border-input); cursor: pointer; transition: color 0.2s; display: flex; align-items: center; outline: none;}
.hi-del:hover, .hi-del:focus { color: var(--danger-color); }

/* Forms - CSS Grid Setup */
.form-section { padding: 24px 32px 0; }
.sec-lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; border-bottom: 1px solid var(--border-light); padding-bottom: 8px; letter-spacing: 0.05em; }
.grid-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }

.field-col { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.field-col label { font-size: 13px; font-weight: 500; color: var(--text-label); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.field-col input { 
  height: 42px; border: 1px solid var(--border-input); border-radius: 8px; 
  padding: 0 14px; font-size: 14px; color: var(--text-main); background: var(--bg-input); 
  transition: all 0.2s; width: 100%; outline: none; font-family: 'Inter', sans-serif;
}
.field-col input::placeholder { color: var(--text-placeholder); }
.field-col input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.field-col input.pre { color: var(--text-muted); }

/* Custom Animated Select / Dropdown */
.custom-select-wrap { position: relative; user-select: none; width: 100%; }
.custom-select-trigger { 
  height: 42px; border: 1px solid var(--border-input); border-radius: 8px; 
  padding: 0 14px; background: var(--bg-input); display: flex; align-items: center; 
  justify-content: space-between; cursor: pointer; transition: all 0.2s ease; width: 100%; outline: none;
}
.custom-select-trigger:hover { border-color: var(--text-placeholder); }
.custom-select-trigger:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.custom-select-trigger.active { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.cs-val { font-size: 14px; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
.cs-val.empty { color: var(--text-placeholder); }
.cs-arr { color: var(--text-placeholder); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center;}
.custom-select-trigger.active .cs-arr { transform: rotate(180deg); color: var(--text-main); }

.custom-select-opts { 
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 500; 
  background: var(--bg-card); border: 1px solid var(--border-input); border-radius: 8px; 
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); max-height: 220px; overflow-y: auto; 
  opacity: 0; transform: translateY(-10px) scaleY(0.95); transform-origin: top; 
  pointer-events: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.custom-select-opts.open { opacity: 1; transform: translateY(0) scaleY(1); pointer-events: all; }
.cs-opt { padding: 12px 14px; font-size: 13px; color: var(--text-main); cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border-light); outline: none;}
.cs-opt:last-child { border-bottom: none; }
.cs-opt:hover, .cs-opt:focus { background: var(--bg-hover); font-weight: 500; }

/* Date picker */
.date-trigger { 
  height: 42px; display: flex; align-items: center; padding: 0 14px; 
  cursor: pointer; user-select: none; gap: 8px; border: 1px solid var(--border-input); 
  border-radius: 8px; background: var(--bg-input); transition: all 0.2s ease; position: relative; width: 100%; outline: none;
}
.date-trigger:hover { border-color: var(--text-placeholder); }
.date-trigger:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.date-trigger.active { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.date-icon { color: var(--text-placeholder); display: flex; align-items: center; }
.dval { font-size: 14px; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dval.empty { color: var(--text-placeholder); }

/* Calendar Popup */
.cal-pop { 
  position: absolute; top: calc(100% + 8px); left: 0; z-index: 400; 
  background: var(--bg-card); border: 1px solid var(--border-input); border-radius: 12px; 
  padding: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); 
  width: 260px; opacity: 0; transform: translateY(-8px); pointer-events: none; 
  transition: all 0.2s ease; 
}
.cal-pop.open { opacity: 1; transform: translateY(0); pointer-events: all; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mnth { font-size: 14px; font-weight: 600; color: var(--text-main); cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s; outline: none; }
.mnth:hover, .mnth:focus { background: var(--bg-hover); }
.cal-nav button { background: none; border: 1px solid var(--border-input); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.2s; outline: none;}
.cal-nav button:hover, .cal-nav button:focus { background: var(--bg-hover); color: var(--text-main);}

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-grid.years { grid-template-columns: repeat(3, 1fr); gap: 8px; }
.dn { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); text-align: center; padding-bottom: 8px; }
.cd { font-size: 13px; text-align: center; padding: 8px 2px; border-radius: 6px; cursor: pointer; color: var(--text-label); transition: all 0.15s; outline: none;}
.cal-grid.years .cd { padding: 12px 4px; font-weight: 500; }
.cd:hover, .cd:focus { background: var(--bg-hover); color: var(--text-main); }
.cd.sel { background: var(--accent-bg) !important; color: var(--accent-text) !important; font-weight: 500; }
.cd.today { font-weight: 700; color: var(--text-main); text-decoration: underline;}
.cd.om { color: var(--border-input); pointer-events: none; }

/* Status & Actions */
.status { margin: 24px 32px 0; font-size: 14px; padding: 12px 16px; border-radius: 8px; display: none; font-weight: 500; }
.status.error { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.2); display: block; }
.status.success { background: rgba(34, 197, 94, 0.1); color: #15803d; border: 1px solid rgba(34, 197, 94, 0.2); display: block; }

.actions { display: flex; gap: 12px; padding: 24px 32px 32px; border-top: 1px solid var(--border-light); margin-top: 24px; }
.btn { flex: 1; height: 48px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; outline: none;}
.btn:focus { box-shadow: 0 0 0 3px var(--focus-ring); }
.btn-inject { background: var(--accent-bg); color: var(--accent-text); }
.btn-inject:hover { opacity: 0.9; }
.btn-inject:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-clear { background: var(--bg-active); color: var(--text-label); }
.btn-clear:hover { background: var(--border-input); color: var(--text-main); }
.no-file-msg { text-align: center; font-size: 14px; color: var(--text-muted); padding: 40px; font-weight: 500; }

/* Custom Modal Animation */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px; padding: 24px; width: 90%; max-width: 360px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(0.95) translateY(10px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
.modal-msg { font-size: 15px; color: var(--text-main); font-weight: 500; margin-bottom: 24px; line-height: 1.5; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.modal-btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; font-family: 'Inter', sans-serif; outline: none; }
.modal-btn-cancel { background: var(--bg-active); color: var(--text-label); }
.modal-btn-cancel:hover, .modal-btn-cancel:focus { background: var(--border-input); color: var(--text-main); }
.modal-btn-ok { background: var(--danger-color); color: #fff; }
.modal-btn-ok:hover, .modal-btn-ok:focus { opacity: 0.9; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }

/* 📱 MOBILE RESPONSIVENESS */
@media (max-width: 640px) {
  body { padding: 16px 10px; }
  .grid-wrap { grid-template-columns: 1fr; gap: 14px; }
  .card-header, .mode-wrap, .form-section, .actions, .history-wrap { padding-left: 20px; padding-right: 20px; }
  .actions { flex-direction: column-reverse; }
  .btn { min-height: 48px; width: 100%; } 
}
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn modal-btn-ok" id="modalOk">Confirm</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h1>Tyre/Battery Letter Head</h1>
    <p>Fill out the form below to automatically generate your clean DOCX report.</p>
  </div>

  <div class="mode-wrap" id="modeWrap">
    <div class="mode-lbl">Select Letter Type</div>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeTyre"    onclick="setMode('tyre')" tabindex="0">Tyre Report</button>
      <button class="mode-btn"        id="modeBattery" onclick="setMode('battery')" tabindex="0">Battery Report</button>
    </div>
    <div class="mode-lbl" style="margin-top: 18px;">Saved Data</div>
    <div class="mode-btns">
      <button class="mode-btn" id="modeHistory" onclick="setMode('history')" tabindex="0">Saved Entries</button>
    </div>
  </div>

  <div class="history-wrap" id="histWrap">
    <div class="hist-header">
      <span class="hist-title">Saved Records</span>
      <button class="hist-clr" id="btnHistoryClearAll" tabindex="0">Clear all</button>
    </div>
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <button class="btn btn-clear" style="height: 36px; min-height: 36px; font-size: 13px;" onclick="backupData()" tabindex="0">Backup Data</button>
      <button class="btn btn-clear" style="height: 36px; min-height: 36px; font-size: 13px;" onclick="document.getElementById('restoreFile').click()" tabindex="0">Restore Data</button>
      <input type="file" id="restoreFile" style="display:none" accept=".json" onchange="restoreData(event)">
    </div>
    
    <input type="text" id="historySearch" class="search-input" placeholder="Search by Reg. No or Name..." autocomplete="off" tabindex="0">
    <div class="hist-list" id="histList"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="formWrap"></div>

  <div class="actions" id="actionsBar" style="display:none">
    <button class="btn btn-clear" id="btnClear" tabindex="0">Clear Form</button>
    <button class="btn btn-inject" id="btnInject" tabindex="0">Generate DOCX</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CUSTOM CONFIRM MODAL
// ─────────────────────────────────────────────────────────────────
function customConfirm(message, okText = "Yes") {
  return new Promise((resolve) => {
    const modal = document.getElementById('customModal');
    const msgEl = document.getElementById('modalMsg');
    const btnOk = document.getElementById('modalOk');
    const btnCancel = document.getElementById('modalCancel');
    
    msgEl.textContent = message;
    btnOk.textContent = okText;
    
    const cleanup = () => {
      modal.classList.remove('show');
      btnOk.removeEventListener('click', onOk);
      btnCancel.removeEventListener('click', onCancel);
    };
    
    const onOk = () => { cleanup(); resolve(true); };
    const onCancel = () => { cleanup(); resolve(false); };
    
    btnOk.addEventListener('click', onOk);
    btnCancel.addEventListener('click', onCancel);
    
    modal.classList.add('show');
    btnCancel.focus();
  });
}

// ─────────────────────────────────────────────────────────────────
// SVG ICONS
// ─────────────────────────────────────────────────────────────────
const icons = {
  calendar: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`,
  chevronDown: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`,
  chevronLeft: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
  chevronRight: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
  close: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`
};

// ─────────────────────────────────────────────────────────────────
// LISTS & OPTIONS (New to Old)
// ─────────────────────────────────────────────────────────────────
const hyundaiModels = [
  "Hyundai Ioniq 5", "Hyundai Exter", "Hyundai Alcazar", "Hyundai Venue", 
  "Hyundai Creta", "Hyundai Tucson", "Hyundai Verna", "Hyundai Aura", 
  "Hyundai Grand i10 Nios", "Hyundai i20", "Hyundai Kona Electric", 
  "Hyundai Elantra", "Hyundai Xcent", "Hyundai Elite i20", "Hyundai i20 Active", 
  "Hyundai Grand i10", "Hyundai i10", "Hyundai Eon", "Hyundai Sonata", 
  "Hyundai Santa Fe", "Hyundai Terracan", "Hyundai Accent", "Hyundai Getz", 
  "Hyundai Santro Xing", "Hyundai Santro"
];

const tyreMakes = ["Bridgestone", "Apollo", "Goodyear", "Ceat", "JK Tyre", "MRF", "Kumho"];
const battMakes = ["Exide", "Amaron"];
const tyrePositions = ["Front Left", "Front Right", "Rear Left", "Rear Right", "Spare Tyre"];

// ─────────────────────────────────────────────────────────────────
// FIELDS
// ─────────────────────────────────────────────────────────────────
const TYRE_FIELDS = [
  { section:"Letter Details", fields:[
    { id:"date",       label:"Date",                 type:"date", fmt:"dash" },
    { id:"recipient",  label:"Recipient (To)",       type:"select", options: tyreMakes },
    { id:"subject",    label:"Subject",              type:"text", def:"Tyre Buldge Problem While Driving" }
  ]},
  { section:"Dealer & Customer Details", fields:[
    { id:"dealerCode", label:"Dealer Code",          type:"text"  },
    { id:"dealerName", label:"Dealer Name",          type:"text"  },
    { id:"saleDate",   label:"Sale Date",            type:"date", fmt:"slash" },
    { id:"custName",   label:"Customer Name",        type:"text"  },
    { id:"custPhone",  label:"Contact Number",       type:"text"  }
  ]},
  { section:"Vehicle Details", fields:[
    { id:"regNo",      label:"Registration No.",     type:"text"  },
    { id:"vehMake",    label:"Vehicle Make",         type:"select", options: hyundaiModels },
    { id:"chassis",    label:"Chassis No.",          type:"text"  },
    { id:"mileage",    label:"Mileage at Complaint", type:"text"  }
  ]},
  { section:"Tyre Details", fields:[
    { id:"tyreMake",   label:"Tyre Make",            type:"select", options: tyreMakes },
    { id:"numItems",   label:"Number of Tyres",      type:"text"  },
    { id:"tyreSpec",   label:"Tyre Specification",   type:"text"  },
    { id:"tyrePos",    label:"Tyre Position",        type:"select", options: tyrePositions },
    { id:"issue",      label:"Issue Reported",       type:"text"  }
  ]},
  { section:"Service Manager", fields:[
    { id:"mgName",     label:"Manager Name",         type:"text", def:"NARENDRA KUMAR" },
    { id:"mgDealer",   label:"Dealership",           type:"text", def:"KHANNA AUTOMART PVT LTD" }
  ]}
];

  { section:"Letter Details", fields:[
    { id:"date",       label:"Date",                 type:"date", fmt:"dash" },
    { id:"recipient",  label:"Recipient (To)",       type:"select", options: battMakes },
    { id:"subject",    label:"Subject",              type:"text", def:"Vehicle starting problem issue." }
  ]},
  { section:"Dealer & Customer Details", fields:[
    { id:"dealerCode", label:"Dealer Code",          type:"text"  },
    { id:"dealerName", label:"Dealer Name",          type:"text"  },
    { id:"saleDate",   label:"Sale Date",            type:"date", fmt:"slash" },
    { id:"custName",   label:"Customer Name",        type:"text"  },
    { id:"custPhone",  label:"Contact Number",       type:"text"  }
  ]},
  { section:"Vehicle Details", fields:[
    { id:"regNo",      label:"Registration No.",     type:"text"  },
    { id:"vehMake",    label:"Vehicle Make",         type:"select", options: hyundaiModels },
    { id:"chassis",    label:"Chassis No.",          type:"text"  },
    { id:"mileage",    label:"Mileage at Complaint", type:"text"  }
  ]},
  { section:"Battery Details", fields:[
    { id:"battMake",   label:"Battery Make",         type:"select", options: battMakes },
    { id:"battSerial", label:"Battery Serial",       type:"text"  },
    { id:"battSpec",   label:"Battery Specification",type:"text"  },
    { id:"issue",      label:"Issue Reported",       type:"text"  }
  ]},
  { section:"Service Manager", fields:[
    { id:"mgName",     label:"Manager Name",         type:"text", def:"NARENDRA KUMAR" },
    { id:"mgDealer",   label:"Dealership",           type:"text", def:"KHANNA AUTOMART PVT LTD" }
  ]}
];

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let templateBuffer = null;
let currentMode  = 'tyre';
const CAL = {};
let HISTORY = [];
try{ HISTORY = JSON.parse(localStorage.getItem('inj_hist')||'[]'); }catch(e){}

// DOM elements
const formWrap   = document.getElementById('formWrap');
const actionsBar = document.getElementById('actionsBar');
const btnClear   = document.getElementById('btnClear');
const btnInject  = document.getElementById('btnInject');
const statusEl   = document.getElementById('status');
const modeWrap   = document.getElementById('modeWrap');
const histWrap   = document.getElementById('histWrap');
const histList   = document.getElementById('histList');
const historySearch = document.getElementById('historySearch');

// Helpers
const pad      = n => String(n).padStart(2,'0');
const fmtDash  = d => pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear();
const fmtSlash = d => pad(d.getDate())+' / '+pad(d.getMonth()+1)+' / '+d.getFullYear();
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const getGroups= ()=> currentMode==='tyre' ? TYRE_FIELDS : BATTERY_FIELDS;
const allFields= ()=> getGroups().flatMap(g=>g.fields);
const dateFields=()=> allFields().filter(f=>f.type==='date');

// Keyboard Interaction Helper
const handleKeyClick = (el, action) => {
  el.addEventListener('keydown', e => {
    if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); action(e); }
  });
};

// ─────────────────────────────────────────────────────────────────
// INITIALIZE & FETCH DOCUMENT ON LOAD
// ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  formWrap.innerHTML = '<div class="no-file-msg">Fetching template (head.docx)...</div>';
  try {
    const response = await fetch('head.docx');
    if (!response.ok) throw new Error('File not found');
    templateBuffer = await response.arrayBuffer();
    
    modeWrap.classList.add('show');
    setMode('tyre'); 
    clearStatus();
  } catch (err) {
    showStatus('Error: Could not load head.docx from the server.', 'error');
    formWrap.innerHTML = '<div class="no-file-msg">Template missing. Please check your repository.</div>';
  }
});

function setMode(mode){
  currentMode=mode;
  document.getElementById('modeTyre').classList.toggle('active',mode==='tyre');
  document.getElementById('modeBattery').classList.toggle('active',mode==='battery');
  document.getElementById('modeHistory').classList.toggle('active',mode==='history');
  
  if(mode === 'history') {
    formWrap.style.display = 'none';
    actionsBar.style.display = 'none';
    histWrap.classList.add('show');
    renderHistory();
  } else {
    histWrap.classList.remove('show');
    formWrap.style.display = 'block';
    if(templateBuffer) {
      actionsBar.style.display = 'flex';
      buildForm();
    }
  }
}

// ─────────────────────────────────────────────────────────────────
// BACKUP & RESTORE LOGIC
// ─────────────────────────────────────────────────────────────────
function backupData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(HISTORY));
  const a = document.createElement('a');
  a.setAttribute("href", dataStr);
  a.setAttribute("download", "letterhead_backup.json");
  document.body.appendChild(a); 
  a.click();
  a.remove();
}

function restoreData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if(Array.isArray(imported)) {
        HISTORY = imported;
        localStorage.setItem('inj_hist', JSON.stringify(HISTORY));
        renderHistory(historySearch.value);
        showStatus('Data restored successfully!', 'success');
      } else {
        showStatus('Invalid backup file format.', 'error');
      }
    } catch(err) {
      showStatus('Error reading backup file.', 'error');
    }
    event.target.value = ''; // Reset input
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────────
// CLOSE ALL POPUPS SCRIPT
// ─────────────────────────────────────────────────────────────────
function closeAllPopups() {
  dateFields().forEach(f=>{
    document.getElementById('cp_'+f.id)?.classList.remove('open');
    document.getElementById('dt_'+f.id)?.classList.remove('active');
    if(CAL[f.id]) CAL[f.id].open=false;
  });
  document.querySelectorAll('.custom-select-opts.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.custom-select-trigger.active').forEach(el => el.classList.remove('active'));
}
document.addEventListener('click', closeAllPopups);

// ─────────────────────────────────────────────────────────────────
// CALENDAR LOGIC (With SVGs & Mouse Scroll)
// ─────────────────────────────────────────────────────────────────
function renderCal(id){
  const st=CAL[id], pop=document.getElementById('cp_'+id);
  if(!pop||!st) return;
  const y=st.year,m=st.month,now=new Date();

  if(st.view === 'years') {
    const startYear = y - 7;
    let h=`<div class="cal-nav">
      <button type="button" class="cpb-y" data-id="${id}" data-dir="-15" tabindex="0">${icons.chevronLeft}</button>
      <span class="mnth ys" tabindex="0">Select Year</span>
      <button type="button" class="cpb-y" data-id="${id}" data-dir="15" tabindex="0">${icons.chevronRight}</button>
    </div>
    <div class="cal-grid years">`;
    for(let i=0; i<15; i++){
      h+=`<div class="cd ${startYear+i === y ? 'sel' : ''}" data-id="${id}" data-y="${startYear+i}" tabindex="0">${startYear+i}</div>`;
    }
    h+='</div>';
    pop.innerHTML=h;
    
    pop.querySelectorAll('.cpb-y').forEach(b=>{
      const action = e => { e.stopPropagation(); CAL[b.dataset.id].year += parseInt(b.dataset.dir); renderCal(b.dataset.id); };
      b.addEventListener('click', action);
      handleKeyClick(b, action);
    });
    pop.querySelectorAll('.cd').forEach(el=>{
      const action = e => { e.stopPropagation(); CAL[el.dataset.id].year = parseInt(el.dataset.y); CAL[el.dataset.id].view = 'days'; renderCal(el.dataset.id); };
      el.addEventListener('click', action);
      handleKeyClick(el, action);
    });

  } else {
    const fd=new Date(y,m,1).getDay();
    const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
    
    let h=`<div class="cal-nav">
      <button type="button" class="cpb" data-id="${id}" data-dir="-1" tabindex="0">${icons.chevronLeft}</button>
      <span class="mnth ts" data-id="${id}" title="Click to change year" tabindex="0">${MONTHS[m]} ${y}</span>
      <button type="button" class="cpb" data-id="${id}" data-dir="1" tabindex="0">${icons.chevronRight}</button>
    </div>
    <div class="cal-grid">${['S','M','T','W','T','F','S'].map(x=>`<div class="dn">${x}</div>`).join('')}`;
    for(let i=0;i<fd;i++) h+=`<div class="cd om">${prev-fd+1+i}</div>`;
    for(let d=1;d<=dim;d++){
      const iT=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
      const iS=st.date&&d===st.date.getDate()&&m===st.date.getMonth()&&y===st.date.getFullYear();
      h+=`<div class="cd${iT?' today':''}${iS?' sel':''}" data-id="${id}" data-d="${d}" tabindex="0">${d}</div>`;
    }
    h+='</div>';
    pop.innerHTML=h;

    pop.querySelectorAll('.cpb').forEach(b=>{
      const action = e => { e.stopPropagation(); const s=CAL[b.dataset.id],dir=parseInt(b.dataset.dir); s.month+=dir; if(s.month<0){s.month=11;s.year--;} if(s.month>11){s.month=0;s.year++;} renderCal(b.dataset.id); };
      b.addEventListener('click', action);
      handleKeyClick(b, action);
    });
    
    const ts = pop.querySelector('.ts');
    const tsAction = e => { e.stopPropagation(); CAL[e.target.dataset.id].view = 'years'; renderCal(e.target.dataset.id); };
    ts.addEventListener('click', tsAction);
    handleKeyClick(ts, tsAction);

    pop.querySelectorAll('.cd:not(.om)').forEach(el=>{
      const action = e => { 
        e.stopPropagation(); const s=CAL[el.dataset.id]; s.date=new Date(s.year,s.month,parseInt(el.dataset.d)); 
        const f=allFields().find(f=>f.id===el.dataset.id); const dv=document.getElementById('dv_'+el.dataset.id);
        if(dv){ dv.textContent=f.fmt==='slash'?fmtSlash(s.date):fmtDash(s.date); dv.classList.remove('empty'); }
        closeAllPopups(); renderCal(el.dataset.id);
      };
      el.addEventListener('click', action);
      handleKeyClick(el, action);
    });
  }
}

function openCal(id){
  closeAllPopups();
  const ref=CAL[id]?.date||new Date();
  if(!CAL[id]) CAL[id]={date:null,open:false,view:'days'};
  CAL[id].year=ref.getFullYear(); CAL[id].month=ref.getMonth(); CAL[id].view='days';
  renderCal(id);
  document.getElementById('cp_'+id)?.classList.add('open');
  document.getElementById('dt_'+id)?.classList.add('active');
  CAL[id].open=true;
}

// ─────────────────────────────────────────────────────────────────
// FORM BUILDER
// ─────────────────────────────────────────────────────────────────
function buildForm(){
  formWrap.innerHTML='';
  getGroups().forEach(group=>{
    const sec=document.createElement('div'); sec.className='form-section';
    const lbl=document.createElement('div'); lbl.className='sec-lbl'; lbl.textContent=group.section;
    sec.appendChild(lbl);
    
    const grid=document.createElement('div'); grid.className='grid-wrap';
    
    group.fields.forEach(f=>{
      const col = document.createElement('div'); col.className = 'field-col';
      if (f.id === 'subject') col.style.gridColumn = '1 / -1'; 
      
      if(f.type==='date'){
        if(!CAL[f.id]) CAL[f.id]={date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth(),view:'days'};
        
        const calPop = document.createElement('div');
        calPop.className = 'cal-pop';
        calPop.id = 'cp_'+f.id;
        
        // MOUSE WHEEL SCROLL LOGIC
        let wheelTimeout;
        calPop.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (wheelTimeout) return;
            wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 150);
            
            const st = CAL[f.id];
            if (st.view === 'years') {
                st.year += e.deltaY > 0 ? 15 : -15;
            } else {
                st.month += e.deltaY > 0 ? 1 : -1;
                if(st.month > 11) { st.month = 0; st.year++; }
                else if(st.month < 0) { st.month = 11; st.year--; }
            }
            renderCal(f.id);
        }, { passive: false });

        col.innerHTML=`
          <label>${f.label}</label>
          <div style="position:relative;">
            <div class="date-trigger" id="dt_${f.id}" tabindex="0">
              <span class="dval empty" id="dv_${f.id}">Pick a date</span>
              <span class="date-icon">${icons.calendar}</span>
            </div>
          </div>`;
          
        col.querySelector('div').appendChild(calPop);
        grid.appendChild(col);
        
        requestAnimationFrame(()=>{
          const dt = document.getElementById('dt_'+f.id);
          const dtAction = e => {
            e.stopPropagation(); 
            const isOpen = document.getElementById('cp_'+f.id).classList.contains('open');
            if(isOpen) closeAllPopups(); else openCal(f.id);
          };
          dt?.addEventListener('click', dtAction);
          handleKeyClick(dt, dtAction);
        });
      } else if(f.type === 'select') {
        col.innerHTML=`
          <label>${f.label}</label>
          <div class="custom-select-wrap">
            <div class="custom-select-trigger" id="cst_${f.id}" tabindex="0">
              <span class="cs-val empty" id="csv_${f.id}">Select ${f.label}...</span>
              <span class="cs-arr">${icons.chevronDown}</span>
            </div>
            <div class="custom-select-opts" id="cso_${f.id}">
              ${f.options.map(o => `<div class="cs-opt" data-val="${o}" tabindex="0">${o}</div>`).join('')}
            </div>
            <input type="hidden" id="${f.id}" value="">
          </div>`;
        grid.appendChild(col);
        
        requestAnimationFrame(()=>{
          const trig = document.getElementById('cst_'+f.id);
          const opts = document.getElementById('cso_'+f.id);
          const valEl = document.getElementById('csv_'+f.id);
          const hidInp = document.getElementById(f.id);
          
          const trigAction = e => {
            e.stopPropagation();
            const isOpen = opts.classList.contains('open');
            closeAllPopups();
            if(!isOpen) {
              opts.classList.add('open');
              trig.classList.add('active');
            }
          };
          trig.addEventListener('click', trigAction);
          handleKeyClick(trig, trigAction);
          
          opts.querySelectorAll('.cs-opt').forEach(opt => {
            const optAction = e => {
              e.stopPropagation();
              const val = opt.getAttribute('data-val');
              valEl.textContent = val;
              valEl.classList.remove('empty');
              hidInp.value = val;
              closeAllPopups();
            };
            opt.addEventListener('click', optAction);
            handleKeyClick(opt, optAction);
          });
        });
      } else {
        const label=document.createElement('label'); label.htmlFor=f.id; label.textContent=f.label;
        const input=document.createElement('input'); input.type='text'; input.id=f.id; input.setAttribute('tabindex', '0');
        if(f.def){ input.value=f.def; input.classList.add('pre'); input.addEventListener('focus',()=>input.classList.remove('pre')); }
        else input.placeholder='Enter value\u2026';
        
        col.appendChild(label); col.appendChild(input); grid.appendChild(col);
      }
    });
    sec.appendChild(grid);
    formWrap.appendChild(sec);
  });
}

btnClear.addEventListener('click', async () => {
  if(!(await customConfirm('Are you sure you want to clear the form?'))) return;
  
  allFields().forEach(f=>{
    if(f.type==='date'){
      if(CAL[f.id]) Object.assign(CAL[f.id],{date:null,open:false,year:new Date().getFullYear(),month:new Date().getMonth(),view:'days'});
      const dv=document.getElementById('dv_'+f.id);
      if(dv){dv.textContent='Pick a date';dv.classList.add('empty');} 
    } else if (f.type==='select') {
      const valEl = document.getElementById('csv_'+f.id);
      const hidInp = document.getElementById(f.id);
      if(valEl && hidInp) {
        valEl.textContent = 'Select ' + f.label + '...';
        valEl.classList.add('empty');
        hidInp.value = '';
      }
    } else {
      const inp=document.getElementById(f.id);
      if(!inp) return;
      if(f.def){inp.value=f.def;inp.classList.add('pre');} else inp.value='';
    }
  });
  closeAllPopups();
  clearStatus();
});

// ─────────────────────────────────────────────────────────────────
// DOCXTEMPLATER LOGIC 
// ─────────────────────────────────────────────────────────────────
btnInject.addEventListener('click',async()=>{
  if(!templateBuffer){showStatus('Template not loaded yet.','error');return;}

  const data = {};
  const histEntry = {mode: currentMode};

  data.isTyre = (currentMode === 'tyre');
  data.isBattery = (currentMode === 'battery');

  allFields().forEach(f => {
    if(f.type === 'date') {
      const st = CAL[f.id];
      const val = (st && st.date) ? (f.fmt === 'slash' ? fmtSlash(st.date) : fmtDash(st.date)) : '';
      data[f.id] = val; 
      if(val) histEntry[f.id] = val;
    } else {
      const el = document.getElementById(f.id);
      const val = el?.value?.trim() || '';
      data[f.id] = val; 
      if(val && val !== '') histEntry[f.id] = val;
    }
  });

  if(Object.keys(histEntry).length <= 2){showStatus('Fill in at least one field.','error');return;}

  btnInject.disabled=true; btnInject.textContent='Processing\u2026'; clearStatus();

  try {
    const zip = new window.PizZip(templateBuffer.slice(0)); 
    
    const doc = new window.docxtemplater(zip, { 
        paragraphLoop: true, 
        linebreaks: true,
        nullGetter: function() { return ""; }
    });

    doc.render(data);

    const blob = doc.getZip().generate({
        type: "blob",
        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    });

    const regNoClean = (data.regNo || 'NoReg').replace(/[^a-zA-Z0-9]/g, '');
    const makeClean = currentMode === 'tyre' 
        ? (data.tyreMake || 'Make').replace(/[^a-zA-Z0-9]/g, '') 
        : (data.battMake || 'Make').replace(/[^a-zA-Z0-9]/g, '');
        
    const name = `${regNoClean}_${makeClean}_lethead.docx`;
    saveAs(blob, name);
    
    showStatus('\u2713 Downloaded: '+name,'success');
    saveHistory(histEntry);
  } catch(err) {
    showStatus('Error: '+err.message,'error'); console.error(err);
  } finally {
    btnInject.disabled=false; btnInject.textContent='Generate DOCX';
  }
});

// ─────────────────────────────────────────────────────────────────
// HISTORY & SEARCH LOGIC
// ─────────────────────────────────────────────────────────────────
function saveHistory(entry){
  if(entry.regNo) {
    HISTORY = HISTORY.filter(h => h.regNo !== entry.regNo);
  }
  HISTORY.unshift(entry);
  if(HISTORY.length>50) HISTORY=HISTORY.slice(0,50);
  try{localStorage.setItem('inj_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}
async function deleteHistory(idx){
  HISTORY.splice(idx,1);
  try{localStorage.setItem('inj_hist',JSON.stringify(HISTORY));}catch(e){}
  renderHistory(historySearch.value);
}

document.getElementById('btnHistoryClearAll').addEventListener('click', async () => {
  if(!(await customConfirm('Are you sure you want to clear all saved entries?', 'Yes, Clear All'))) return;
  HISTORY=[];
  try{localStorage.removeItem('inj_hist');}catch(e){}
  historySearch.value = '';
  renderHistory();
});

historySearch.addEventListener('input', () => renderHistory(historySearch.value));

function renderHistory(filterText = ''){
  if(!HISTORY.length){ 
     histList.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No saved entries yet.</div>';
     return; 
  }
  histList.innerHTML='';
  const searchLower = filterText.toLowerCase().trim();

  HISTORY.forEach((entry, originalIdx)=>{
    const primaryName = entry.regNo || entry.custName || 'Unknown Registration';
    const subMeta = entry.custName || entry.date || '';
    
    if(searchLower) {
        const searchString = `${primaryName} ${subMeta} ${entry.mode}`.toLowerCase();
        if(!searchString.includes(searchLower)) return;
    }

    const item=document.createElement('div'); item.className='hist-item'; item.setAttribute('tabindex', '0');
    item.innerHTML=`<div class="hi-info">
      <div class="hi-name">${escHtml(primaryName)}</div>
      <div class="hi-meta"><span class="hi-mode ${entry.mode}">${entry.mode}</span>${escHtml(subMeta)}</div>
    </div><button type="button" class="hi-del" data-idx="${originalIdx}" tabindex="0">${icons.close}</button>`;
    
    const delBtn = item.querySelector('.hi-del');
    const delAction = async e => {
        e.stopPropagation();
        if(!(await customConfirm('Are you sure you want to delete this entry?', 'Delete'))) return;
        deleteHistory(originalIdx);
    };
    delBtn.addEventListener('click', delAction);
    handleKeyClick(delBtn, delAction);
    
    const itemAction = () => fillFromHistory(entry);
    item.addEventListener('click', itemAction);
    handleKeyClick(item, itemAction);
    
    histList.appendChild(item);
  });
  
  if(histList.innerHTML === '') {
      histList.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:10px;">No matching entries found.</div>';
  }
}

function fillFromHistory(entry){
  setMode(entry.mode || 'tyre');
  
  dateFields().forEach(f=>{
    const val=entry[f.id];
    if(!val) return;
    let d;
    if(f.fmt==='slash'){ const p=val.split(' / '); d=new Date(+p[2],+p[1]-1,+p[0]); }
    else { const p=val.split('-'); d=new Date(+p[2],+p[1]-1,+p[0]); }
    if(isNaN(d)) return;
    if(!CAL[f.id]) CAL[f.id]={};
    Object.assign(CAL[f.id],{date:d,year:d.getFullYear(),month:d.getMonth(),open:false,view:'days'});
    const dv=document.getElementById('dv_'+f.id);
    if(dv){ dv.textContent=val; dv.classList.remove('empty'); }
  });
  allFields().filter(f=>f.type==='text' || f.type==='select').forEach(f=>{
    const inp=document.getElementById(f.id);
    if(f.type === 'select') {
      const valEl = document.getElementById('csv_'+f.id);
      if(inp && valEl && entry[f.id]) {
        inp.value = entry[f.id];
        valEl.textContent = entry[f.id];
        valEl.classList.remove('empty');
      }
    } else {
      if(inp && entry[f.id]!==undefined){ inp.value=entry[f.id]; inp.classList.remove('pre'); }
    }
  });
  closeAllPopups();
  clearStatus();
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showStatus(m,t){statusEl.textContent=m;statusEl.className='status '+t;}
function clearStatus(){statusEl.textContent='';statusEl.className='status';}
</script>
